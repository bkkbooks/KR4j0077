鶗鳺春分鳴則衆芳生秋分鳴則衆芳歇咫尺江山分楚越左僖九年天威不違顔咫尺注八寸曰咫荘子自其異者觀之肝膽楚越也目㫁䰟銷應是音塵絶謝荘月賦羙人邁兮音塵闕夢破五更心欲折角聲吹落梅花月玉楼春晏叔原秋千院落重簾暮寂寞春閑扄綉戸墻頭紅杏雨餘花門外緑楊風後絮朝雲信断知何䖏應作巫陽春夣去見前髙唐注紫騮認得舊遊蹤嘶過畫橋東畔路踏莎行歐陽永叔候舘梅殘礼也官遺人五十里一市市有候舘溪橋柳細杜市槁官柳細草芳風暖揺征轡離愁漸逺漸無窮迢迢不断如春水寸寸柔腸盈盈粉淚樓髙莫近危欄倚平蕪尽䖏是春山李桑柘羅平蕪行人更在春山外一剪梅新増李易安紅藕香殘玉簟秋䡖觧羅裳獨上蘭舟雲中誰寄錦書来鴈字囬時月滿樓古詩寄書雲間鴈選詩裁詩月滿楼花自飄零水自流一種相思兩䖏閑愁古詞一種相思兩地愁此情無計可消除纔下眉頭却上心頭苕溪漁隠云近時婦人能文詞者如趙明誠之妻李易安長於詞有漱玉集三卷行于丗此詞頗尽离别之情當為拈出陽関引新増㓂平仲塞草煙光闊杜野潤煙光薄渭水波聲咽春朝雨霽䡖塵歛征鞍發指青青楊柳又是䡖攀折見前集上卷内動黯然知有後㑹甚時節更尽一盃酒見前王維詩注歌一闋歎人生裏難歡聚易離别且莫辞沉醉聽取陽関徹念故人千里自此共明月月賦隔千里兮共明月草堂詩卷畢虞羙人李後主春花秋月何時了徃事知多少小樓昨夜又東風月令東風觧凍故國不堪囬首月明中柳詩夜深瀟洒月明中雕欄玉砌應猶在只是朱顔改問君都有㡬多愁恰似一江春水向東流雪浪霽日記云􅍮公問山谷云作小詞曽看李後主詞否云曽看􅍮公云何䖏最好山谷一以江春水向東流為對􅍮公云未若細雨夢囬維塞逺小樓吹徹玉笙寒尤為髙妙蝶恋花秦少游鍾送黄昏雞報暁昏暁相催杜隂陽割昏暁世事何時了韓詩莫将世事憂身事萬古千愁人自老李詩与尔同銷万古愁春来依舊生芳草忙䖏人多閑処少閑処光隂㡬箇人知道獨上小樓雲杳杳天涯一點青山小坡詩青山髮是中原臨江仙夜登小閣憶吴中舊遊新増陳去非簡齋憶昔午橋橋上飲坐中多是豪英長溝流月去無聲杜月湧大江流杏花踈影裏吹笛到天明二十餘年成一夢此身雖在堪驚閑登小閣望新晴古今多少事漁唱起三更苕溪漁隱云去非舊有詩云風流丘􅊤真吾事籌䇿廟堂非所知其後登政府无所建明卒如其言九日詞云九日登臨有故常随晴隨雨一傳觴用退之淮西碑𣣔事故常之語如憶吴中旧遊臨江仙一闋清苑竒䴡簡齋詞集推此詞最愛春從天上来新増吴彦髙米元章之婿海角飄零嘆漢苑秦宫墜露飛葻夣裏天上金屋銀屏見前注歌吹競舉青冥問當時遺譜有絶藝皷瑟湘靈杜甫酹高蜀州詩皷瑟至今悲帝子注湘妃尭之女故曰帝子傳言湘灵皷瑟餘見詞後詞話促哀弹似林鶯嚦嚦山溜冷冷梨園太平樂府長恨歌梨園弟子白髮新椒房阿檻青娥老醉㡬度春風鬢髮星星見前注舞徹中原塵飛滄海風雪萬里龍庭寫胡笳幽怨人憔悴不似丹青酒醒一軒凉月燈火青熒彦髙序云㑹寕府遇老媪善皷瑟自言梨園旧籍因有感而賦此後三山鄭中卿甞從張貴謨使虜亦聞虜中有歌之者警悟青玉案人生南北如𡵨路劉説符篇玉朱見岥路而泣之謂生可以南可以此中丗事悠悠等風絮造化小兒無定㩀唐列傳甚為造化小児相苦翻来覆去杜詩畨手作雲覆手雨倒横直竪眼見都如許伊周功業何湏慕不學淵明便歸去見前注坎止流行隨所寓見前東坡哨遍詞玉堂金馬王維長玉賦歷金門歩玉堂有日矣竹籬茅舍揔是無心䖏西江月新増朱希真世事短如春夢岑參詩枕上片時春夢中人情薄似秋雲杜天際秋雲薄不湏計較苦劳心萬事元来有命幸遇三盃酒羙况逢一朶花新片時歡笑且相親明日隂晴未定此即及時行楽之意黄玉林云希真又有一闋云日日深盃酒滿朝朝小圃花開自歌自舞自開懐且喜無拘無碍青史㡬畨春夢紅塵多少竒才不湏計較与安排領取而今見在此二詞辞淺意深可以言世之役役於非望之福者滿庭芳蘇東坡蝸角虚名蠅頭㣲利筭来着甚干忙事皆前定誰弱又誰強且趂閑身未老詩話云未老得閑方是閑儘教我些子踈狂百年裏渾教是醉三萬六千埸襄陽歌百年三万六千日一日湏傾三百盃思量能㡬許憂愁風雨一半相妨又何湏抵死說短論長幸對清風皓月苔茵展雲幙髙張江南好千鍾羙酒一曲滿庭芳按詩僧号晦庵者亦有一詞名滿江紅云優擾劳生待足何時是足㩀見定隨家豊儉便堪龜縮得意濃時休進歩湏防世事多畨覆枉教人白了少年頭空禄禄誰不願黄金屋誰不爱千種粟柰五行不是這般題目枉使心機空計較兒孫自有見孫福又不湏採藥訪蓬莱但寡慾此詞亦是逹觀之見俗以北曲与坡詞作對刋碑刻云八聲甘州送叅寥子蘇東坡有情風萬里選春風太多情捲潮来無情送潮歸問錢塘江上西河浦口㡬度斜暉不用思量今古俯仰昔人非誰似東坡老白首忘機記取西湖西畔正暮山好處空翠煙霏韓詩出入高下穷烟霏筭詩人相得如我與君稀約他年東還海道願謝公雅志莫相違西州路不應囬首為我沾衣註見苕溪詞話詳載苕溪漁隠云晋書謝安雖受朝寄然東山之志始未不踰每形於言色及鎮新城尽室而行造汎海之装𣣔湏經畧粗定自海道還東雅志未就遂遇疾篤還都尋夢羊曇為安所爱重安薨后輟樂弥年行不由西州路甞因大醉不覺至州門左右白曰此西州門也曇悲感以馬䇿扣扉誦曹子建詩曰生存華屋䖏零落歸山丘因慟哭而去東坡用此故事若世俗之論必以為我成謙矣然其詞石刻后東坡題云元祐六年三月六日余以東琴年譜考之元祐四年知杭州六年召為翰林學士承㫖則此詞盖此時作也白后復守頴徙禓入長禮曹出師定武至紹聖元年方南遷嶺表建中靖國元年北歸至甞乃薨凡十一載則世俗成䜟之論果足言耶慶夀喜遷鶯丞相生日新増康伯可臘殘春早正簾幙護寒樓䑓清暁空運當千佳辰餘五嵩岳誕生元老詩嵩高維嶽峻極干天維嶽䧏神生甫及申維申及甫維周之翰帝遣阜安宗社人仰雍容廊廟盡揔道是文章孔孟勲庸周召師表方眷遇魚水君臣湏信從来少蜀志先主之有孔明如魚之有水玉帶金魚朱顔緑鬚占断世間榮耀篆刻鼎彛将遍整頓乾坤都了洗兵馬行整頓乾坤濟時了願歲嵗見柳梢青淺梅英紅小按此詞語意儘佳惜皆媚竈之語盖爲檜相作耳水龍吟夀韓南間新増辛㓜安渡江天馬南来㡬人真是經綸毛長安父老新亭風景可憐依舊見前集内注夷甫諸人神州沉陸㡬曽回首筭平戎萬里功名本是真儒使君知否况有文章山斗韓愈傅其言行文章學者仰之如太山北斗對桐隂滿庭清晝當年墮地而今試看風雲奔走緑野風煙裴度有緑野堂平泉草木李徳袼有平泉宴遊之地東山歌酒謝安有東山之勝待他年整頓乾坤事了為先生夀千秋歲夀史致道新添塞垣秋草又報平安好韓詩新竹報平安樽爼上英雄表金湯生氣象珠玉霏談笑杜詩清談玉露繁又效揺落九天隨風生珠玉春近也梅花得似人難老莫惜金樽倒鳯詔看看到留不住江東小從容帷幄裏張良傳運籌帷幄之中决勝千里之外整頓乾坤了見前注千百歲從今盡是中書考唐書郭子儀身任外安危者四十余年僉中書令考二十四富貴夀考哀榮終始自述驀山溪新増宋謙父壷山壷山居士未老心先懶爱學道人家辦竹几蒲團茗椀青山可買小結屋三間開一逕俯青溪脩竹㘽教滿客来便請隨分家常飯若肯小留連更薄酒三盃兩琖吟詩度曲風月任招呼身外事杜莫思身外無穷事且尽生前有限盃不関心自有天公管飲饌噐用詠茶品令黄魯直鳯舞團團餅恨分破教孤令金渠躰净隻輪慢碾玉塵光瑩湯響松風早减二分酒病蛮甌志劉禹錫正病酒乃饋菊苗虀换白樂天六班茶茶囊以醒酒味濃香永醉郷路成佳境古詩𬋩束騷人入醉鄕雇愷之漸入佳境恰如燈下故人萬里歸来對影口不能言心下快活自省苕溪漁隠云曽直諸茶詞余謂品令一詞最佳能道人所不能言尤在結尾三四句阮郎歸歌停檀板舞停鸞髙陽飲興闌晋山簡每至高陽習家池飲大醉而歸獸煙噴盡玉壷乾香分小鳯團楊大年談非貢茶凡十四品曰龍茶鳯團京誕龍茶以貢乗輿及賜执政視士長主餘皇族學士将帥皆得鳯茶雲浪淺露珠圎捧甌春笋寒春笋佳人指也綘紗籠下躍金鞍杜詩花邊立馬躍金鞍歸時人倚欄古今詞話云觀者欮服此詞八句伏八景音律一同殊不散乱人争寳之刻之琬琰掛于堂室之間也愚觀山谷集有一曲詠前寨亦名阮郎歸云烹茶留客駐金鞍月斜窗外山見郎容易别郎難有人愁逺山帰去後憶前歡昼屏金傳山一盃春露莫留殘与郎失玉山并附于此醉落魄紅牙板歇韶聲㫁六么𥘉徹小槽酒滴真珠竭李賀小槽酒滴真珠紅紫玉甌圎淺浪泛春雪香芽嫩蘂清心骨醉中襟量與天闊李白醉与大地同量夜䦨似覺歸仙闕走馬章䑓踏碎滿街月秦有章䑓華前走馬章䑓街下詠酒鷓鴣天勸酒晏叔原彩䄂慇懃捧玉鍾當年拚却醉顔紅唐詩衰顔酒惜紅舞低楊柳楼心月歌尽桃花扇底風從别後憶相逢㡬回夢魂與君同今宵剰把銀缸照猶恐相逢是夢中雪浪齋日記晏叔原此詞云舞低楊柳楼心月歌尽桃花扇底風此等句不愧六朝宫液体趙德麟候鯖録眺無咎云叔原不蹈襲人語而風調閑雅自是一家如舞低楊柳楼心月尽桃花扇底風自可知此人不生扵三家村中也浣溪沙歐陽永叔堤上遊人逐畫船拍堤春水四垂天韓海氣昏昏水拍天緑楊楼外出秋千白髪戴花君莫笑六么催拍盞頻傳六么曲名人生何䖏似樽前侯鯖録云歐陽永叔浣溪沙云堤上遊人逐盡船拍堤春水四垂天緑楊楼外出秋千此等語句要皆絶妙只一出字是後人着意道不到䖏黄魯直云東坡居士曲世所見者㡬百首或謂於音律小不諧此詞横放桀出自是曲子中縛不住者西江月勸酒黄山谷断送一生唯有破除萬事無過韓文公詩逺山横黛蘸秋波逺山横黛眉也秋波眼也不訪傍人笑我花病等閑痩弱春愁没䖏遮欄盃行到乎莫留殘韓文公詩杯行到君莫停手古詞飲盡莫留殘不道月斜人散後山詩話云此詞用韓文公遠興詩断送一生唯有酒又贈鄭兵曹詩破除万事無過酒才去一字遂為切對而語益峻又云杯行到手莫留殘不到月斜人散謂思相离之憂則不得不尽飲谷一改為留連遂使两句文義相夫故併論之詠笛水龍吟蘇東坡楚山脩竹如雲異村秀出千林表龍鬚半翦鳯膺微漲玉肌匀繞愚溪云笛製取良簳首存一節節間留纎枝剪而束之節以下若􅈾䖏則微漲而全体皆傾白净此三句形容盡矣木落淮南雨晴雲夢月明風裊状景物自中郎不見蔡邕爲中郎将邕𥘉避難江南宿於柯亭之舘以竹爲椽邕仰而盻之曰此良竹也取以爲笛竒聲独絶傳至于今桓伊去後見月類念奴嬌詞下注知辜負秋多少聞道嶺南太守後堂深緑珠嬌小緑珠石崇家妾素善吹笛綺窓學弄梁州𥘉遍霓裳未了楊妃外傳梁州乃開元間西梁州所献之曲也其同則貴妃爲之天寳間羅公逺待明皇中秋宴公逺奏曰陛下能從臣遊乎命取桂枝杖向空擲之爲大橋色如白金上同行数十里至大成闕公逺曰此月宫也仙女数百衣素飄然舞扵廣庭中上問此爲何曲日霓裳羽衣曲也上宻記其聲節及回即喻伶人象其音調製爲霓裳羽衣之曲𥘉遍謂如今樂府諸大曲凢数十解於顛前則有棑偏顛後則有延遍𥘉遍豈非排遍之首觧嚼徴含宫泛商流羽宋玉對楚王問引商刻角雜以流徴國中屬和者不過数人也一聲雲杪古今詩話長笛一聲人倚楼為使君洗盡蠻風瘴雨作霜天暁醉落魄詠佳人吹笛張子野雲䡖柳弱内家髻子新梳掠生香真色人難學横管孤吹月淡天垂幕朱唇淺破櫻桃㠋方千贈羙人朱唇深淺𬒳櫻桃倚楼人在欄千角夜寒指冷羅衣薄聲入霜林䔩䔩驚梅落杜牧笛詩梅花落䖏響穿雲苕溪漁隠云樂府雜録云笛者羗樂也古曲有折楊柳落梅花故杜少陵有詩故園楊柳今搖落何得磻中曲尽生此皆言折楊柳曲也復齋謾録言古曲有落梅花非謂吹笛則梅落詩人用事不悟其失余以為不然盖詩人有因笛中有落梅花曲故言吹笛則梅落其理甚通用事殊未為失目如角声中有大小梅花曲𥘉不言落詩人尚猶如此用之故秦太虚和黄决曹云月落參横昼角哀暗香消尽梅花老者是也古今詩詞用吹笛則梅落者甚衆若以為失則落柳花之曲何為笛中独有之决不虚設也如張子野此詞䔩䔩驚梅落摭遣載梅花詩南枝向暖北枝寒一種春風有两般一仗高樓莫吹笛大家留取倚欄干眺次膺填入水龍吟詞云最是関情䖏髙楼上一聲羗管仗何人説与争取倚闌看孫濟師落梅詞云一聲羗管吹鳴咽玉溪半夜梅花翻雪泛觀古今詩詞用事一律可見復濟之妄辨也詠筝菩薩蛮張子野哀筝一弄湘江曲聲聲寫盡湘波緑桞子厚漁翁詩漁翁夜傍西岩宿暁及湘江燃楚竹日高烟湲不見人欵乃一声山水緑纎指十三絃細将幽恨傳當筵秋水慢白樂天詩双眸剪秋水玉柱斜飛鴈鴈筝鴈也筝柱斜列差如鴈飛也僧貫休詩刻成筝拄鴈相參挨弹到断腸時杜甫詩誰家巧作断腸声春山眉黛低注見前生查子含羞整翠鬟得意頻相顧鴈柱十三絃一一春鶯語嬌雲容易飛夢断知何䖏桞詩一聲夢断楚江曲深院銷黄昏陣陣芭蕉雨魏野詩黄昏微雨堪惆悵古詩共听芭蕉雨漁舟滿庭芳紅蓼花䌓黄蘆葉乱夜深玉露𥘉零霽天空濶雲淡楚江清独掉孤蓬小艇悠然過煙渚沙汀金鈎細絲綸慢捲牽動一潭星列湯問篇以独繭絲為芒鍼為􅍮蓧蓧為竿剖粒為餌引盈車之魚扵百朷之渊時時横短笛清風皓月相與忘形任人笑生涯泛梗飄萍杜欄醉是生涯選飄萍泛而萍傳飲罷不妨醉卧塵劳事有耳誰听江風静曰髙未起茶歌日髙丈五睡正濃枕上酒微醒花桞禽鳥梅花花犯周美成粉墻低也花照眼依然舊風味杜詩花枝照眼句還成林耳詩堪笑胡維亦風味觧将声調角中吹露痕䡖綴疑净洗鈆華無限佳䴡王介甫梅詩不御鈆華知囯色去年勝賞曽孤倚氷盤共宴喜更可惜雪中高樹香篝熏素𬒳杜詩雪樹元同色熏𬒳事詳見前注今年對花最怱忽相逢似有恨依依愁悴凝望乆青苔上旋看飛墜相将見脆圎薦酒人正在空江煙浪裏但夢想一枝瀟洒黄昏斜照水林逋詩踈影横斜水清淺暗香浮動月黄昏玉林詞選云此只詠梅花而紅餘反覆道盡三年間事昔人謂好詩貟羙流轉如弹丸餘扵此詞亦云愚謂此謂梅詞弟一絳都春早梅新増寒隂漸暁報驛使探春南枝開早陸凱寄梅事見前注坡詞徃天庾嶺上梅花南枝巳落北枝方開寒暖之失異也粉蘂弄香芳臉凝酥瓊枝小林和靖詩藥訝粉綃裁天悴帶疑紅蠟綴𥘉乾雪天分外精神好向白玉堂前應到化工不管朱門閉也暗傳音耗薛維翰詩白玉堂前一樹梅今朝怱見数枝開児家門户重重閉春色何因得入来䡖渺盈盈笑靨稱嬌面爱學宫粧新巧㡬度醉吟獨倚欄千官粧倚欄二事並見前注黄昏後月籠踈影横斜照更莫待单于吹老便湏折取歸来膽缾頓放了孤鵉早梅天然標格是小蕚堆紅芳姿凝白淡竚新粧淺點壽陽宫額見前注東君想留厚意倩年年與傳消息昨夜前材雪裏有一枝先折僧斉巳詩前材深雪裏昨夜一枝開念故人何䖏水雲隔縱驛使相逢難寄春色見前注試問丹青手是怎生描得暁来一畨雨過更那堪数聲羗笛歸去和羔未晚勸行人休摘玉燭新周羙成溪源新蠟後見數朶江梅剪裁𥘉就暈酥砌玉芳英嫩故把春心䡖漏前村昨夜見前注想弄月黄昏時候孤岸峭踈影横斜濃香暗沾襟䄂尊前賦與多才問嶺外風光故人知否夀陽謾闘宋武帝女夀陽公主人曰臥扵含章詹下梅花落其額上成五出之花拂之不去三日洗之乃落宫女竒之競效為梅花粧終不似照水一枝清痩岑參梅花詩𢾗枝清痩出踈籬風嬌雨秀好亂挿䌓花盈首杜詩安得徤歩移遠梅亂掃䌓花向晴昊湏信道羗管無情看看又奏李賀詩羗笛奏落花按孫濟師有落梅詞菩蕯蛮云一聲羗笛吹鳴咽干溪半夜梅翻雪江月正茫茫断橋流水香含章春𣣔暮洛日千山雨一点着枝酸吴媚先齒寒亦是用羗笛奏落梅之事今併附見于此驀山溪曹元寵洗粧真態唐詩雨洗宮梅一様粧不假鉛華飾唐詩洗出鉛華見玉肌竹外一枝斜和靖詩竹外一枝斜更好想佳人天寒日暮杜詩天寒翠𥙷重日暮倚脩竹黄昏院落無䖏着清香風細細雪垂垂何况江頭路月邊踈影夢到銷䰟䖏結子欲黄時又湏作廉纎細雨見前夏詞注孤芳一世供断有情愁消痩損唐詩氷肌消痩為誰愁東陽也試問花知否西江月蘇子瞻玉骨那愁瘴霧梅聖俞集梅詩玉骨綃裳䪨太孤天教飛雪伴清癯氷肌自有仙風海仙時遣探芳叢倒掛緑毛么鳯南海真禽名倒掛子緑毛如鸚鵡而小素面翻嫌粉涴洗粧不褪唇紅高情巳逐曉雲空不與梨花同夢冷齋夜話東坡在惠州作梅花詞時待兒名朝雲老新亡其寓意盖為朝雪作也苕溪漁隠王直方詩話載眺以道云說之𥘉見東坡詞便知道此老湏過海只為古今人不曽道到此湏罰数去此言鄙俚近扵忌人之長幸人之禍直方無纎載之詩話寕不畏人之譏誚乎髙齋詩話髙情巳遂曉雲空不與梨花夢同後見王昌齡梅詩落落寞寞路不分夢中喚作梨花雲方知坡老用此詩也漢宫春眺叔用瀟洒江梅向竹梢深䖏横兩三枝東君也不愛惜雪壓風欺無情燕子怕春寒䡖失佳期惟是有南来歸鴈年年長見開時選秋風辞草木黄落兮鴈南歸清淺小溪如練謝跳詩澄江静如練問玉堂何似茅舍踈籬傷心故人去後冷落新詩㣲雲淡月對孤芳分付他誰空自倚清香未减風流不在人知苕溪漁隠云此詞用玉堂事乃引用薛維翰白玉堂前一樹梅詩事或云宫苑之玉堂非也又云曽端伯編樂府雅詞以此詞為李漢老作非也乃晁叔用作政和間以献蔡攸是時朝廷方㒷大晟府蔡攸携此詞呈其父云今日扵楽府中得一人京覧其詞喜之即徐大晟府丞梨花水龍吟新添周羙成素肌應怯餘寒艶陽占盡青羗地樊川照月靈関遮路殘紅歛避傳火樓䑓妬花風雨僧祖可詩未湏風雨勒梨花長門深閉亞簾櫳半濕一枝在手偏勾引得黄昏淚别有風前月底布繁英滿園歌吹楽天詩惟听梨园尚吹發朱鉊退盡潘妃却酒昭君乍起雪浪翻空粉裳縞衣韓愈詩風揉由練雪羞比波浪畨空香無俟王介甫詩積李兮絞衣不成春意恨玉容不見瓊英謾好與何人比長恨歌玉容寂寞淚闌干談助元有女名瓊英㓜以香屑雜食啖之長而肌香名曰香兒荷花念奴嬌僧仲殊水楓葉下乍湖光清淺􅋽生啇素西帝宸遊羅翠盖西帝謂白帝也杜天高白帝秋擁出三千宫女白居易詩怨女三千放去宫絳綵嬌春鉛華掩晝占断夗央浦歌聲摇曵浣沙人在何䖏别岸孤裊一枝廣寒宫殿冷落棲愁苦雪艶氷肌羞淡泊偷把胭脂勻注媚臉籠霞芳心泣露不肯為雲雨金波影裏前天文志月穆穆以金波為誰長恁凝竚桂花金菊對芙蓉花則一名種分三色嫩紅妖白嬌黄尓雅木桂樹一名木屖花淡白其淡紅者謂之丹桂黄花者能著子正清秋佳景雨霽風凉韓詩時秋積雨霽新凉入郊墟郊墟十里飄蘭麝瀟洒䖏旖旎非常自然風韵開時不惹蝶亂蜂狂謝元逸詠木屖詩西風掃盡狂蜂蝶独伴天边桂子香携酒独揖蟾光問花神何属离兊中央引騷人乗興廣賦詩章㡬多子争攀折嫦娥道三種清香状元紅是黄為榜眼白探花郎落花六醜周羙成正单衣試酒悵客裏光隂虚擲劉賓客詩遥羡光隂不虚擲願春暫留春歸如過翌一去無跡杜甫詩林如過翌稀爲問家何在夜来風雨送楚宫傾國李延年歌此方有佳人絶世而獨立一笑傾人城再笑傾人國温庭詩荺夜来風雨送殘花釵鈿墮䖏遺香澤杜詩神女花鈿落亂點桃蹊䡖翻柳陌劉賓客詩桃蹊桺陌好經過多情更誰追惜但蜂媒蝶使時叩䆫隔東園岑寂池亭詩岑寂東园可散愁斬䝉籠暗碧詩選緑羅結髙林䝉籠盖一丘静遶珍叢底成嘆息長條故惹行客似牽衣待話别情無極殘英小強簮巾幘應詩醉酒巾幘落終不似一朶釵頭顫裊向人欹側漂流䖏莫趂潮汐陳充落花詩終尋流水送漂流王介甫詩百年滄州自朝夕恐断鴻尚有相思字何由見得事見摭遺見王卷詳柱烏衣國事楊花水龍吟章質夫燕忙鶯懶芳殘正堤上柳花飄墜䡖飛點昼青林全無才思閑趂遊絲杜落絮遊絲别有情静臨深院日長門閉傍珠簾散漫垂垂𣣔下依前𬒳風扶起謝道韞詩未若桞絮因風起蘭帳玉人睡覺怪春衣雪霑瓊綴繡床漸滿香毬無數纔圎却碎時見蜂兒仰粘䡖粉桞詩仰蜂粘落絮魚吞池水望章䑓路杳韓翊寄桞氏詩章䑓桞章䑓柳昔日青青今在否縱有長條似旧垂也應有折他人手金鞍遊蕩有盈盈淚玉林詞話云質夫傍珠簾散慢数語形容尽之矣水龍吟和章質夫韵東坡似花還似飛花白居易詩花非花霧非霧也無人惜從教墜抛家傍路思量却是無情有思韓之詩楊花榆莢無情退思惟解慢天作雪飛縈損柔腸困酣嬌眼𣣔開還閉夢隨風万里尋郎去䖏又還𬒳鶯呼起不恨此花飛盡恨西園落紅難綴見前注曹子建清夜遊曲園暁来雨過遺蹤何在一池萍碎公旧注云楊花落水為深萍驗之果然春色三分二分塵土一分流水葉通郷賀聖朝郊詞三分春色一分愁悶二分風雨細看来不是楊花點點是離人淚曲洧旧間云章質夫水龍吟詠楊花其命意用事清䴡可喜東坡和之若豪放不入律吕徐而視之聲䪨諧婉便覺質夫詞有織綉工夫故晁叔用云東坡如毛嬙西施盡洗却面与天下婦人聞好質夫豈可比耶桞蘭陵王周羙成桞隂直煙裏絲絲弄碧隋堤上曽見㡬畨拂水飄綿送行色登臨望故國爲衍云望秦晋之故囯誰惜京華倦客杜詩旅食京華春長亭路年去嵗来應折柔條過千尺閑尋舊蹤跡又酒趂哀絃燈照離席杜哀絃繞白雪梨花榆火催寒食愁一箭風快半篙波䁔歐陽詢詩急風吹緩箭坡詩愁中半篙水回頭迢逓便数驛望人在天北悽惻江淹别賦行子腸断百感悽惻恨堆積漸别浦縈回津堠岑寂斜陽冉冉春無極念月榭携手露橋吹笛沉思前事似夢裏淚暗滴草點綘唇林和靖金谷年年鄭谷草詩金谷园應役亂生春樹誰為主餘花落䖏選詩鳥散餘花落滿地和煙雨羅鄴草詩不佀萋萋南浦見晚来烟雨正相和又是離歌杜詩亂离还奏楽飄泊且聴歌一闋長亭暮王孫去萋萋無數南北東西路見前注詩話緫龜云林和靖不特工扵詩尤工扵詞如作點綘唇乃詠草耳終篇不出一草字詠燕雙雙燕新添史邦卿過春社了王介甫詩䖏䖏定知秋后别年年長向社前逢度簾幕中間去年塵冷差池𣣔住詩燕燕于飛下上其音差池其羽試入舊巢相並還相雕梁藻井又軟語商量不定飄然快拂花梢翠尾分開紅影芳徑芹泥雨潤鄭谷詩落花徑裏得泥忙愛貼地争飛競誇䡖俊紅樓歸晚看足桞昏花䏃應自棲香正稳便忘了天涯芳信愁損翠黛雙蛾日日畫欄独凭玉林詞話云姜尭章極称賞桞昏花瞑之句形容双燕亦曲尽其妙矣詠鶯黄鶯兒新添桞耆卿園林睛晝春誰主暖律潜催杜詩東君回暖律幽谷暄和黄鸝翩翩乍迁芳樹伐木詩伐木丁丁鳥鳴嚶嚶出自幽谷迁于喬木觀露濕縷金衣開元遺事明皇毎扵禁苑中見黄鶯呼為金衣公子葉映如簧語詩巧言如簧暁来枝上綿蠻似把芳心深意低訴無據乍出暖煙来又趂遊蜂去恣狂蹤跡两两相呼黄昏霧吟風舞當上苑桞濃時别舘花深䖏此際海燕偏饒都把韶光與杜䳌滿江紅新添康伯可惱殺行人東風裏為誰啼血尓雅杜䳌名怨鳥夜啼逹旦血清草木間凢鳴皆北向正青春未老流鶯方歇胡蝶枕前顛倒夢杏花枝上朦朧月問天涯何事苦関情思離别聲一喚腸千結閩嶺外江南陌正長堤楊桞翠條堪折鎮日叮嚀千百遍只将一句頻説道不如歸去不如歸傷情切范希文詩夜入翠烟啼昼尋芳樹飛春山無限好猶道不如歸孤鴻卜筭子蘇子曕缺月掛踈桐漏断人𥘉静時見幽人獨徃来縹緲孤鴻影驚起却回頭杜牧詩驚起暮天沙上鴈有恨無人省㨂盡寒枝不肯棲楓落吴江冷崔信明詩樹落吴江冷山谷云東坡道人在黄州作此詞語意髙妙似非喫煙火人語自非胷中有万卷書笔下無一點塵俗氣孰能至此苕溪漁隱曰揀尽寒枝不肯棲之句或云鴻鴈未甞棲宿樹枝惟在田野葦叢間或改作寒芦亦是但此詞本詠夜景至換頭但只説鴻正如賀新郎詞乳燕飛華屋本詠夏景至換頭只説榴花盖作文之法語意到䖏即為之不可限以繩墨衡陽居士云缺月刺明㣲也漏断暗時也幽人不得志也独往来無助也驚鴻賢人不安也回首爱君不忌也無人省君不察也㨂盡寒枝不肯棲不偷安扵高位也寂寞吴江冷非所安也此与考槃詩相似安肅荆聚校刋増修箋註妙選草堂詩餘卷下後集
