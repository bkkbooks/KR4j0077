薄膓𣣔断愁難着李白詩羙人不来空断膓倚蓬窻無寐引盃孤酌杜詩看劒引盃長馬周悠然独酌寒食清明都過了東坡詩寒食清明都過了石泉槐火一時新可憐辜負年時約想小楼日日望歸舟杜詩眼前今古意江漢一帰舟人如削滿江紅暮春晁無咎東武南城新堤固漣漪𥘉溢伐檀詩河水清且漣漪隱隱遍長林高阜卧紅堆碧枝上殘花吹盡也與君試向江邊覔問向前猶有㡬多春三之一葉道卿賀聖朝詞三分春色二分愁悶一分風雨宫裏事何時畢風雨外無多日相將泛曲水滿城争出君不見蘭亭脩禊事當時座上皆豪逸到如今脩竹滿山隂空陳迹晋王羲之三月三日蘭亭記永和九年暮春之𥘉㑹扵㑹稽山隂之蘭亭脩禊事也此地有崇山峻嶺茂林脩竹又有清流激湍引以為流觴曲水暢叙幽情是日也天朗氣清惠風和暢云云俯仰之間以為陳迹臨冮仙緑暗汀洲三月暮落花風静收垂楊低映木蘭舟李嶠分隂行木蘭為楫桂為舟半篙春水滑一叚夕陽愁李白月光𣣔到長門殿别作深宮一叚愁選花䲧夕陽遲㶚水橋東囬首處開元天宝遺事長安東㶚陵有橋迎来送往皆至此人呼為銷魂橋羙人親上簾鈎青鵉無計入紅楼行雲歸楚峽飛夢到楊州蝶恋花蘇東坡花褪殘紅青杏小燕子來時鄭谷杏花詩双燕却來時緑水人家遶楊㣲之詩流水人家穿竹徑枝上桞綿吹又少天涯何處無芳草唐詩在處有芳草墻裏秋千墻外道墻外行人墻裏佳人笑笑漸不聞聲漸悄多情却𬒳無情惱古今詞話予得此詞真本扵友人処極有理趣緑水人家遶非遶字乃曰人家曉曉字与遶字盖霄壌也蝶恋花晏同叔簾幙風䡖雙語燕晏殊詩簾幙中間燕子飛午醉醒來桞絮飛撩乱心事一春猶未見餘花落尽青苔院李白詩落花寂寂委青苔百尺朱楼閑倚徧楊億詩危楼高百尺薄雨濃雲抵死遮人面消息未知㱕早晚杜詩去住勤此無消息斜陽只送平波逺蝶恋花歐陽永叔庭院深深深㡬許楊桞堆煙簾幙无重数金勒雕鞍逰冶処杜詩白馬嚼囓黄金勒李白詩花月醉雕鞍楼高不見章臺路𥘉學記秦有章臺路雨横風狂三月暮門掩黄昏潘䦘宫詞花落黃昏空掩門無計留春住薛能惜春詩無計延春日何能留少年淚眼問花花不語乱紅飛過秋千去易安居士序歐陽公作蝶恋花有深深深㡬許之句予酷愛之用其語作庭院深深数闋其声即旧臨江仙也浣溪沙春暮周羙成樓上晴天碧四垂杜晴天捲片雲楼前芳草接天涯勸君莫上最高梯新笋看成堂下竹落花都上燕巢泥鄭谷燕詩落花徑裏得泥香忍听林表杜䳌啼如夢令春晩池上春帰何処滿目殘花飛絮韓文公詩桞巷还飛絮孤舘悄無人夢断月堤㱕路無緒無緒簾外五更風雨如夢令李易安昨花雨踈風驟濃睡不消殘酒盧仝茶奇日高丈五睡正濃試問捲簾人却道海棠依舊知否知否應是緑肥紅痩苕溪漁隱云近時婦人能文詞如李易安頗知佳句如云緑肥紅瘦只此語甚新又九日詞簾捲西凨人似黄花痩此言亦婦人所難到也武陵春風住塵香花已尽日晚倦梳頭物是人非事事休𣣔語涙先流聞説双溪春尚好文選明月双溪水清凨八誅楼也擬泛䡖舟只恐雙溪舴艋舟載不動許多愁怨王孫夢断漏悄愁濃酒惱寳枕生寒翠屏向曉杜翠屏冝晩對門外誰掃殘紅夜来凨選落花詩落尽万株紅無人系晚風玉簫声断人何處列仙傳肖史者秦穆王府人善吹肖秦穆公女弄玉吹肖作鳯鳴後随鳯去春又去忍把歸期負此情此恨此際擬託行雲問東君杜詩東君曰回暖律上青玉案凌波不過横塘路洛神賦凌波㣲歩羅韈生塵但目送芳塵去晋王嘉拾遺記石虎起楼四十丈雜宝異香為屑風作則揚之名曰芳塵錦瑟年華誰與度杜醉卧佳人錦瑟傍月楼花院綺窻朱户惟有春知處古詩交䟽結綺窻韓詩黄簾緑幙朱戸閑碧雲冉冉衡皐暮綵筆空題断腸句杜詞彫章五滿筆如杠梅花滿枝空断腸試問閑愁知㡬許一川煙草杜水煖通草徑或曰川豈有草乎應之曰杜江白草纎纎無名江上草豈得無草乎滿城風絮梅子黄時雨杜四月熟黄梅生梅熟時多雨潘子真詩話世称方囬所作梅子黄時雨為絶唱盖用宼莱公語也㓂云杜䳌啼処血成花梅子黄時雨如霧點絳唇紅杏飄香李賀梨花詩曲水飄香去不囬桞含煙翠拖金縷王禹称桞詩丹禁拖金縷水邊朱戸門掩黄昏雨媿野詩黄昏微雨堪惆帳燭影揺紅一枕傷春緒帰不去鳯楼何處秦穆公女弄玉登楼吹肖感鳯來芳草迷帰路劉安招隱詩王孫逰兮不帰芳草生兮萋萋桞梢青子規啼血㓂莱公詩杜䳌啼処血成花可憐又是春帰時節滿院東凨海棠鋪綉梨花飛雪丁香露泣殘枝誚未比愁腸寸結自是休又多情多感不干凮月沈休文事見未卷瑞鶴伈注賀聖朝葉道卿滿斟緑醑留君住莫匆匆歸去杜詩相逢難衮衮告别莫匆匆三分春色二分愁悶一分凨雨花開花謝都來㡬日且高歌休訴杜詩囬首且高歌知他來歲牡丹時候相逢何處鳯凰閣遍園林緑暗渾如翠幄陸士衡詩宻葉成翠幄下無一片是花蕚杜詩一片花飛减却春可恨狂凨横雨忒煞情薄尽底把韶華送却楊花無柰是處穿簾透幙豈知人意正瀟索李白詩世路如秋凨相逢尽肖索春去也這般愁沒処安着怎柰向黄昏院落天仙子張子野水調数声持酒听水調歌頭曲名午醉醒來愁未醒送春春去㡬時囬韓詩吏人休报事公作送春詩臨晚鏡傷流景徃事後期空記省沙上並禽池上瞑雲破月來花弄影重重翠幙宻遮灯風不定人𥘉静明日落紅應滿徑古今詩話有客謂張子野曰人皆謂公張三中卽心中事眼中淚意中人也公曰何不目之為張三影客不曉公曰雲破月來花弄影嬌柔擲起薕壓捲花影桞徑無人墜飛絮無影此余平生所得志高齊詩話子野甞有詩云浮萍断処見山影又長短句云雲破