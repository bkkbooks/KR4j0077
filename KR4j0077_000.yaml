歌詠故應制之詞為多按此詞進入太上皇帝極稱賞風柔夜暖以下數句至於未章賜金甚厚寶䁀現夕陽西下暮靄紅隘香風羅綺韓翊公子行羅綺爭扶夜醉歸乘麗景華燈爭放西亰雜記元日撚九華燈於南山照見百里濃熖燒空連錦砌覩皓月浸嚴城如晝花影寒籠絳蘃漸掩映芙蕖万頃迤邐齊開秋水太守無限行歌意蘇味道上元夜詩行竒盡落梅擁麾幢光動珠翠韓愈詩不令見麾幢短檠竒長檠髙張照珠翠傾万井歌臺舞榭瞻望朱輪駢鼓吹李白詩門有車馬賓金鞍曜朱輪控寶馬耀貔貅千騎書太誓如虎如貔如熊如羆文選古者諸侯千乘今太守古諸侯也故太守出擁千騎銀燭交光數里似亂簇寒星万點擁入蓬壷影裏宴閣多才環艷粉瑶簮珠履注見前恐看看丹詔催奉宸遊燕侍後漢志注漢儀天子玉璽皆以武都紫泥封丹書丹詔皆取此也詩叢話正直宸逰望逺空便趂早占通宵醉洗兵馬行寉駕通肖鳯輦備緩引笙歌妓李白詩蘭蕙相隨皆妓女凮光去處滿笙歌任晝角吹老寒梅李白從軍行笛奏梅花曲今角聲多吹此月滿西樓十二文選鮑昭詩鳯樓十二時傾杯樂柳耆卿禁漏花深唐僧靈徹得蓮花漏乃取銅葉制器狀如蓮花繍工日永晉魏間官中以紅繡線量日影冬至後日長一線蕙凮布暖選宋玉招魂光凮轉蕙泛崇闌變韶景都門十二元宵三五三五謂十五日也銀蟾光滿連雲復道凌飛觀復道見前髙帝紀紀居南宫從復道上見諸將偶語注上下有道故謂復即重屋也觀亦樓也選詩琴賦飛觀髙樓曹植雜詩飛觀百尺樓聳皇居麗佳氣瑞煙蔥倩翠華宵幸選南都賦望翠華之葳𬎼是處層城閬苑龍鳯燭交光星漢對咫尺鰲山開雉扇左僖九年天威不違顔咫尺五經異義天子之城千雉鰲山燈山也結綵為之列湯問海中有五山根無所連者帝使巨鰲十五舉首戴之會樂府兩籍神仙梨園四部絃管唐元宗集梨園弟子得三千人為霓裳羽衣曲向曉色都人未散盈萬井山呼鰲抃願歲嵗天仗裏常瞻鳯輦杜鶴駕通肖鳯輦備絳都春丁仙現融和又報乍瑞靄霽色皇州春早謝㫵詩春色滿皇州翠幰競飛玉勒爭馳都門道鰲山綵結蓬萊島向晚色雙龍㗸照綃樓臺上􅊮芝蓋底西京賦芝蓋九葩甘泉賦翳華芝注蓋名仰瞻天表縹眇凮傳帝樂長恨歌仙樂凮飄處處聞慶三殿共賞群仙同到迤邐御香飄滿人間聞嬉笑杜衣冠身惹御爐香須臾一點星毬小漸隱隱鳴梢聲杳遊人月下歸來洞天未曉解語花周美成風銷熖蠟杜花催蠟炬銷露浥烘爐花市光相射桂華流瓦纎雲散耿耿素娥欲下張正見詩耿耿長河曙泛濫宿雲浮月下嫦娥落風驚織女秋衣裳淡雅看楚女纎腰一把杜楚女腰肢亦可憐簘鼓喧人影參差滿格飄香麝因念帝城放夜新記曰京城街衢有金吾曉瞑傳呼以禁夜行惟正月十五夜敕金吾弛禁前後路一日謂之放夜望千門如晝杜駐馬望千門嬉笑遊冶鈿車羅帕相逢處自有暗塵隨馬蘇道詩暗陳隨馬去年光是也惟只見􅍫情衰謝清漏移飛蓋歸來從舞休歌罷萬年歡胡浩然燈月交光孟元老上元記華燈寶炬月色交光漸輕風布暖先到南國羅綺嬌容十里綘紗籠燭花艷驚郎醉目有多少佳人如玉春衫𬒮整整齊齊內家新樣粧束歡情未足更闌謾勾牽舊恨縈亂心曲周詞無限事縈心曲悵望歸期應是紫姑頻卜暗想雙眉對蹙斷絃待鵉膠重續十洲記鳯麟洲以鳯彖粦角作膠名續弦膠能續斷絃宋陶谷詞若得鵉膠續斷絃是何年休迷戀野草間花鳯簫人在金谷鳯簫事見秦樓下注傅言玉女一衣東風李東風扇淑氣不見柳梢殘雪杜青柳檻前梢御樓煙暖對鰲山綵結簫鼓向晚鳯輦𥘉回宫闕千門燈火九逵風月爾雅九逹謂之逵繡閣人人乍嬉逰困又歇艷粧𥘉試杷珠簾半楬嬌差向人手撚玉梅低説相逢長是上元時節女冠子李漢老帝城三五燈火花市盈路天街遊處此時方信鳯闕都民奢華豪富紗籠才過處喝道轉身一璧小來且住見許多才子艷質携手並肩低語東來西住誰家女買玉梅爭戴緩步香風度北觀南顧見畫燭影裏神仙無數引人魂似醉不如聞早步月歸去這一雙情眼怎生禁得許多胡覷漢宫春康伯可雲海沉沉峭寒收建章雪殘鳷鵲漢武帝建章長樂宮皆閣道相屬謝眺詩金波麗鳷鵲注殿名華燈照夜萬井禁城行樂春隨鬢影映參差柳絲梅蕚觀立春類注丹禁香鰲峰對聳三山上通寥廓向伯恭上元詞紫禁煙花一万重鰲山宫闕隱晴空玉皇端拱彤雲上人物嬉遊陸海中春衫繡羅香薄步金蓮影下三千綽約齊東昏侯鑿金為蓮花貼地令潘妃行其上曰此步步生蓮花也氷輪桂滿皓色冷浸樓閣霓裳帝樂奏升平天風吹落留鳯輦通宵宴賞見前注莫放漏聲間却花詞客云此詞伯可在慈寧殿元夕𬒳一旨作漢宮春上元前一日立春京仲逺暖律𥘉回又燒燈市井元徽之詩燈火家家市賣酒樓臺誰將星移萬點月滿千街輕車細馬隘通衢蹴起香埃今歲好土牛作伴立春捻土象牛以送寒挽留春色同來不是天公省事要一時壯觀特地安棑何妨綵樓鼓吹古詩一望笑聲連鼓吹綺席樽罍良宵勝景語邦人莫惜徘徊休笑我癡頑不去年年爛醉金叉慶春澤劉叔安燈火烘春上元詩燈火下樓臺樓臺浸月良宵一刻千金蘇東坡詩春宵一刻直千金錦步承蓮蓮步事見前注彩雲簇仗難尋蓬壷影動星毬轉丁仙現詞須臾一點星毬小映兩行寶珥瑶簮恣嬉遊玉漏聲催未歇芳心笙歌十里誇張地古詩笙歌歸院落古詩十里綺羅春富貴記年時行樂雙闕中天鳳樓十二春寒淺唐元宗正月望夜移仗上陽宫建燈樓十二間飾以珠玉其燈為龍鳯虎豹踴躍狀去年元衣奉宸遊曽侍瑶池宴玉殿珠簾盡捲擁群仙蓬壷閬苑五雲深處萬燭光中六帖開元正月望日葉法師造虹橋與明皇觀廣陵寺燈火之盛人見仙人手五色雲中揭天絲管馳隙流年莊子忽馬無異騏驥之馳過隙也恍如一瞬星霜换今宵誰念泣孤臣林甫親自靖康之變前疊追憶徽廟元宵之盛有感于丗變故自講泣孤臣也回首長安逺可是塵緣未斷謾惆悵華胥夢短列子黃帝晝寢夢遊華胥氏之國既覺恰然自得天下太治知華胥氏之國滿懷幽恨數點寒燈幾聲歸鴈燭影搖紅吳太年梅雪𥘉消麗譙吹罷單于晚莊子魏有麗譙注謂城樓吹角之所也使君千炬起班春歌吹香風暖十里珠簾盡捲古詞楊州十里小紅樓盡捲上珠簾一半人正在蓬壷䦘苑賣薪買酒立馬傳觴升平重見見東坡前注誰識遨頭去年曽侍傳柑宴詩話上元夜登樓貴戚宫人以黃柑遺近臣謂之傳柑宴至今衣袖帶天香杜詩衣惹玉爐香行處氤氲滿巳是春宵苦短長恨歌春宵苦短日髙起更莫遣歡遊意懶細聽歸路璧月光中玉簘聲逺喜廷鶯閠元宵吳子和銀蟾光彩喜稔歲閏正元宵還再樂事難并佳時罕遇依舊試燈何礙花市又移星漢蓮炬重芳人海盡勾引遍嬉遊寶馬香車喧隘睛快天意教人月更圎償足風流債媚柳煙濃岑參詩楊柳万條煙夭桃紅小杜山桃發小紅景物逈然堪愛巷陌笑聲不斷襟袖餘香仍在待歸也便相期明日踏青挑菜玉觀詞結伴踏青去好朱淑真詩主菜乍挑冝捲餅立春喜遷鶯胡浩然譙門殘月聽晝角曉寒梅花吹徹現寶䁀現注瑞日烘雲風和解凍月令孟春東凮解凍青帝乍臨東闕暖向土牛簫鼓天路珠簾髙揭夢華録立春前造土牛于門外是日有司為壇以祭先農官吏各具綵杖環擊土牛者二古詞簫鼓向晚又古詞錢塘十里小紅樓盡揭上珠簾一半最好是戴綵幡春勝叉頭雙結勵前江仙詞主竒絶開宴處珠履玳簮爼豆爭羅列舞袖翩翻杜詩舞袖拂花鈿歌喉縹眇壓倒柳腰鶯舌勸我應時納祐還把金爐香爇願嵗嵗這一巵春酒詩為此春酒以介眉夀長陪佳節曹松立春詩玉燭傳佳節雙溪老人云浩然此詞先紀節序次述宴賞未歸應時納祐尤有歸宿臨江仙賀方回巧剪合歡羅勝子叉頭春意翩翩􅍮楚歲時記立春日悉剪綵為燕以戴之鄭毅夫云漢殿鬪簮雙綵燕併知春色上叉頭艷歌淺笑拜嫣然願郎宜此酒行樂駐華年未至文園多病客史記司馬相如與文君歸成都嘗有消渴疾後拜為孝文園令既病免家居茂林也幽襟悽斷堪憐舊遊夢挂碧雲邊人歸落鴈後思發在花前見詞後注復齋謾録方回詞有鴈後歸詞乃山谷守當塗方回過之人日席上作腔本臨江仙山谷以方回用薛道衡詩故易以鴈後歸云今仍其舊唐劉錬傳記隋薛道衡聘陳為人日詩首云入春才七日離家已二年南人強之及云人歸落鴈後思發在花前乃曰名下無虛士玉樓春毛澤民小園半夜東風轉吹破氷池雲母面曉披閶闔見朝陽杜詩閶闔開黃道閶闔天門也知向碧階添幾線小煙弄柳晴光暖殘雪禁梅香尚淺殷勤洗拂舊東君多少韶華都借看小沖山李漢老誰勸東風臘裏來不知天待雪惱江梅東郊寒色尚徘徊雙綵燕飛傍鬢雲堆綵燕事見前注玉冷曉粧臺冝春金縷前􅍮楚歲時記立春日貼冝春字千門王沂公立春帖門云比陸凝隂盡千門淑氣新年年金殿裏寶字貼冝春拂香腮紅羅先繡踏青鞋蘆公範饋飾儀三月三日上踏青鞋履春猶淺歐陽公詞玉亰此處春猶淺花信更須催東皋雜録江南自𥘉春至𥘉夏五日一畨凨候謂之花信凨梅花凨最先棟花凮最後凡二十四畨以為寒絶徐師川云一百五日寒食雨二十四畨花信凮蝶戀花辛幼安稼軒誰向椒盤簮綵勝整整韶華爭上春風鬢東坡元日立春詩堆盤紅縷細茵蔯巧雨椒花兩鬪新又次曽仲錫元日見寄韻肅索東凮雨鬢華年年幡勝剪宫花往日不堪重記省為花長抱新春恨春未來時先借問晚恨開遲早又飄零近今歲花期消息定只愁風雨無憑凖寒食瑣窗寒周美成暗柳啼鴉單衣佇立小簾朱户桐花半畝靜鎖一庭愁雨滴空階更闌未休漁隱詩話嘉祐中有魚人於江心綱得片石有絶句雨滴空階曉無心換夕香井桐花落盡一半在銀床故人剪燭西窗語李啇隱詩何當共剪西窗燭却話巴山夜雨時似楚江瞑宿風燈零亂杜詩風起春燈亂江鳴夜雨懸少年羇旅遲暮嬉遊處杜詩自傷遲暮眼正店舍無煙禁城五百連昌宫𥘉過寒食一百六店舍無煙宫樹緑旗亭唤酒付與髙陽儔侣李賀詩旗亭下馬解秋衣冝賀髙陽一壷酒漢􅐱食其謁髙祖衣儒冠沛公謝之曰未睱見儒食其按劒此日吾髙陽酒徒非儒也沛公起入相東園桃李自春小唇秀靨今在否到歸時定有殘英侍客携樽俎李賀詩穠眉籠小唇又脫奩粧秀靨應天長周美成條風布䁔易緯云立夏條風至霏霧弄晴池塘遍滿春色正是夜堂無月沉沉暗寒食梁間燕前社客似笑我閉門愁寂亂花過隔院藝香滿地狼籍長記那回時解逅相逢郊外駐油璧溫飛卿詞油璧車輕金牘肥又見漢宫傳燭飛煙五侯宅見三臺詞注青青草迷路陌古樂府青青河畔草強載酒細尋前迹市橋逺柳下人家猶自相識杜市橋官柳細玉樓春謝無逸溪堂弄晴數點梨花雨門外晝橋寒食路杜鵑飛破草間煙蛺蝶惹殘花底霧東君著意憐樊素白樂天有二妾樊素善歌小蠻善舞嘗有詩曰櫻桃樊素口楊柳小蠻腰一假韶華都付與粧成不管露桃噴舞罷從教風柳妬訴衷情僧仲殊湧金門外小瀛洲杭州有湧金門寒食更風流紅船滿湖歌吹花外有髙樓晴日暖淡煙浮恣嬉遊三千粉黛十二闌千一片雲頭玉林詞選云仲珠之詞多矣佳者固不少而小令為最小令之中訴衷情一詞一調又其最蓋篇篇竒麗字字清婉髙處不咸唐人風致也醉蓬萊上巳日有懷許下西湖葉少藴問春風何事斷送繁紅便拚歸去牢落征途笑行人羈旅一曲陽關斷雲殘靄做渭城朝雨玉維詩渭城朝雨浥輕塵客舍青青柳色新勸君更盡一杯酒西出陽關無故人𣣔寄離愁緑隂千囀黃鸝空語遙想湖邊浪搖空翠管絃風髙亂花飛絮曲水流觴有山翁行處翠袖朱欄故人應也弄畫船煙浦會寫相思尊前為我重翻新句春雲怨黃鍾商馮偉夀雲目春風惡劣把數枝香錦和鶯吹折雨重柳腰嬌困燕子𣣔扶扶不得軟日烘煙乾風收霧芍藥茶䕷弄顔色簾幕輕隂圖書清潤日永篆香絶盈盈笑靨宫黃額試紅鵉小扇丁香雙結團鳯眉心情郎貼教洗金罍共看西堂醉花新月曲水成空蘭亭記事見前集注麗人何處杜麗人行三月三日天氣新長安水邊多麗人往事暮雲萬葉三臺清明應制万俟雅言見梨花𥘉帶夜月晏元獻公梨花院落溶溶月海棠半含朝雨內苑春不禁過青門御溝漲潛通南浦東風靜細柳垂金縷唐人詞楊柳風展盡黃金縷望鳯闕非煙非霧好時代朝野多歡遍九陌太平簫鼓乍鶯兒百囀斷續燕子飛來飛去近緑水臺榭映秋千鬪草聚雙雙遊女餳香更酒冷寶典斫杏仁為酪以餳沃之踏青路會暗識夭桃朱户唐音謙詩草草踏青人向晚驟寶馬雕鞍注見前醉襟惹亂花飛絮正輕寒輕暖漏永衛渥寒城夜惻惻輕寒剪剪風半隂半晴雲暮王晉卿詞乍雨乍晴寒食路禁火天巳是試新粧韋應物詩雨中禁火空齋冷歲華到三分佳處清明看漢宫傳蠟炬散翠煙飛入槐府韓翃詩春城無處不飛花寒食東風御柳斜日暮漢官傳蠟燭輕煙散入五侯家斂兵衛閶闔門開住傳宣又還休務蝶戀花趙德麟安定郡王𣣔減羅衣寒未去不捲珠簾人在深深處紅杏枝頭花幾許啼痕止恨清明雨毆詞紅杏開一清明雨盡日水沉香一縷宿酒醒遲惱破春情緒飛燕又將歸信誤小屏風上西江路水龍吟和質章夫韻劉叔安隨如弄晴臺館收煙候時有燕泥香墜宿醒未解單衣𥘉試騰騰春思前度桃花去年人靣見前集注重門深閉記彩鸞别後青驄歸去長亭路芳塵起十二屏山遍倚任蒼苔點紅如綴黃昏人靜暖煙吹月一簾花碎芳意婆娑絲隂風雨畫橋煙水笑多情司馬留春無計濕青衫淚白樂天就中誰獨泣最多江州司馬青衫濕端午喜遷鶯梅霖𥘉歇正絳色海榴爭開佳節角黍包金風土記端午日進角黍香蒲砌玉是日飲菖蒲酒是處玳筵羅列鬪巧盡輸年少玉腕綵絲雙結艤綵舫見龍舟兩兩波心齊發竒絶難畫處激起浪花翻作湖間雪畫鼓轟雷東坡詩腰鼓百靣如春雷紅旗掣電奪罷錦標方徹湟中水天日暮猶自珠簾髙揭滕玉閣記珠簾暮捲西山雨棹歸晚載荷香十里東坡逰法華山詩歸塗十里盡荷風一鈎新月柳宿岩下詩新月一鈎吐齊天樂踈踈幾點黃梅雨古詩梅子黃時雨佳時又逢重午角黍包金香蒲泛玉風物依然荆楚風土記端午烹鷔以菰葉褁粘米謂之角黍衫裁艾虎更叉裊朱符臂纏紅縷歲時記端午以艾為虎形或剪綵為小虎粘又葉以戴文章簡公帖子云花隂轉午清風細玉燕叉頭艾虎輕抱朴子五問辟兵之道答曰以五月五日作赤靈符著心前歐陽公帖子五兵消以德何用赤靈符令謂之叉頭符風俗通五月五日以五綵絲繫臂者辟鬼及兵一名長命縷一名續命縷一名辟兵繒撲粉香綿唤風綾扇小窗午沉湘人去已逺勸君休對景感時懷古續齊諧記屈原以五月五日投汨羅江而死楚人哀之慢囀鶯喉輕𫾣象板勝讀離騷章句荷香暗度漸引入醄醄醉香深處卧聽江頭畫船喧韻鼓章簡公帖子絲竹漸髙撓鼓急瑶渾亭下竟鳬車賀新郎劉方叔翠葆搖新竹周詞新篁榣動翠葆正榴花枝頭葉底鬪紅爭緑王安石榴花詩万緑枝頭紅一點動人春色不須多誰在紗窗停針線間理竹西舊曲杜牧詩斜陽竹西路哥吹是楊州又還是蘭湯新浴青箱記蘭湯備浴傳􅍮楚水馬浮江弔屈源手弄合歡雙綵索風土記以五色綵絲為百索笑偎人福夀低相祝金鳯嚲艾花矗龍舟噀水飛相逐記當年懷沙舊恨至今遺俗雨過平蕪浮天闊畫艗凌波盡簇沸十里笙歌聲續李白詩蘭蕙相隨皆妹女風光去處滿笙歌好是蟾鈎隨歸棹任歡呼船重成頽玉晉嵇康醉如玉山之將頽猶未忍罩銀燭賀新郎劉潛夫後村深院榴花吐畫簾開綵衣紈扇午風清暑兒女紛紛新結束杜世上兒女徒約紛時樣叉符艾虎劉昭曰桃印本漢制以止惡氣令端午以綵繪篆符為叉頭符以相遺荆門記午節人皆綵艾為虎為人挂於門以辟邪氣早已有遊人觀渡荆楚記屈原午日投汨羅江西死後人以舟楫救之遂俗成兢渡也老大逢埸慵作戲任白頭年少爭旗鼓溪雨急浪花舞靈均標致髙如許靈均屈原也憶生平既紉蘭佩楚詞紉秋蘭以為佩又懷椒糈離騷奠桂酒兮椒漿誰信騷魂千載後波底垂涎角黍古詞角黍包金菖蒲切玉又説是蛟饞龍怒似而今醒到了料當年醉死差無苦聊一笑吊千古又思逺樓前路思逺樓在溫州與西山相對望平堤十里湖光畫船無數緑蓋盈盈紅粉靣葉底荷花解語天寶遺事大液池千葉蓮開明皇與如子共賞帝指妃謂左右曰何如此解語花耶鬪巧結同心雙縷尚有經年離别恨一絲絲揔是相思處相見也又重午清江舊事傳荆楚嘆人情千載如新尚沉菰黍且盡樽前今日醉誰肯獨醒吊古漁父辝衆人皆醉我獨醒泛幾盞菖蒲緑醑兩兩龍舟爭競渡古詞見龍舟兩兩波心齊彂奈朱簾暮捲西山雨滕王閣詩畫棟朝飛南浦雲朱簾暮棬西山雨看未足怎歸去南柯子蘇子瞻山與歌眉斂波同翠眼流遊人都上十二樓不羡竹西歌吹古楊州注見前菰黍連昌歜風上記五月五日以菰葉褁粘米楚祭屈原之餘風又俗飲菖蒲酒左饗有昌歜注菖蒲也瓊彛倒玉舟誰家水調唱歌頭明皇雜録明皇好水調歌頭胡羯犯京土𣣔遷幸猶登花蕚樓置酒四顧悽愴使其中人歌水調畢因倚視樓下有工歌而善水調者乎有一少年自言工歌亦善水調遊歌曰山川滿目泪沾衣富貴榮華得幾時不見只今分水上惟有年年秋鴈飛上聞之潸然曰誰為此調左右曰宰相李嶠上曰真才子也不待曲終水調曲頗廣謂之歌頭豈非首章之一解乎聲繞碧山飛去晚雲留博物志秦青善謳每擊節而歌聲振林木響遏行雲七夕鵲橋仙秦少遊纎雲弄巧飛星傳恨銀漢迢迢暗度杜銀漢會雙星金風玉露一相逢李密詩金風蕩佳節杜玉露團清影僧清江詩七夕景迢迢相逢只一宵便勝却人間無數毆陽公七夕詩暮云天上休相見猶勝人間去不回柔情似水佳期如夢隱羅七夕詩惆悵佳期又一年忍顧鵲橋歸路風俗記織女七月七曰當渡河使鵲為橋兩情若是久長時又豈在朝朝暮暮宋玉髙唐賦朝為行雲暮為行雨朝朝暮暮陽臺之下按七夕歌以雙星會少别多為恨少遊此詞謂兩情若是夕長不在朝朝暮暮所謂栳臭腐為神竒寧不省人心目二郎神柳耆卿炎光謝過暮雨芳塵輕灑乍露冷風清庭户爽天如水注見前集玉鈎遙挂應是星娥嗟人阻敘舊約颷輪𣣔駕極目處微雲暗度耿耿銀河髙瀉長恨歌遲遲鍾鼓𥘉長夜耿耿星河𣣔曙天間雅須知此景古今無價運巧思穿針樓上女􅍮楚嵗時記七夕婦人結綵樓穿七孔針陳瓜果於庭中乞巧檯粉靣雲鬟相亜鈿合金叉私語處長恨歌唯將舊物表深情鈿合金叉寄將去叉留一股合一扇叉擘黃金合分佃但令心似金鈿堅天上人間會相見臨别殷勤重寄詞詞中有誓兩心知七月七日長生殿夜半無人私語時算誰在回廊影下願天上人間占得歡娛年年今夜賀新郎宋謙父壷山靈鵲橋𥘉就七夕歌神官召集役靈鵲直渡銀河橫作橋記迢迢重湖風浪去年時候嵗月不留人易老萬事茫茫宇宙但獨對西風搔首巧拙豈關今夕事奈癡兒騃女流傳􅍝添話柄柳州柳柳宗元如柳州作乞巧文道人識破灰心久只好風涼月佳時踈狂如舊休笑雙星經嵗别杜詩銀漢會雙星謝惠連詩雲漢有靈匹彌年闕相從人到中年巳後雲雨夢楚襄王高唐夢詩見前注可曽常有雪藕調氷花熏茗杜詩公子調水水佳人雪藕絲正梧桐雨過新涼透且隨分一杯酒鵲橋仙謝勉仲鈎簾借月染雲為愰花靣玉枝交映涼生河漢衣裘而往及至月宫寒凜時異上不能禁靜能出丹二粒進上服之起舞弄清影何似在人間杜詩人間月影清轉朱閣低綺户照無眠李白詩月明𣣔素秋不眠不應有恨何事長向别時圓唐詩月如無限月長圓人有悲歡離合月有隂晴圎缺此事古難全但願人長久千里共嬋姢文選謝莊月賦隔千里兮共明月李白憶舊遊詩嬋姢美女𥘉月輝東坡自亭云丙辰中秋歡飲逹且大醉作此篇廉懷子由菬溪漁隱云先君嘗云柳詞鱉山綵結蓬萊島當云綵締坡詞低騎户當云窺綺户二字既改其詞益佳苕溪云中秋詞自東坡水調歌頭一出餘詞盡廢然其後亦豈無佳調如朝次膺緑頭鴨一詞殊清碗但樽爼間歌猴以其篇長憚唱故煙沒無聞焉其詞云晚雲收淡天一片琉璃爛銀盤來從海底皓色千里登渾瑩無塵素娥淡濘淨可數丹桂參差玉露𥘉令金風未凛一年無似此佳時向坐久踈星時度烏鵲正南飛瑶臺令闌干憑暖欲正遲遲念佳人音塵隔後對此應解相思最關情漏聲正永暗斷腸花影潛移料得來宵清光未咸隂晴天氣又爭知共疑戀如今别後還是隔年期人縱健清樽素月長願相隨念奴嬌新添憑高眺遠見長空萬里雲無留迹桂魄飛來光射處冷浸一天秋碧玉宇瓊樓乘鸞來去人在清􅋽國龍城録八月望日唐明皇遊月宫寒氣逼人露下霑衣見大府榜曰廣寒清虛之府少前見素娥十餘人皆皓衣乘白鵉舞於大桂樹下江山如畫望中煙樹歷歷我醉拍手狂歌舉杯邀月對影成三客李白詩舉杯􅌽明月對影成三人起舞排徊風露下今夕不知何夕詩今夕何夕便𣣔乘風翩然歸去何用騎鵬翼水晶宫裏一聲吹斷橫笛念奴嬌新添葉少藴石林居士洞庭波冷望氷輪𥘉轉滄海沉沉萬頃孤光雲陳卷長笛吹破層隂洶湧三江銀漢無際遙帶五湖深酒闌歌罷至今鼉怒龍吟回首江海平生漂流容易散佳會難尋縹眇髙城風露爽獨倚危檻重臨醉倒清樽嫦娥應笑猶有向來心廣寒宫殿事見前注為余聊借瓊林洞仙歌泗州中秋作此絶筆之詞也新添朝無咎青煙羃處碧海飛金鏡永夜間階臥桂影露􅋽時零亂多少寒螿神京逺惟有藍橋路近藍橋神仙之所居也水晶簾不下雲母屏開冷浸佳人淡脂粉待都將許多明付金樽投曉共流霞傾盡杜詩細酌流霞更携取胡床上南樓晉庾亮在武昌諸佐吏殷浩之徒乘秋夜往共登南樓不覺亮至亮曰諸君少住老子于此興復不淺便據明床與浩等談詠看玉做人間素秋千頃苕溪叢詰云允作詩詞要當如常山之蛇救首救尾不可偏也如朝無咎作中秋洞仙歌其首云青煙羃處至間階卧桂影固巳佳矣其後云待都將許多明付與金樽至素秋千頃若此可謂善救首尾者也至朱希真作中秋念奴嬌則不知出此其首云插天翠柳𬒳何人椎上一輪明月照我藤床涼似水飛入瑶臺銀闕亦巳佳矣其後云洗盡凡心滿身清露冷浸蕭蕭髮明朝塵世記取林向人説此兩句全無意味收拾得不佳􅨕并本篇其氣素然矣金菊對芙蓉重陽辛幼安逺水生光遙山聳翠霽煙深鎖梧桐正零瀼玉露淡蕩金風杜詩皆傳玉露秋張景陽詩金風扇素節東籬菊有黃花吐陶詩採菊東籬下禮記月令菊有黃華對映水幾簇芙蓉重陽佳致可堪此景酒釅花濃追念景物無窮嘆少年胸襟忒煞英雄把黃英紅蕚甚物堪同除非腰佩黃金印晉周顗傳明年殺諸賊奴取金印如斗大座中擁紅粉嬌容此時方稱情懷盡拚一飲千鍾六么令新添仙吕周美成快風收雨亭館清殘燠池光靜橫秋影岸柳如新沐聞道冥城酒美昨日新醅熟輕鑣相逐衝泥䇿馬來折東籬半開菊陶潛採菊東籬下華堂花艷對列一一驚郎目牧之為御史分司李司徒間居路一日開筵杜引三爵冷曰華堂今日綺筵開誰唤分司御史來忽彂狂吟驚滿座兩行紅粉一時回梁武帝襄陽歌大提諸女兒花艷驚郎目歌韻巧共泉聲間雜琮琤玉韓愈詩泉聲玉琮琤惆悵周郎已老莫唱當時曲吳志云周俞曉音樂時人語曰曲有誤周郎顧幽歡難卜杜詩幽歡下夜闌明年誰健更把茱茰再三囑杜詩明年此會知誰健好把茱茰子細看水調歌頭韓無咎南澗今日我重九莫負菊花開試尋高處携手躡屐上崔嵬放目蒼崖萬仞雲護曉霜成陳古詞幾點護霜雲影轉知我與君來古寺倚修竹古詩日暮倚修竹飛檻絶纎埃笑談間風滿座酒盈杯仙人跨海休問隨處是蓬萊落日平原西望鼓角秋深悲壯杜詩五更鼓角聲悲壯戲馬但荒臺文選劉𥙿為宋公在彭城九月九日遊項羽戲馬臺細把茱茰看一醉且徘徊木蘭花慢亰仲遠算秋來景物皆勝賞况重陽正露冷𣣔霜輕煙不雨玉宇開張劉休元詩王宇來清凮蜀人從來好事遇良辰不肯負時光藥市家家簾幕酒樓處處絲簧婆娑老子興難忘庾虎云老子于此興復不淺聊復與平章也隨兮登高風俗記九日登髙以穰災厄茱茰綴席杜綴席茱茰好菊蘃浮觴李詩携觴酌流霞搴菊泛寒蕊明年未知誰健笑杜陵底事獨凄􅋽事見前注不道頻開笑口年年落帽何妨孟嘉為桓溫參軍九日溫宴龍山時佐史吏並戎服風至吹嘉帽墮落嘉不覺之南鄊子蘇東坡霜降水痕收杜詩寒水各依痕淺碧𥻘𥻘露逺洲酒力漸消風力軟颼颼破帽多情却戀頭詩見前詞詩酒若為酬韓詩嘉節迫吹帽杜牧之詩但將酩酊酬佳節但把清樽斷送秋萬事到頭都是夢潘閬詩万事到頭都似夢休嗟百計不如人休休明日黃花蝶也愁鄭谷九日菊詩節去蜂蝶愁不知曉庭猶繞折殘技自緣今日人心别未必秋香一夜衰三人老人録云自來九日多用落帽事獨東坡云破帽多情却戀頭尤為竒特鷓鴣天黃山谷黃菊枝頭破曉寒人生莫放酒杯乾風前橫笛斜吹雨醉裏簮花倒著冠舊俗重陽日插菊花飲酒晉山翁倒著白接籬身健在杜明年此日知誰健且加餐杜加餐可扶老舞裙歌板盡清歡杜興來終日盡君歡黃花白髮相牽捝杜九日詩昔日黃花酒今朝白髮稠付與時人冷眼看西江月蘇子瞻點點樓前細雨重重江外平湖李白平詩湖注澄流當年戲馬會東徐事見前今日凄􅋽南浦莫恨黃花未吐且教紅粉相扶酒闌不必看茱莄俯仰人間今古杜詩侻仰悲身世醉花隂李易安薄霧濃雲愁永晝瑞腦噴金獸金獸所以炷香佳節又重陽寶枕紗厨半夜秋𥘉透東籬把酒黃昏後陶淵明飲酒詩採菊東籬下悠然見南山有暗香盈袖莫道不銷魂文選江淹别賦黯然銷魂惟别而已簾捲西風人似黃花瘦除夕東風齊著力胡浩然殘臘收寒三陽𥘉轉已换年華東君律管迤邐到山家處處笙簧䁀沸會佳宴坐列仙娃花叢裏金爐滿爇龍麝煙斜見前注此景轉堪誇深意祝夀山福海增加玉觥滿泛且莫厭流霞杜詩細酌流霞幸有迎春夀酒詩為此春酒以介眉夀銀瓶浸幾朵梅花休辭醉園林秀色古詩春到園林皆挺秀百草萌牙送入我門來黃鍾商調胡浩然荼壘安扉靈馗挂户風浴通黃帝上古之時有神荼鬱壘兄弟二人性能執鬼於度朔山桃樹下簡閲百鬼之無道者縳以葦索執以飼虎張平子東都賦云首以鬱壘神茶副焉明皇晝寢夢一小鬼衣絳贖鼻洗一足履一是腰懸一履搢一筠扇盜太貞繡香囊大叱問之小鬼奏曰臣乃虛耗也上怒𣣔呼力士俄見一大鬼頂破帽衣藍抱繫角帶靸朝靴徑捉小鬼先刳其目然後擘而啖之上問爾為誰奏云臣終南山進士鍾馗也神儺烈竹轟雷神異經西方深山中有人長丈餘犯人則病寒熱名曰山臊人以竹著火中焷林有聲而山臊驚焷動念流光四序式適回須知今歲今宵盡似頓覺明年明日催王䛩除夜詩今歲今宵盡明年明日催寒隨一夜去春逐五更耒向今夕是處迎春送臘羅綺筵開今古遍同此夜賢愚共添一歲貴賤仍階互祝遐齡山海固難催石崇富貴籛鏗夀晉石崇富埒王公鉞籛鏗即彭祖夀八百歲更潘嶽儀容子建才潘嶽美姿容所至擲果盈車曹子建有七步成詩之才仗東風盡力一齊吹送入此門來天文氣候念奴嬌黃山谷斷虹霽雨滕王閣記虹銷雨霽淨秋空山染修眉新緑韓南山詩天宇浮修眉濃緑晝新就桂影扶踈杜詩斫却月中桂扶踈万古同誰便道今夕清輝不足杜詩刀里共清輝萬里青天嫦娥何處王充論衡后羿妻請不死之藥又西王母因竊其藥以奔月宫是為姮娥駕此一輪玉寒光零亂李白詩我歌月徘徊我舞影零亂為人偏照醽醁龍城録魏左相能治酒其名醽醁名濤公稱醽醁似蘭生翠濤過玉薤千日醉不醒十年味不敗年少隨我追遊晚城幽徑繞張園森木見詞話注共倒金荷家萬里難得樽前相屬老子平生江南江北最愛臨風曲南唐韓熙載詩僕本江比人今作江南客再去江北遊江南有人意孫郎微笑坐來聲噴霜竹古詞倚風三噴橫竹苕溪漁隱云山谷云入月十七日與諸生步自永安城入張寬夫園符月以金荷葉酌客客有孫叔敏善長笛連作數曲諸甥曰今曰之會樂矣不可以無述公因作此曲記之文不加點或以為可繼東坡赤璧之詞云念奴嬌上太守月詞范元卿玉樓絳氣異聞録古鏡記隋御史王度有寶鏡大業中有胡僧云宅上常有碧光連日絳氣屬天此寶鏡氣也捲霞綃雲浪飛空蟾魄人世江上驚照耀杜月詩江上同照鳥鵲自多驚煙靄鰲峰千尺陸海蓬壺銀葩星暈點破琉璃碧士筠詩衝破碧琉璃有人吟笑紫荷香滿晴陌韻語陽秋云近世作文多以紫荷囊作侍從事使不知其誤晉與服志云入座尚書則荷紫以生紫為拾囊縫之服外在于左肩所謂荷紫者非荷芰之荷乃負荷之荷也人徒見南史著紫荷囊四字遂作一句言之殊不知晉書荷紫之義亦未免有此矣况是東府君候唐李密傳東璧圖書之府西清别騎甘泉賦或倣徨于西清注西清謂西廂清間處樽爼開華席迤邐飛輪催杖屨入對青藜仙客王子年拾遺記劉向校書天祿閣夜有老父著黃衣植青藜杖叩閣而進見向暗中誦書乃吹杖端煙然因只見向問其姓名曰我太乙之精荆公詩曰不知太乙遊何處定把青藜燭照公𥜗袴歌謡人鹿范傳遷南陽太守先蜀多火災禁民夜作以防火范但令儲水為便百姓歌之曰廉叔度來何暮不禁火民安作昔無𥜗令五袴升平風露取金蓮側梅花吹動李白從軍行笛奏梅花曲滿城依舊春色念奴嬌月詞朱希真插天翠柳杜高柳半天青𬒳何人堆上一輪明月照我藤床涼似水飛入瑶臺銀闕瑶臺崑崙之異名李白詩瑶臺雪花數千點又香閣不瑶闕二露冷笙簫坡詩至今微月夜笙蕭來絶山風清環珮玉鎖無人掣間雲收盡海光天影相接誰信有藥長生杜月詩搗藥兔長生素娥新煉就飛霜液雪擊碎珊瑚晉石崇冨盛以鐡如意擊碎珊瑚樹爭似看仙桂扶踈竒絶酉陽雜爼言月桂髙百丈人有斫伐樹創隨合洗盡凡心滿身清露冷瀟瀟髮唐褚遂良帖華髮瀟瀟明朝塵世記取休向人説念奴嬌中秋月朱希真尋常三五古詩三五明月滿問今夕何夕詩繆綢今夕何夕嬋姢都勝李白詩嬋姢美如𥘉月輝天闊雲收崩浪靜深碧琉璃千頃杜詩江里碧琉璃銀漢無聲杜詩河漢聲西流氷輪直上玉原夫人詩氷輪碾太清玉兔步碧虛桂濕扶踈影綸巾玉塵晉謝万常自綸巾以見簡文帝王衍每提玉柄塵尾清談與手同色庾樓無限清興晉庾亮在武昌諸佐吏殷浩之徙乘月夜往共登南樓不覺亮至亮曰諸君少住老子於此興復不淺便據胡床與浩等談詠誰念江梅飄零李白詩平生江海心垂老見飄零不堪回首驚鵲南枝冷魏文帝短歌行月明星稀鳥鵲南飛撓樹三匝無枝可依萬點蒼山何處是修竹吾廬三徑陶淵明詩吾亦愛吾廬歸去來辭三徑就荒松菊猶存香霧雲鬟清輝玉臂杜香霧雲鬟􅊜清輝玉臂寒醉了愁重醒參橫斗轉隋開皇中趙師雄遷羅浮一日於松林間酒肆旁舍見美人淡樁素服出迎時殘雪未消月色微明師雄與語芳香襲人因與共飲久之東方巳白起視梅大花樹下月落參橫但惆悵而巳轆轤聲斷金井杜轆轤東階鹿李梧桐落金井一葉飛銀床念奴嬌李漢老素光練靜映秋山杜詩索窗素月垂文練又吹笛秋山凮月清隱隱修眉橫緑見前注杜韓詩鳷鵲樓髙天似水選謝眺詩金皮麗鳷鵲玉繹低建章李白秋聲賦碧天如水兮窅窅悠悠碧瓦寒生銀粟東坡詩凍合玉樓寒起粟萬丈斜暉奔雲湧霧飛過盧同屋韓詩玉川先生洛城裹破屋數間而已矣更無塵氣滿庭風碎梧竹誰念鶴髮仙翁五代史周桓公曰吾老矣雞皮鶴髮當年曽共賞紫巖飛瀑對影三人聊痛飲李白月下獨酌詩舉林邀明月對飲成三人世説王孝伯曰但痛飲熟讀離騷便可作名士一洗離愁千斛古詩百年莫惜千回飲一醉能消萬斛愁斗轉參橫見前注翩然歸去萬里騎黃鵠杜詩安能騎黃鵠滿天霜曉呌雲吹斷橫玉苕溪漁隱云李漢老此詞有滿天霜曉呌雲吹斷橫玉之句乃用崔魯華清宫詩銀河漾漾月輝輝樓礙天邊織女機橫玉呌雲清似水滿空霜逐一聲飛或云呌雲乃笛名非也念奴嬌和前韻姚孝寧素娥睡起龍城記八月望日明皇遊月宫見素嫵十余人皆皓衣乘白鵉駕氷輪碾破一天秋緑氷輪見前注醉倚髙樓風露下凛凛寒生肌粟橫管孤吹龍吟風徑文選馬融長笛賦近世雙笛從羌起羌人伐竹未及巳龍吟水中不見形截竹吹之聲相似雪浪翻銀屋李白詩江中白浪如銀屋壯遊回首會稽何限修竹晉王羲之蘭亭序暮春之𥘉會于會稽山隂之蘭亭修禊事也此地有崇山峻嶺茂林修竹今夜對月依然樽前須快㵼山頭嗚瀑吸也清光傾肺腑洗我明珠千斛韓簸弄明月珠坡詩我無明月十斛珠只恐嬋姢明年依舊衰鬢先成鵠舉杯相勸為豫且挂團玉念奴嬌八韓子蒼海天向晚漸霞收餘綺波澄微緑謝眺詩餘霞散成綺江淹別賦春草碧色春水緑波木落山髙真箇是一雨秋容新詠雪醜奴兒令康伯可馮夷剪碎澄溪練馮夷何伯也謝玄暉詩澄江靜如練飛下同雲詩上天同雲雨雪氛氛著地無痕柳絮梅花處處春崔郁雪詩不辨梅花與雪花山隂此夜明如晝晉王徽之居山隂雪夜𥘉霽月色明朗忽憶戴安安時在剡便乘船詣之不前而反人間其故曰乘興而行興盡而反何必見戴安道耶月滿前村莫掩溪門恐有扁舟乘興人事見上注花庵詞客云順庵作此詞促飬直赴雪夜溪堂之約一本澄溪作澄江飛下同雲作吹下紛紛柳絮梅花處處春作栁絮楊花觸處春既用柳絮又用楊花是關門閉户掩柴扉也月滿前村作月破黃昏既曰此夜又破黃昏意亦重復青玉案陳瑩中碧空黯淡同雲繞同雲見前注漸枕上風聲峭明透紗窗天𣣔曉謂雪之明透上紗窗如天將曉也珠簾才捲古詞捲上珠簾一光美人驚報一夜青山老謂雪遍山頭故云一夜青山老使君命客金尊倒杜爛熳倒芳樽正千里瓊瑶未經掃欹壓江梅春信早韓欺梅併壓枝十分農事滿城和氣管取來年好謝惠連雪賦盈尺則呈瑞于豐年憶秦娥雲垂幕隂風慘淡天花落天花落千林瓊玖滿空鸞鶴謂雪如瓊玖之遍千林鸞鶴之滿空也征車渺渺穿華薄路迷迷路增離索增離索楊子離群而索居楚溪山水碧湘樓閣詠雨滿江紅斗帳高張寒窗靜瀟瀟雨意詩風雨瀟瀟雞鳴膠膠南樓近更移三鼓古詞樓頭尚有三通鼓漏傳一水説文漏以銅盛水莭晝夜以為刻點點不離楊柳外聲聲只在芭蕉裏唐詩一夜不眠孤客耳主人窗外有芭蕉也不管滴破故鄊心唐詩無端一夜空階雨滴破思鄉萬里心愁人耳文選夜雨滴空階階空階裏空階滴不入滴入愁人耳無似有逰絲細杜詩落絮逰絲别有情聚復散珍珠碎杜詩万珠跳猛雨天應分付與别離滋味破我一床蝴蝶夢莊子莊周夢胡蝶相相然蝴蝶也輸他雙枕鴛鴦睡古詩客從遠方來遺我一端綺文彩雙鴛鴦裁為合歡𬒳向此際别有好思量人千里選謝希逸月賦美人邁兮音問闕隔千里兮共明月洞仙歌九李元膺簾纎細雨殢東風如困縈斷千絲為誰恨向楚宫一夢乃楚襄王巫山夢事多少悲涼無處問愁到而今未盡分明都是淚泣柳沾花常與騷人伴孤悶盧同茶歌七碗破孤悶記當年得意處酒力方酣怯輕寒玉爐香潤溫庭筠詞篆縷玉爐香又豈識情懷苦難禁對點滴簷聲夜寒燈暈杜夢覺燈花暈綺羅香春雨史邦卿微冷欺花薄煙困柳蕭遇詩水堤煙報柳千里偷催春暮盡日冥迷愁裏𣣔飛還住驚粉重蝶宿西園鄭谷蛑詩微雨宿花房喜泥潤燕歸南浦杜芹泥隨燕嘴最妨他佳約風流鈿車不到杜陵路沈沈江上望極還𬒳春潮急難尋官渡唐韋詩春潮帶雨晚未急野渡無人舟自橫隱約遙峯和淚謝娘眉嫵眉嫵事見前注臨斷岸新緑生時是落紅帶愁流處記當日門掩梨花古詞雨打梨花深閉門剪燈深夜語司空曙詩孤燈寒照雨又唐詩笑剪燈花夜向闌春霽春晴胡浩然遲日融和杜遲日江山麗乍雨歇東郊嫩草凝碧江淹賦春草碧色紫燕雙飛海棠相襯粧點上林春色黯然望極困人天氣古詞輕暖輕寒正是困人天氣渾無力又聽得園苑數聲鶯囀柳隂直唐詩鶯聲巧轉緑楊隂當此暗想故園繁華􅓻然遊人依舊南陌院深沉梨花亂落晏詩梨花院落溶溶月那堪如練點衣白酒量頓寬洪量窄算此情景除非殢酒狂歡恣歌沉醉有誰知得秋霽秋晴新添陳後主虹影侵階乍雨歇長空萬里凝碧孤鶩髙飛落霞相映逺狀水鄊秋色滕王閣詩落霞與孤鶩齊飛秋水共長天一色黯然望極動水無限愁如織又聽得雲外數聲新鴈正嘹嚦當此暗想畫閣輕拋杳然殊無些箇消息漏聲稀銀屏冷落王建詞銀燭秋光冷晝屏那堪殘月照窗白衣帶頓寬猶阻隔算此情苦除非宋玉風流共懷傷感有誰知得醉蓬萊桞耆卿漸亭皋葉下隴首雲飛素秋新霽韓詩時愁積雨霽華闕中天鎖匆匆佳氣光武紀論望氣者至南陽望見春陵郭曰氣佳哉鬱鬱蔥䓤嫩菊黃深拒霜紅淺近寶階香砌玉宇無塵金莖有露西都賦杭仙掌以承露棹雙立之金莖碧天如水正值升平萬機多暇夜色澄鮮漏聲迢遞南極星中有老人呈瑞杜今宵南極外甘作老人星此際宸遊鳯輦何處度管絃聲脆太液波翻太夜宫名披香簾捲唐蘇世長傳侍宴披香殿月明風細花庵詞客云耆卿為屯田員外郎會太史奏老人星現時秋霽宴禁中仁宗命左右詞臣為樂章曰侍屬耆卿應制耆卿方兾進用作此詞奏呈上見首有漸字色若不懌讀至宸逰鳳輦何處乃與御製真宗晚詞暗台上慘然不恱又讀至太液波翻曰何不言波澄投之于地自此不復擢用曉景蝶戀花曉行周美成月皎驚烏棲不定畢公叔早行詩火逺天俱白煙深月𣣔黃驚烏不定拂下一林霜更漏將殘轣轆牽金井杜詩云硯寒金井水又六一公詞金井轆轤聞汲水唤起兩眸清炯炯淚花落枕紅綿冷李賀詩九山靜緑淚花紅執手霜風吹鬢影李賀詩春風吹鬢影去意徊徨别語愁難聽樓上闌干橫斗柄咿喔晨雞鳴闌干橫斗柄露寒人逺雞相應南鄉子新添周美成晨色動粧樓連昌宫辭晨光未出簾影黑太真流洗樓上頭短燭熒熒悄未收自在開簾風不定颼颼池靣氷澌趂水流吳均詩散漫下氷澌早起怯梳頭𣣔綰雲鬟又却休不會沉吟思底事凝眸兩點春山滿鏡愁滿庭芳秦少遊山抹微雲杜月詩縱破微雲掩天連衰草畫角聲斷譙門暫停征棹聊共飲離樽李詩别離有相思瑶瑟與金樽多少蓬萊舊事空回首煙靄紛紛斜陽外寒鴉數點流水繞孤村杜孤村春水生銷魂當此際選江淹别賦黯然消魂惟别而巳天寶遺事長安東霸陵有橋呼為銷魂橋香囊暗解羅帶輕分謾嬴得秦樓薄幸名存秦樓事見前集注此夫何時見也襟袖上空染啼痕杜啼垂舊血痕傷情處韓凄然自傷情髙城望斷杜望極春城上燈火已黃昏行香子新添蘇子瞻北望平川野水荒灣共尋春杜尋春到野亭飛步巉嚴和風弄袖魏文帝歌孟春之月和風𥘉暢香霧縈鬟杜香霧雲鬟濕正酒酣人語笑白雲間陶供景詩山中可所有巃上多白雲只何自怡悅不堪持寄君飛鴻落照相將歸去淡姢姢玉宇清間何人無事宴坐空山望長橋上燈火亂使君還苕溪漁隱云惟北之地平夷自京師至汴口並無山惟隔淮方有南山南山石崖上有東坡行香子詞後題云與泗守過南山晚歸作字畫是東坡所書小字但無姓名崇觀間禁元祐文字遂鐫去之余居泗上打得此碑詞至今尚存馬臨江仙新添李知幾方舟煙桞踈踈人悄悄韓詩俏俏深夜語畫樓風外吹笙李衛公詩桂殿夜涼吹玉笙倚欄聞喚小紅聲薰香臨欲睡坡詩燈盡不挑垂暗葉香爐重撥尚餘薰坡詞寶香薰𬒳成孤宿玉漏巳三更崔夜詩玉漏銅壼且莫催坐待不來來不去一方明月中庭劉禹錫生公講堂詩一方明月可中庭粉墻東畔小橋橫起來花影下王介甫詩春色惱人眠不得月移花影上闌干扇子撲飛螢王建宮詞銀燭秋光冷晝屏輕羅小扇撲流螢天階夜色涼如水卧看牽牛織女星南鄊子新添黃叔眻王林萬籟寂無聲莊子子遊曰地籟則衆竅是巳人籟則比竹是巳敢問天籟子綦曰夫吹万木同而使其自巳也衾鐡稜稜近五更魏鶴山詩衾鐵稜夢夢不成香斷燈昏吟未穩見前坡詩詞注凄清只有霜華畔月明杜霜溪素月高趙紫芝詩禽翻竹葉霜𥘉下人立梅華月正高應是夜寒凝惱得梅花睡不成我念梅花花念我關情起看清氷滿玉鉼地理宫室金陵西河懷古周美成佳麗地謝玄暉詩江南佳麗地金陵帝王州南朝盛事誰記山圍故國繞清江髻鬟對起怒濤寂寞打孤城風檣遙度天際謝玄暉詩天際識歸舟斷崖樹猶倒倚莫愁艇子曽繫空遺舊迹鬱蒼蒼霧沉半壘夜深月過女墻來賞心東畔臨淮水劉禹錫金陵詩山圍故國周遭在朝打孤城寂寞回淮水東邊舊時月夜深還過女墻來樂府詩莫愁在何處住在石城西艇子折兩漿催送莫愁來韓握時雍是石城艇子來兩漿伊啞過花塢鄭谷詩石城昔為莫愁鄊莫愁魂散石城荒帆去帆來風浩渺花開花謝春悲涼詩話總龜云賞心亭丁晉公所作奏準絶致酒旗戲鼓甚處市歐陽公詩西風酒旗市想依稀王謝鄰里燕子不知何世入尋常巷陌人家相對如説興亡斜陽裏劉禹錫烏衣巷詩朱雀橋邊野草花烏衣巷口夕陽斜舊時王謝堂前燕飛入尋常百姓家漁隱叢話云王謝是二姓即王導謝安之族所居名烏衣巷有曰烏衣之聚不當作謝字或者乃引劉斧托遺所載唐王謝謝海遇風抵一州見烏衣國王以女妻之後航思歸取飛雲軒令榭入其中閉目少息至其家視之梁上雙燕泥湳後寄詩曰誤到華胥國裏耒主人終日獨憐才雲軒漂去無消息灑泪春風幾百回女答曰昔日相逢冥數合今時暌逺是生離耒年縱有想思字三月天南無鴈飛此小説虛誕何可信桂枝香金陵懷古王介甫登臨送目文選宋玉九辨登山臨水兮送將歸正故國晚秋天氣𥘉肅文選天髙万物肅瀟灑澄江似練謝玄暉詩澄江靜如練翠峯如族征帆去棹殘陽裏背西風酒旗斜矗綵舟雲淡杜詩清江白日落欲盡復携美人登綵舟星河鷺起李白鳯凰臺詩三山半落青天外一水中分白鷺州圖畫難足念自昔豪華競逐恨門外樓頭悲恨相續千古憑髙對此謾嗟榮辱羅鄴金陵登步詩憑高惆悵㧾今古一何殊六朝舊事隨流水吳東晉宋齊梁陳並都金陵是為六朝但寒煙衰草凝緑杜詩江頭宫殿鎖千門細柳新蒲為誰緑至今啇女時時尚歌後庭遺曲南史張貴妃傳陳後主遊宴後庭其曲有玉樹後庭花略曰璧月夜夜滿瓊樹朝朝新啇女嘗歌此古今詞話云今陵懷古諸公寄詞於挂枝香凡三十餘首獨介甫最為絶唱東坡見之不覺嘆息曰此老乃野孤精也念奴嬌赤璧懷古蘇子瞻大江東去浪淘盡千古風流人物李芳名動千古謝安寄為江左風流第一故壘西邊人道是三國周郎赤璧吳志周瑜字公瑾為建威中郎將吳中皆呼為周郎曹操入荆州劉琮舉衆降曹公得其水軍船及步兵數十萬將士聞之皆恐懼時劉備又新為曹公所玻因用魯肅計進駐夏口遣諸葛亮詣權欲謀同舉權遂遣瑜及程普等與備并力逆曹公於赤璧瑜部將黃蓋曰今冦衆我寡難與待久然觀操兵方進船艦首尾相接可燒而走也乃取蒙衝鬪艦數十艘實以薪草膏油權其中褁以惟幕上建牙旗書報曹公詐以欲降軍吏皆延􅖪觀望指言蓋降放諸船同時發火時風甚猛悉延燒岸上營須知焰煙張天人馬燒溺死者甚衆曹公退赤亂石穿空驚濤拍岸捲起千堆雪李白詩濤白雪山來江山如畫一時多少豪傑遙想公瑾當年小喬𥘉嫁了瑜𥘉從琮拔之時獲喬公二女皆國色䇿納大喬瑜納小喬䇿從容戲瑜曰喬公五女錐流離得吾二人為壻亦足矣雄姿英發吳志權謂吕子明可次於公瑾但言議英發不交之耳羽扇綸巾蜀志諸葛亮葛巾羽扇談笑間檣櫓灰飛煙滅李白赤璧歌二龍爭鬪決雌雄赤璧樓船掃地空烈火𥘉張照雲海周瑜於此破曹公諸本多作強虜灰飛煙滅投李曰此歌既曰樓船掃地空則用墻櫓二字其義優於強虜故國神遊多情應笑我早生華髮人生如夢李白詩處世若大夢胡為勞其生一樽還酹江月召溪漁隱云東坡大江東去赤璧詞語意高妙真古今絶唱近時有人和此詞題於郵亭璧間不著姓氏語雖粗豪亦氣槩亦喜今併録之詞云炎精中否歎人村委靡都無英物戎馬長驅三犯闕誰作連城堅璧楚漢吞并曹劉割據白帽今如雪書生鑽破舊編説甚豪傑天意建我中興吾君神武小曽孫周發海嶽封強俱效賊狂虜何曽追滅翠羽笛巡叩關無路途徒有衝冠髮孤忠耿耿劒鋒冷浸秋月西湖酹江月西湖和韻新添辛幼安晚風吹雨戰新荷聲亂明珠蒼璧誰把香奩收寶鏡雲錦周遭紅碧坡詩貪看翠蓋擁紅粧不覺湖邉一夜霜卷却天機雲錦假從教匹練寫秋光飛鳥翻空遊魚吹浪慣聽笙歌席坐中豪氣看君一飲千石遙想處士風流處士謂林浦也鶴隨人去已作飛仙客北山移文山人去兮夜鶴怨茅舍竹籬今在否松竹已非疇昔欲往當年望湖樓下水與雲寬窄醉中休問斷腸桃葉消息遊湖賀新郎新添劉改之龍洲睡覺啼鶯曉醉西湖兩峯日日買花簮帽去盡酒徒無人問惟有玉山自倒襄陽歌玉山自倒非人推任拍手兒童爭笑襄陽歌襄陽小兒齊柏手欄街爭唱白銅匙傍人借問笑何事笑殺山翁醉似泥一騎乘風翻然去避魚龍不見波聲悄歌韻逺唤蘇小白居易詩濤聲夜入伍貟廟柳色春藏蘇小家神仙路近蓬萊島列仙傳謝自然泛海求蓬萊一道士謂曰蓬萊隔弱水三十万里非飛仙不可到紫雲深參差樹有煙花繞杜詩紫禁正耐煙花繞人世紅塵西障日庾亮出據上流擁強兵趍向者多歸之王道內不能平遇西風塵起舉扇自障曰元規塵汚人禇彥句以腰扇障目百計不如歸好付樂事與他年少費盡柳金梨雪句李白宫詞柳色黃金嫩梨花白雪香問沉香亭北何時召心未愜鬢先老明皇與貴妃在沉香亭賞牡丹遣髙力士召李白應制賦清平調詞云名花國色兩相歡長得君王帶笑看解釋春風無限意沉香亭北倚闌干錢塘望海潮新添桞耆卿東南形勝三吳都會仁宗御製池有湖山美東南第一州錢塘自古繁華煙柳畫橋風簾翠幕參差十萬人家雲樹繞堤沙白居易詩万株松竹青山上十里沙堤明月中怒濤卷霜雪天塹無涯市列珠璣户盈羅綺競豪奢重湖疊巘清佳有三秋桂子十里荷花羌管弄晴菱歌泛夜嬉嬉釣叟蓮娃千騎擁高牙乘時聽簫鼓笑賞煙霞異日圖將好景歸去鳯池誇羅鶴林云此詞流播金玉亮聞歌欣然有慕於三秋桂子十里荷花遂起投渡江之志近時謝處厚詩云誰把杭州曲子謳荷花十里桂三秋那知卉木無情物牽動長江万古愁余謂此詞雖牽動長江之愁然卒為全生送死之媒未足也至于荷艷桂香粧點湖山之清麗使士大夫流連于歌舞嬉逰之樂遂忘中原是則深可恨耳八聲甘州追和東坡韻新添眺無咎謂東坡未老賦歸來天未遣公歸向西湖兩處秋波一種飛靄澄暉又擁竹西歌吹杜牧詩斜陽竹西路歌吹是楊州僧老水蘭非一笑千秋事浮世危機莫倚平山欄檻是醉翁飲處歐陽文忠公知除州日作亭琅邪山自號醉翁因以名亭後守楊州于僧寺建平山堂甚得觀覽之勝堂下手值柳數株後數年公在翰林金華劉原父出守維陽出家樂飲餞親作朝市惜之詞江雨霏霏送孤鴻揮手相接眼中稀念平生相從江海任飄蓬杜平生江海心不遣此心違登臨事更何須惜吹帽淋衣天台玉樓春詠劉阮事周美成桃溪不作從容住秋藕絶來無續處當時無奈鳥聲哀今日重尋芳草路續齊楷記漢永平中剡縣有劉晨阮肇入天台山採藥迷失道路糧盡望山頭有桃共取食之下山得澗水飲之見有一杯流出中有麻胡飯屑二人相謂曰去去不逺矣因過水深四丈許行一里又度一山出大溪見二女絶色唤劉阮姓名如有舊交道郎等來何晚也因邀過家床帳帷幔非人世所有又有仙客數人將三万桃至云來慶女壻各出樂器作樂二人就女家止宿遂行夫婦之禮住半年天氣常如二三月木鳥哀鳴永歸甚切女曰罪根未滅使君等如此送從洞口去鄉里異之自入山至歸巳七代子孫矣欲還女家尋山路不蒦煙中列岫靑無數鴈背夕陽紅欲暮人如風後入江雲杜詩半入江風半入云情似雨餘粘地絮俗東坡有點綘唇詠天台云醉樣輕舟信流直到花深處塵緣拍誤無計花間住煙水茫茫回首斜陽暮山無𢾗亂紅如雨不計來時路蓋全用劉阮天台事也今併附于此洞仙歌垂虹橋林外飛梁壓水飛梁橋也尓雅釋各橋水梁也虹影澄清曉橘里漁村半煙草嘆今來古往淮南子齊俗説往古來今謂之宙物换人非天地裏惟有江山不老雨巾風帽郭林宗遇雨其巾墊而拆其角一孟嘉宴龍山風至吹落嘉帽也四海誰知我一劒橫空幾畨過按玉龍嘶未斷月冷波寒歸去也林屋洞關無鎖韓詩洞門無鎖鑰俗客不曽來認雲屏煙障是吾廬淵明詩吾亦愛吾廬任滿地蒼苔年年不掃杜詩石田茅屋荒古今詞話云此詞乃近時林外題豫蒼苔吳江垂虹亭世或傳以為吕洞賓所作者非也水閣天仙子景物因人成勝槩滿目更無塵可礙等間簾幕小闌干衣未解心先快明月清風如有待杜詩江山如有待誰信門前車馬隘别是人間間世界李白詩别有天地非人間杜鶯花隨世界坐中無物不清涼山一帶水一派流水白雲長自在增修菚注妙選群英草堂詩餘卷上增修箋注妙選羣英草堂詩卷下後集人物名賢詞話隱逸滿江紅幽居吕居仁東里先生家何在山隂溪曲晉王猷字徽之嘗居山隂對一川平野杜詩星垂平野闊數椽茅屋昨夜岡頭新雨過門前流水清如玉抱小橋回合柳參天杜詩喬木上參天搖新緑杜詩茅齋八九緣踈籬下叢叢菊陶詩東簡採菊下虛簷外蕭蕭竹李白修北詩修窗竹嘆古今得失是非榮辱韓詩棄置人間事古來今獨非杜詩吾老甘貧病縈懷有是非又忘情任榮辱須信人生歸去好世間万事何時足問此青春醖酒何如詩為此春酒以介眉夀今朝熟苕溪漁隱曰余性樂間退一丘一壑蓋特老焉吕居仁所作此詞能具道阿堵中事每一哥之未嘗不挈節也摸魚兒退居眺無咎買陂塘旋栽楊柳依稀淮岸湘浦東皋雨過新痕漲歸去來辭登東皋以舒肅沙觜鷺來鷗聚堪愛處最好是一川夜月光流注無人自舞任翠幄張天柔禋籍地酒盡未能去青綾𬒳休憶金閨故步杜諸公金潤彥儒冠曽把身誤杜儒冠多誤身弓刀千騎成何事荒了召平瓜圃漢召平秦故東陵侯也種瓜長安城門東其瓜美故今傳東陵之瓜蓋自召平始也君試覷滿青鏡星星鬢影昔十八國春秋符不遺謝玄青銅鏡星星白鬢也今如許功名浪語便似得班超封侯万里歸計恐遲暮後班超傳家貧常為官慵書以俱養久勞苦嘗輟業投筆嘆曰大丈夫無他志略尤當效傳介子張騫立功異域以取封侯安能久事筆硯間乎其後諸相者曰生燕領虎額當封侯万里之外後使西域封定逺侯花庵詞客云朝無咎摸魚兒真能道急流勇退之意真西山極愛賞之沁園春退間新添辛幼安三徑𥘉成歸去耒辭三徑就荒松菊尤存鶴怨猿驚北山移文山人去兮夜鶴怨蕙帳空兮曉猿驚稼軒未來甚雲山自許平生意氣衣冠人笑抵死塵埃意倦須還身間要早豈為蓴羔鱸鱠哉張翰事見前秋景注秋江上看驚弦鴈避駭浪船回東岡更葺茅齋好都把軒窗臨水開要小舟行釣先應種柳踈籬護竹莫礙觀梅秋菊堪餐離騷食秋菊之落英春蘭可佩同上紉秋蘭以為佩兮留待先生手自栽沈吟久怕君恩未許此意徘徊哨遍歸去來辭蘇子瞻為米折腰因酒棄家口躰交相纍歸去來誰不遣君歸覺從前皆非今是露未睎征夫指豫歸路門前笑語喧童稚嗟舊菊都荒新松暗老吾年今已如此但小窗容膝閉柴扉䇿杖看孤雲暮鴻飛雲出無心鳥倦知還本非有意噫歸去來兮我今忘我兼忘世親戚無浪語琴書中有真味步翠麓﨑嶇泛溪窈窕涓涓暗谷流春水觀草木欣榮幽人自感吾生行且休矣念寓形宇內復幾時不自覺皇皇𣣔何之委吾心去留誰計神仙知在何處富貴非吾願但知臨水登山嘯詠自引壷觴自醉此生天命更何疑且乘流遇坎還止並陶淵明歸去來辭東坡自序云陶淵明賦歸去來辭有其詞而無其聲余治東坡築雪堂於上人俱笑其漏獨鄱陽董毅夫見而恱之有卜鄰之意乃取歸去來辭稍歸隱括使就聲律以遺毅夫使家童歌之時相從於東坡釋耒而和之扣生而為之節不亦樂乎漁父鷓鴣天黃魯直西塞山邊白鷺飛桃花流水鱖魚肥張志和漁歌子云西塞山前白露飛桃花流水鱖魚肥清箬笠緑簑衣斜風細雨不須歸志和居江湖自號玄真子朝廷尚覔玄真子何處如今更有詩青箬笠緑簑衣斜風細雨不須歸見上注人間欲避風波險一日風波十二時山谷自序云李如虎云玄真子漁父詞以鷓鴣天歌之極入律值少數句因以玄真子遺事足之憲宗晝像訪之江湖不得因令集其歌詩上之玄真兄松齡懼其放浪而不返和其漁父云樂在風波釣是間草堂松桂巳勝攀大湖水洞庭山狂風浪起且須還此余續成之意漁家傲新添謝無逸秋水無痕清見底杜秋水清無底蓼花汀上西凨起古詩修修風動蓼花汀一葉小舟煙霧裏韓文公詩共泛蕭蕭一葉舟蘭棹艤柳條帶雨穿雙鯉自嘆直鈎無處使笛聲吹散雲山翠鱠落霜刀紅縷細新酒美醉來獨枕簑衣睡吕洞賓詩不脫簑衣卧月明佳人滿庭芳蘇東坡香靉雕盤寒生氷筯開元遺事冬日雪霽皆為氷妃子取玩帝問之妃子曰所玩氷筯也畫堂别是風光主人情重杜主人情闌熳開宴出紅粧􅕹玉圎槎素頸洛神賦延􅖪秀項皓質呈露柳耆卿詞亦使此全句藕絲嫩新織仙裳雙歌罷虛欄轉月餘韻尚悠揚人間何處有司空見慣應謂尋常坐中有狂客惱亂愁腸唐杜鴻漸司空鎮洛時劉禹錫為蘇州刺史過洛杜出二妓為宴酒酣命妓進詩于劉􅎅甚醉就寢中夜酒醒見二婦人侍側驚問其故對以席上作詩司空因命侍寢令誦其詩曰髙髻雲鬟宫樣粧秋風一曲杜韋娘司空見慣渾間事惱斷蘇州刺史腸報道金叉墜也十指露春笋纎長張祐客住南幕中赴宴時杜紫微為支使南座有屬良之意索骰子賭酒杜紫微吟曰骰子巡巡褁手拈無因得見玉纎纎祐應曰但知報道金叉落倣佛還因露指尖親曽見全勝宋玉想像賦高唐楚襄王夢與巫山神女接目以告宋玉玉因為高唐賦玉林詞選云柳耆鄉有晝夜樂詞云秀香家住桃花徑算神仙才堪並層波細剪明眸膩玉圎槎素􅖪愛把歌喉當延逞遏天邊亂云愁凝言語似嬌鶯一事聲堪聽洞房飲散簾幃靜擁香衾歡心稱金爐射裊青煙鳯帳燭搖紅無限狂心乘酒興這歡悮漸入佳境猶自怨鄰雞道秋宵不永蓋為贈妓作也此詞麗以淫不當入選東坡嘗引用其語故併此詞録之意難忘周美成衣染鶯黃溫庭筠舞衣詩云偷得鶯黃鎖金縷愛停歌駐拍勸酒持觴低鬟蟬影動杜牧續張會真詩低鬟蟬影動回步玉塵蒙私語口脂香方千美人詩些些私語恐人知杜詩口脂面藥隨恩澤􅉉露滴竹風涼拚劇飲淋浪王令詩好使渴耒能劇飲舒亶詩空得淋浪酒蒲衣夜漸深籠燈就月子細端相端相猶正視也知音見説無雙解移宫换羽未怕周郎吳志周郎少精意于音樂雖三爵之後其有闕誤瑜必知之必顧故時人語曰曲有誤周郎顧長顰知有恨貪耍不成粧些子事惱人腸試説與何妨又怨伊尋消問息瘦減容光崔氏詩自從消瘦減容光憶秦娥香馥馥文選蘇詩馥馥我蘭房樽前有箇人如玉詩野有死􅍪有女如玉白駒其人如玉人如玉翠翹金鳯內家粧束長恨歌翠翹金雀玉搔頭嬌羞愛把眉兒蹙李白詩嬌歌半欲羞逢人只唱相思曲相思曲一聲聲是怨紅愁緑桞梢青有箇人人海棠標韻見楊妃海棠睡未足注下飛燕輕盈前成帝趙飛燕體輕能為掌上之舞酒暈潮紅羞娥凝緑一笑生春長恨歌回頭一笑百媚生為伊入限熏心更説甚巫山楚雲見髙唐雲雨事注斗帳香消紗窗月冷著意溫存小沖山宋豐之花樣妖嬈柳樣柔眼波流不斷滿眶秋眼波見前注窺人佯整玉搔頭嬌無力舞罷却成羞長恨歌侍兒扶起嬌無力無計與遲留薛能惜春詩無計延春日何能留少年滿懷禁不得許多愁一溪春水送行舟無情月偏照水東樓選七哀詩明月照高樓玉女搖仙佩新添桞耆卿飛瓊伴侣偶别珠宫未返神仙行綴漢武帝內傳西王毋呼武帝共坐許飛瓊鼓云和之黃唐許澤嘗夢登山有宫室陵云既入見數人方飲酒招之至暮不罷賦詩曰曉入瑶臺露氣清座中惟有許飛瓊塵心未盡俗緣在十里下山空月明他日復夢至其處飛瓊曰子何故顯豫姓名人間乎座上即改曰天風吹下步虛聲飛瓊曰善伴合也必要經仙宮中有蘃宫之闕取次梳粧尋常言語有得幾多姝麗擬把名花比恐傍人笑我談何容易細思算竒葩艷卉惟是深紅淺白而巳爭如這多情占得人間千嬌百媚須信晝堂繡閣皓月清風忍把光隂輕棄自古及今佳人才子少得當年雙美左傳曰賈大夫惡娶妻美其妻三年不言不笑唐刺史韋詵有女美擇其宜歸告妻曰常求佳壻今得之矣明日請其族使觀之其壻粧寬衣碧衣瘠而長無入族人皆笑呼碧鸛雀此夫惡而婦美者也襄陽記諸葛孔明嘗擇婦而娶阿承醜女俚諺曰莫作孔明娶婦正得阿承醜女登徒子之妻蓬頭夸耳缺唇歷人傍行樓又疥且痔登徒子恱之生五子此夫美而婦惡者也自古及今少雙美似此之類且任相偎倚未消得憐我多才多藝願妳妳蘭心蕙性枕前言下表余深意為盟誓曲禮約信曰誓位牲曰盟今生斷不辜鴛𬒳古詩云客從逺方耒遺我一端綺文彩雙卯央裁為合歡𬒳妓女水龍吟贈妓秦少遊小樓連苑橫空下窺繡轂雕鞍驟李白詩花下醉雕鞍踈簾半捲蘇易簡詩假􅎅半捲天香散單衣𥘉試詞話佳人𥘉試薄羅衣清明時候破䁔輕風弄晴微雨𣣔無還有賣花聲過盡垂桞院落紅成陳飛鴛甃玉佩丁東别後悵佳期參差難又名韁利鎖天還知道和天也瘦花下重門李花下一壼酒桞邊深巷杜歸院桞邊迷不堪回首念多情但有當時皓月照人依舊高齊詩話秦少遊在蔡州與營妓婁婉字東玉者甚密贈之詞云小樓連苑橫空又曰玉佩丁東别後是也又贈妓陶心而詞南歌子云玉漏迢迢盡銀河淡淡橫夢回宿酒未全醒卩𬒳鄰雞催起怕天明臂上粧猶在禁間淚上盈水邊燈火漸人行天上釣殘月帶三星末句謂心宇也玉樓春妓館歐陽永叔妖冶風情天與指清瘦飢膚氷雪妬莊子飢膚若氷雪百年心事一宵同愁聽雞聲窗外度幽冥録宋處宗窗下有長鳴雞信阻青禽雲雨暮漢武帝祭西王母王毋𣣔下先遣青鳥銜書耒海月空驚人兩處強將離恨倚江樓江水不能流恨去按司馬栖有贈妓一詞名蝶戀花云妾本錢塘江上住花落花開不管流年度燕子銜將春色去紗窗幾陳黃梅雨斜插犀梳雲半吐檀板輕𫾣唱徹黃金縷望斷行云無覔處夢回明月在南浦又毛覷民有贈錢塘妓惜分飛詞云淚濕闌干花著露愁到眉峯碧聚此恨平分取更無言語空相覷斷雨殘雲無意緒寂寞朝朝暮暮今夜山深處斷魂分付朝回去大為東坡稱賞澤民由此得名此二詞話語皆祖六一翁月意南鄊子題南劒妓館新添潘庭堅我怕倚闌千閣下溪聲閣外山惟有舊時山共水依然暮雨朝雲去不還暮雨朝雲見髙唐賦云云應是躡飛鵉月下時時整佩環月又漸低霜又下趙夭樂詩禽翻竹葉霜𥘉下人立梅花月正髙更闌折得梅花獨自看人事上附宫詞閨情風情旅况離别宫詞臨江仙新增鹿虔扆金鎖重門荒苑靜綺窗愁對秋空翠華一去寂無蹤長恨歌翠華搖搖時復上西出都門百餘里玉樓歌吹聲斷已隨風司上玉樓宴罷醉如春煙月不知人事改夜闌還照深宫藕花相向野塘中暗傷亡國清露泣香紅按周美成西詞云燕子不知何山向尋常巷陌人家相對如説興日斜陽裏亦是就姻月不知人事改句變化出耒宫春小重山新增和凝春入神京萬木芳禁林鶯語滑蝶飛忙曉桃凝露妬啼粧紅日永風和百花香煙鎖柳絲長御溝澄碧水轉池塘選詩垂楊蔭御溝時時微雨洗風光天衢逺杜詩獻可天衢直到處引笙篁愚按和凝為石晉宰相有喜遷鶯一詞云曉月墜宿雲披銀燭錦屏推建章鍾動王韁低宫漏出花遲昏態淺耒雙燕紅日新長一線嚴粧欲罷轉黃鸝飛上万年枝此詞與小重山詞語意相類至于薄命女一詞云天欲曉宫漏穿花聲繚繞窗裏星光少冷霞寒侵悵額殘月光沉樹抄夢斷錦幃空悄悄強起愁眉小此詞頗盡宫中幽怨之意併附于比小重山韋莊一閉昭陽春又春昭陽官殿名夜寒宫漏永夢君恩臥思陳事暗銷魂羅衣濕流血舊啼痕李珠淚濕羅衣杜啼血舊血痕歌吹隔重閽繞庭芳草緑選劉安招隱芳草生兮萋萋倚長門李詩月光欲到長門殿别作深宫一假愁萬般惆悵向誰論顒情立宫殿欲黃昏潘閬宫詞經年不見君王靣花落黃昏空掩門玉樓春李後主晚粧𥘉了明肌雪春殿嬪娥魚貫列易剝卦六五貫魚以宫人寵笙簫吹斷水雲間重按霓裳歌遍徹見月類注臨春誰更飄香屑杜詩香飄合殿春風轉醉拍闌干情未切歸時休照燭花紅杜詩坐久燭花紅待放馬蹄清夜月閨情解連環周美成怨懷難託嗟情人斷絶信音遼邈意妙手能解連環戰國䇿始皇遺齊君王后玉連環曰齊多智也解此環否以示群臣不知解君王后引推推破之謝秦使曰謹以解矣似風散雨收霧輕雲薄燕子樓空暗塵鎖一床弦索唐張建封節制武寧好賢樂善眄眄乃徐府竒色公納之燕子樓三日樂不息公薨眄眄感激深恩逝不他適杜甫暗塵生古鏡元禎詩夜半月髙絃索鳴想移根换葉盡是舊時手種紅藥汀洲漸生杜若謝晀詩芳洲采杜若注杜若香草名料舟移岸曲人在天角東坡詩故人各在天一角記得當日音書把間語間言盡總燒却水驛春回望寄我江南梅蕚吳陸凱與范曄善自江南寄梅花詣長安與曄井贈詩曰折梅逢驛使寄與隴頭人江南無所有聊贈一枝春拚今生對酒對花為伊淚落菩薩蠻李太白平林漠漠煙如織寒山一帶傷心碧暝色入髙樓有人樓上愁杜詩暝色延山經欄千空佇立宿鳥歸飛急何處是回程長亭更短亭白氏六帖五里一短亭十里一玉林云太白此詞允長亭為百代詞曲之祖南鄊子孫夫人曉日壓重􅉉斗帳春寒起未忺天氣困人梳洗懶眉尖淡畫春山不喜添韓南山詩天字浮修眉濃緑晝新就間把繡絲撏認得金針又倒拈陌上遊人歸也未選王孫遊兮不歸厭厭詩厭厭夜飲滿院楊花不捲簾惟其不捲簾所以楊花滿院憶秦娥花深深杜詞穿花峽蝶深深舞一鈎羅襪行花隂行花隂間將桞帶試結同心李白詩橫垂寶帶同心結耳邊消息空沉沉畫眉樓上愁登臨楚詞登山臨水兮送將歸愁登臨海棠開後望到如今燭影搖紅乳燕穿簾謝晀詩風簾雙燕入亂鶯啼樹清明近桞詩山城過雨百花盡榕葉滿庭鶯亂啼隔簾時度桞花飛杜桞花間度竹猶覺寒成陳長記眉峰偷隱臉桃紅難藏酒暈唐詩桃花笑臉紅背人微笑半嚲鵉叉輕籠蟬鬢古今注魏文帝宫人莫瓊樹始制今蟬鬢望之縹眇如蟬故號曰蟬鬢别久啼多眼應不似當時俊滿園珠翠逞春嬌沒個他風韻若見賓鴻試問待相將綵箋寄恨杜高文擲綵箋幾時得見鬪草歸來雙鴛微潤賣花聲新添康伯可蹙損逺山眉幽怨誰知羅衾滴盡淚煙脂見前集注夜過春寒愁未起門外鴉啼古詩唤婢打鴉兒莫教枝上啼啼時驚妾夢不得到遼西惆悵阻佳期人在天涯東風頻動小桃枝崔護詩桃花依舊笑東風正是銷魂時候也暸亂花飛按伯可又有賣花聲一闋云愁撚斷叉金逺信沉沉秦筝調怨不成音郎馬不知何處也樓外春深好夢已難尋夜夜餘衾目窮千里正傷心記得當𥘉郎去路緑樹隂隂亦是詠閨思併附見于此應天長新添康伯可管絃繡陌燈火畫橋塵香舊時歸路腸斷蕭娘麗情集楊生賦崔娘詩情潤潘郎玉不如中