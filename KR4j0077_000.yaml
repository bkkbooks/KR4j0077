歌詠故應制之詞爲多按此詞進入太上皇帝極称賞風柔夜暖以下数句至於未章賜金甚厚寳䁀現夕陽西下暮靄紅隘香風羅綺韓翊公子行羅綺争扶夜醉歸乘麗景華灯争放西亰雜記元日撚九華灯於南山照見百里濃熖燒空連錦砌覩皓月浸嚴城如昼花影寒籠絳蘃漸掩映芙蕖万頃迤邐齊開秋水太守無限行歌意蘇味道上元夜詩行竒尽落梅擁麾幢光動珠翠韓愈詩不令見麾幢短檠竒長檠髙張照珠翠傾万井歌䑓舞榭瞻望朱輪駢皷吹李白詩門有車馬賓金鞍曜朱輪控宝馬耀貔貅千騎書太誓如虎如貔如熊如羆文選古者諸侯千乗今太守古諸侯也故太守出擁千騎銀烛交光数里似乱簇寒星万點擁入蓬壷影裏宴閣多才環艶粉瑶簮珠履注見前恐看看丹詔催奉宸遊燕侍後漢志注漢儀天子玉璽皆以武都紫泥封丹書丹詔皆取此也詩叢話正直宸逰望逺空便趂早占通宵醉洗兵馬行寉駕通肖鳯輦備緩引笙歌妓李白詩蘭蕙相隨皆妓女凮光去処滿笙歌任昼角吹老寒梅李白從軍行笛奏梅花曲今角声多吹此月滿西樓十二文選鮑昭詩鳯樓十二時傾盃樂柳耆卿禁漏花深唐僧灵徹得蓮花漏乃取銅葉制器状如蓮花繍工日永晋魏間官中以紅綉線量日影冬至後日長一線蕙凮布暖選宋玉招䰟光凮轉蕙泛崇闌變韶景都門十二元宵三五三五謂十五日也銀蟾光滿連雲複道凌飛觀複道見前髙帝紀紀居南宫從複道上見諸将偶語注上下有道故謂複即重屋也觀亦楼也選詩琴賦飛觀髙樓曹植雜詩飛觀百尺樓聳皇居麗佳氣瑞煙葱倩翠華宵幸選南都賦望翠華之葳𬎼是處層城閬苑龍鳯燭交光星漢對咫尺鰲山開雉扇左僖九年天威不違顔咫尺五經異義天子之城千雉鰲山灯山也結綵為之列湯問海中有五山根無所連者帝使巨鰲十五㪯首戴之㑹楽府兩籍神仙梨園四部絃筦唐元宗集梨园弟子得三千人為霓裳羽衣曲向暁色都人未散盈萬井山呼鰲抃願歲嵗天仗裏常瞻鳯輦杜鶴駕通肖鳯輦備絳都春丁仙現融和又報乍瑞靄霽色皇州春早謝㫵詩春色滿皇州翠幰競飛玉勒争馳都門道鰲山綵結蓬萊島向晚色雙龍㗸照綃樓臺上􅊮芝盖底西京賦芝盖九葩甘泉賦翳華芝注盖名仰瞻天表縹緲凮傳帝楽長恨歌仙樂凮飄処処聞慶三殿共賞群仙同到迤邐御香飄滿人間聞嬉笑杜衣冠身惹御炉香須臾一點星毬小漸隠隠鳴梢聲杳遊人月下歸来洞天未暁解語花周羙成風銷熖蠟杜花催蠟炬銷露浥烘炉花市光相射桂華流瓦纎雲散耿耿素娥欲下張正見詩耿耿長河曙泛濫宿雲浮月下嫦娥落風驚織女秋衣裳淡雅㸔楚女纎腰一把杜楚女腰肢亦可憐簘鼓喧人影參差滿格飄香麝因念帝城放夜新記曰京城街衢有金吾暁瞑傳呼以禁夜行惟正月十五夜敕金吾弛禁前後路一日謂之放夜望千門如晝杜駐馬望千門嬉笑遊冶鈿車羅帕相逢処自有暗塵隨馬蘇道詩暗陳隨馬去年光是也惟只見􅍫情衰謝清漏移飛盖帰来從舞休歌罷萬年歡胡浩然燈月交光孟元老上元記華灯宝炬月色交光漸䡖風布暖先到南囯羅綺嬌容十里綘紗籠烛花艶驚郎醉目有多少佳人如玉春衫𬒮整整齊齊内家新様粧束歡情未足更闌謾勾牽舊恨縈乱心曲周詞无限事縈心曲悵望歸期應是紫姑頻卜暗想雙眉對蹙断絃待鵉膠重續十洲記鳯麟洲以鳯彖粦角作膠名續弦膠能續断絃宋陶谷詞若得鵉膠續断絃是何年休迷恋野草閑花鳯簫人在金谷鳯簫事見秦楼下注傅言玉女一衣東風李東風扇淑氣不見柳梢殘雪杜青柳檻前梢御楼煙煖對鰲山綵結簫鼓向晚鳯輦𥘉回宫闕千門燈火九逵風月尔雅九逹謂之逵綉閣人人乍嬉逰困又歇艶粧𥘉試杷珠簾半楬嬌差向人手撚玉梅低說相逢長是上元時節女冠子李漢老帝城三五灯火花市盈路天街遊䖏此時方信鳯闕都民奢華豪富紗籠纔過䖏喝道轉身一璧小来且住見許多才子艶質携手並肩低語東来西住誰家女買玉梅争戴緩歩香風度北觀南顧見畫燭影裏神仙無数引人魂似醉不如聞早歩月歸去這一雙情眼怎生禁得許多胡覷漢宫春康伯可雲海沉沉峭寒収建章雪殘鳷鵲漢武帝建章長楽宮皆閤道相属謝眺詩金波䴡鳷鵲注殿名華灯照夜萬井禁城行楽春隨鬢影映參差柳絲梅蕚覌立春類注丹禁香鰲峰對聳三山上通寥廓向伯㳟上元詞紫禁烟花一万重鰲山宫闕隱晴空玉皇端拱彤雲上人物嬉遊陸海中春衫綉羅香薄歩金蓮影下三千綽約齊東昏侯鑿金為蓮花貼地令潘妃行其上曰此歩歩生蓮花也氷輪桂滿皓色冷浸樓閣霓裳帝楽奏昇平天風吹落留鳯輦通宵宴賞見前注莫放漏聲閑却花詞客云此詞伯可在慈寕殿元夕𬒳一㫖作漢宮春上元前一日立春京仲逺暖律𥘉回又燒燈市井元徽之詩灯火家家市賣酒樓䑓誰将星移萬點月滿千街䡖車細馬隘通衢蹴起香埃今歲好土牛作伴立春捻土象牛以送寒挽留春色同来不是天公省事要一時壮觀特地安棑何妨綵楼皷吹古詩一望笑声連皷吹綺席樽罍良宵勝景語邦人莫惜徘徊休笑我癡頑不去年年爛醉金釵慶春澤劉叔安灯火烘春上元詩灯火下楼䑓樓䑓浸月良宵一刻千金蘇東坡詩春宵一刻直千金錦歩承蓮蓮歩事見前注彩雲簇仗難尋蓬壷影動星毬轉丁仙現詞須臾一點星毬小映兩行宝珥瑶簮恣嬉遊玉漏声催未歇芳心笙歌十里誇張地古詩笙歌歸院落古詩十里綺羅春富貴記年時行楽雙闕中天鳳樓十二春寒淺唐元宗正月望夜移仗上陽宫建燈楼十二間飾以珠玉其灯為龍鳯虎豹踴躍状去年元衣奉宸遊曽侍瑶池宴玉殿珠簾尽捲擁群仙蓬壷閬苑五雲深處萬燭光中六帖開元正月望日葉法師造虹橋与明皇觀廣陵寺灯火之盛人見仙人手五色雲中掲天絲管馳隙流年荘子忽馬無異騏驥之馳過隙也恍如一瞬星霜换今宵誰念泣孤臣林甫親自靖康之変前疊追憶徽廟元宵之盛有感扵丗変故自講泣孤臣也回首長安逺可是塵縁未断謾惆悵華胥夢短列子黄帝昼寝夢遊華胥氏之囯既斍恰然自得天下太治知華胥氏之國滿懷幽恨數點寒灯㡬聲歸鴈燭影摇紅吴太年梅雪𥘉消麗譙吹罷單于晚荘子魏有麗譙注謂城楼吹角之所也使君千炬起班春歌吹香風煖十里珠簾尽捲古詞楊州十里小紅楼尽捲上珠簾一半人正在蓬壷䦘苑賣薪買酒立馬傳觴昇平重見見東坡前注誰識遨頭去年曽侍傳柑宴詩話上元夜登楼貴戚宫人以黄柑遺近臣謂之傳柑宴至今衣䄂帶天香杜詩衣惹玉炉香行處氤氲滿巳是春宵苦短長恨歌春宵苦短日髙起更莫遣歡遊意懶細聽歸路璧月光中玉簘聲逺喜廷鶯閠元宵吴子和銀蟾光彩喜稔歳閏正元宵還再楽事难并佳時罕遇依舊試燈何礙花市又移星漢蓮炬重芳人海盡勾引徧嬉遊寳馬香車喧隘睛快天意教人月更圎償足風流債媚柳煙濃岑参詩楊柳万條烟夭桃紅小杜山桃發小紅景物逈然堪爱巷陌笑声不断襟䄂餘香仍在待歸也便相期明日踏青挑菜玉觀詞結伴踏青去好朱淑真詩主菜乍挑冝捲餅立春喜迁鶯胡浩然譙門殘月聽昼角暁寒梅花吹徹現宝䁀現注瑞日烘雲風和觧凍月令孟春東凮觧凍青帝乍臨東闕暖向土牛簫皷天路珠簾髙掲夢華録立春前造土牛扵門外是日有司為壇以祭先農官吏各具綵杖環擊土牛者二古詞簫鼓向晚又古詞錢塘十里小紅楼盡掲上珠簾一半最好是戴綵幡春勝釵頭雙結勵前江仙詞主竒絶開宴䖏珠履玳簮爼豆争羅列舞䄂翩翻杜詩舞䄂拂花鈿歌喉縹緲壓倒柳腰鶯舌勸我應時納祐還把金炉香爇願嵗嵗這一巵春酒詩為此春酒以介眉夀長陪佳節曹松立春詩玉燭傳佳節雙溪老人云浩然此詞先紀節序次述宴賞未帰應時納祐尤有帰宿臨江仙賀方回巧剪合歡羅勝子釵頭春意翩翩􅍮楚歲時記立春日悉剪綵為燕以戴之鄭毅夫云漢殿闘簮双綵燕併知春色上釵頭艶歌淺笑拜嫣然願郎宜此酒行楽駐華年未至文園多病客史記司馬相如与文君帰成都甞有消渇疾後拜為孝文园令既病免家居茂林也幽襟悽断堪憐舊遊夢掛碧雲邊人帰落鴈後思發在花前見詞後注復齋謾録方回詞有鴈後帰詞乃山谷守當塗方回過之人日席上作腔本臨江仙山谷以方回用薛道衡詩故易以鴈後歸云今仍其舊唐劉錬傳記隋薛道衡聘陳為人日詩首云入春纔七日离家已二年南人強之及云人帰落鴈後思發在花前乃曰名下無虚士玉樓春毛澤民小園半夜東風轉吹破氷池雲母面暁披閶闔見朝陽杜詩閶闔開黄道閶闔天門也知向碧堦添㡬線小煙弄柳晴光暖殘雪禁梅香尚淺殷勤洗拂舊東君多少韶華都借看小冲山李漢老誰勸東風臘裏来不知天待雪惱江梅東郊寒色尚徘徊雙綵燕飛傍鬢雲堆綵燕事見前注玉冷暁粧䑓冝春金縷前􅍮楚歲時記立春日貼冝春字千門王沂公立春帖門云比陸凝隂尽千門淑氣新年年金殿裏宝字貼冝春拂香腮紅羅先綉踏青鞋芦公範饋飾儀三月三日上踏青鞋履春猶淺歐陽公詞玉亰此処春猶淺花信更湏催東皐雜録江南自𥘉春至𥘉夏五日一畨凨候謂之花信凨梅花凨最先棟花凮最後凢二十四畨以為寒絶徐師川云一百五日寒食雨二十四畨花信凮蝶恋花辛㓜安稼軒誰向椒盤簮綵勝整整韶華争上春風鬢東坡元日立春詩堆盤紅縷細茵蔯巧雨椒花兩闘新又次曽仲錫元日見寄韻肅索東凮雨鬢華年年幡勝剪宫花徃日不堪重記省為花長抱新春恨春未来時先借問晚恨開遅早又飄零近今歲花期消息定只愁風雨無憑凖寒食瑣䆫寒周美成暗柳啼鴉单衣竚立小簾朱户桐花半畝静鎖一庭愁雨滴空堦更䦨未休漁隠詩話嘉祐中有魚人於江心綱得片石有絶句雨滴空堦曉無心換夕香井桐花落尽一半在銀床故人剪烛西䆫語李啇隱詩何當共剪西䆫燭却話巴山夜雨時似楚江瞑宿風燈零亂杜詩風起春灯乱江鳴夜雨懸少年羇旅遅暮嬉遊䖏杜詩自傷遅暮眼正店舎無煙禁城五百連昌宫𥘉過寒食一百六店舎無煙宫樹緑旗亭唤酒付與髙陽儔侣李賀詩旗亭下馬觧秋衣冝賀髙陽一壷酒漢􅐱食其謁髙祖衣儒冠沛公謝之曰未睱見儒食其按劒此日吾髙陽酒徒非儒也沛公起入相東園桃李自春小唇秀靨今在否到歸時定有殘英侍客携樽俎李賀詩穠眉籠小唇又脱奩粧秀靨應天長周美成條風布䁔易緯云立夏條風至霏霧弄晴池塘遍滿春色正是夜堂無月沉沉暗寒食梁間燕前社客似笑我閉門愁寂亂花過隔院芸香滿地狼籍長記那回時觧逅相逢郊外駐油璧温飛卿詞油璧車䡖金牘肥又見漢宫傳燭飛煙五侯宅見三䑓詞注青青草迷路陌古楽府青青河畔草強載酒細尋前跡市橋逺柳下人家猶自相識杜市橋官桺細玉樓春謝無逸溪堂弄晴数點梨花雨門外昼橋寒食路杜䳌飛破草間煙蛺蝶惹殘花底霧東君着意憐樊素白楽天有二妾樊素善歌小蛮善舞甞有詩曰櫻桃樊素口楊桺小蛮腰一叚韶華都付與粧成不管露桃噴舞罷從教風柳妬訴衷情僧仲殊湧金門外小瀛洲杭州有湧金門寒食更風流紅舡滿湖歌吹花外有髙樓晴日暖淡煙浮恣嬉遊三千粉黛十二䦨千一片雲頭玉林詞選云仲珠之詞多矣佳者固不少而小令為最小令之中訴衷情一詞一調又其最盖篇篇竒䴡字字清婉髙䖏不咸唐人風致也醉蓬莱上巳日有懐許下西湖葉少藴問春風何事断送䌓紅便拚歸去牢落征途笑行人覊旅一曲陽関断雲殘靄做渭城朝雨玉維詩渭城朝雨浥䡖塵客舎青青桺色新勸君更盡一杯酒西出陽関無故人𣣔寄離愁綠隂千囀黄鸝空語遥想湖邊浪揺空翠管絃風髙亂花飛絮曲水流觴有山翁行䖏翠䄂朱欄故人應也弄畫船煙浦㑹寫相思尊前為我重翻新句春雲怨黄鍾商馮偉夀雲目春風悪劣把数枝香錦和鶯吹折雨重柳腰嬌困燕子𣣔扶扶不得軟日烘煙乾風收霧芍藥茶䕷弄顔色簾幙䡖隂圖書清潤日永篆香絶盈盈笑靨宫黄額試紅鵉小扇丁香双結團鳯眉心情郎貼教洗金罍共看西堂醉花新月曲水成空蘭亭記事見前集注麗人何處杜麗人行三月三日天氣新長安水邊多麗人徃事暮雲萬葉三臺清明應制万俟雅言見梨花𥘉帶夜月晏元献公梨花院落溶溶月海棠半含朝雨内苑春不禁過青門御溝漲潜通南浦東風静細柳垂金縷唐人詞楊桺風展盡黄金縷望鳯闕非煙非霧好時代朝野多歡徧九陌太平簫鼓乍鶯兒百囀断續燕子飛来飛去近緑水䑓榭映秋千闘草聚雙雙遊女餳香更酒冷宝典斫杏仁爲酪以餳沃之踏青路㑹暗識夭桃朱户唐音謙詩草草踏青人向晚驟寳馬雕鞍注見前醉襟惹亂花飛絮正䡖寒䡖暖漏永衛渥寒城夜惻惻䡖寒剪剪風半隂半晴雲暮王晋卿詞乍雨乍晴寒食路禁火天巳是試新粧韋應物詩雨中禁火空齋冷歲華到三分佳䖏清明看漢宫傳䗶炬散翠煙飛入槐府韓翃詩春城無䖏不飛花寒食東風御桺斜日暮漢官傳蠟燭䡖煙散入五侯家歛兵衛閶闔門開住傳宣又還休務蝶戀花趙徳麟安定郡王𣣔减羅衣寒未去不捲珠簾人在深深䖏紅杏枝頭花㡬許啼痕止恨清明雨毆詞紅杏開一清明雨盡日水沉香一縷宿酒醒遅惱破春情緒飛燕又将歸信誤小屏風上西江路水龍吟和質章夫韻劉叔安随如弄晴䑓舘收煙候時有燕泥香墜宿醒未觧单衣𥘉試騰騰春思前度桃花去年人靣見前集註重門深閉記彩鸞别後青騘歸去長亭路芳塵起十二屏山遍倚任蒼苔點紅如綴黄昏人静煖煙吹月一簾花碎芳意婆娑絲隂風雨畫橋煙水笑多情司馬留春無計濕青衫淚白樂天就中誰獨泣最多江州司馬青衫湿端午喜遷鶯梅霖𥘉歇正絳色海榴争開佳節角黍包金風土記端午日進角黍香蒲砌玉是日飲菖蒲酒是䖏玳筵羅列闘巧盡輸年少玉腕綵絲雙結艤綵舫見龍舟兩兩波心齊發竒絶難畫䖏激起浪花翻作湖間雪畫鼓轟雷東坡詩腰鼓百靣如春雷紅旗掣電奪罷錦標方徹湟中水天日暮猶自珠簾髙掲滕玉閤記珠簾暮捲西山雨棹歸晚載荷香十里東坡逰法華山詩歸塗十里尽荷風一鈎新月柳宿岩下詩新月一鈎吐齊天樂踈踈㡬點黄梅雨古詩梅子黄時雨佳時又逢重午角黍包金香蒲泛玉風物依然荆楚風土記端午烹鷔以菰葉褁粘米謂之角黍衫裁艾虎更釵裊朱符臂纏紅縷歲時記端午以艾為虎形或剪綵為小虎粘又葉以戴文章簡公帖子云花隂轉午清風細玉燕釵頭艾虎輕抱朴子五問辟兵之道答曰以五月五日作赤灵符着心前歐陽公帖子五兵消以德何用赤灵符令謂之釵頭符風俗通五月五日以五綵絲繋臂者辟鬼及兵一名長命縷一名續命縷一名辟兵繒撲粉香綿唤風綾扇小牎午沉湘人去已逺勸君休對景感時懐古續齊諧記屈原以五月五日投汨羅江而死楚人哀之慢囀鶯喉䡖𫾣象板勝讀離騷章句荷香暗度漸引入醄醄醉香深䖏卧聽江頭畫船喧韻皷章簡公帖子絲竹漸髙撓鼓急瑶渾亭下竟鳬車賀新郎劉方叔翠葆摇新竹周詞新篁榣動翠葆正榴花枝頭葉底闘紅争緑王安石榴花詩万緑枝頭紅一點動人春色不湏多誰在紗䆫停針線閑理竹西舊曲杜牧詩斜陽竹西路哥吹是楊州又還是蘭湯新浴青箱記蘭湯俻浴傳􅍮楚水馬浮江弔屈源手弄合歡雙綵索風土記以五色綵絲為百索笑偎人福夀低相祝金鳯亸艾花矗龍舟噀水飛相逐記當年懷沙舊恨至今遺俗雨過平蕪浮天闊畫艗凌波盡簇沸十里笙歌聲續李白詩蘭蕙相隨皆妹女風光去䖏滿笙歌好是蟾鈎隨歸棹任歡呼船重成頽玉晋嵇康醉如玉山之将頽猶未忍罩銀燭賀新郎劉潜夫後村深院榴花吐畫簾開綵衣紈扇午風清暑兒女紛紛新結束杜世上兒女徒約紛時様釵符艾虎劉昭曰桃印本漢制以止悪氣令端午以綵繪篆符為釵頭符以相遺荆門記午節人皆綵艾為虎為人掛於門以辟邪氣早已有遊人觀渡荆楚記屈原午日投汨羅江西死後人以舟楫救之遂俗成兢渡也老大逢埸慵作戯任白頭年少争旗鼓溪雨急浪花舞靈均標致髙如許灵均屈原也憶生平既紉蘭佩楚詞紉秋蘭以為佩又懐椒糈离騷奠桂酒兮椒漿誰信騷魂千載後波底垂涎角黍古詞角黍包金菖蒲切玉又説是蛟饞龍怒似而今醒到了料當年醉死差無苦聊一笑吊千古又思逺楼前路思逺楼在温州與西山相對望平堤十里湖光畫船無數緑盖盈盈紅粉靣葉底荷花觧語天宝遺事大液池千葉蓮開明皇與如子共賞帝指妃謂左右曰何如此觧語花耶闘巧結同心雙縷尚有經年離别恨一絲絲揔是相思䖏相見也又重午清江舊事傳荆楚嘆人情千載如新尚沉菰黍且盡樽前今日醉誰肯獨醒吊古漁父辝衆人皆醉我獨醒泛㡬盞菖蒲緑醑兩兩龍舟争競渡古詞見龍舟兩兩波心齊彂柰朱簾暮捲西山雨滕王閤詩畫棟朝飛南浦雲朱簾暮棬西山雨㸔未足怎歸去南柯子蘇子瞻山與歌眉歛波同翠眼流遊人都上十二楼不羡竹西歌吹古楊州注見前菰黍連昌歜風上記五月五日以菰葉褁粘米楚祭屈原之餘風又俗飲菖蒲酒左饗有昌歜注菖蒲也瓊彛倒玉舟誰家水調唱歌頭明皇雜録明皇好水調歌頭胡羯犯京土𣣔迁幸猶登花蕚楼置酒四顧悽愴使其中人歌水調畢因倚視楼下有工歌而善水調者乎有一少年自言工歌亦善水調遊歌曰山川滿目泪沾衣富貴荣華得㡬時不見只今分水上惟有年年秋鴈飛上聞之潸然曰誰爲此調左右曰宰相李嶠上曰真才子也不待曲終水調曲頗廣謂之歌頭豈非首章之一觧乎聲遶碧山飛去晚雲留博物志秦青善謳每擊節而歌声振林木響遏行雲七夕鵲橋仙秦少游纎雲弄巧飛星傳恨銀漢迢迢暗度杜銀漢㑹双星金風玉露一相逢李宻詩金風蕩佳節杜玉露團清影僧清江詩七夕景迢迢相逢只一宵便勝却人間無數毆陽公七夕詩暮云天上休相見猶勝人間去不回柔情似水佳期如夢隱羅七夕詩惆悵佳期又一年忍顧鵲橋歸路風俗記織女七月七曰當渡河使鵲為橋兩情若是乆長時又豈在朝朝暮暮宋玉髙唐賦朝為行雲暮為行雨朝朝暮暮陽䑓之下按七夕歌以双星㑹少别多為恨少游此詞謂两情若是夕長不在朝朝暮暮所謂栳臭腐為神竒寕不省人心目二郎神柳耆卿炎光謝過暮雨芳塵䡖洒乍露冷風清庭户爽天如水註見前集玉鈎遥掛應是星娥嗟人阻叙舊約颷輪𣣔駕極目䖏㣲雲暗度耿耿銀河髙瀉長恨歌遅遅鍾鼓𥘉長夜耿耿星河𣣔曙天閑雅湏知此景古今無價運巧思穿針樓上女􅍮楚嵗時記七夕婦人結綵樓穿七孔針陳瓜果於庭中乞巧檯粉靣雲鬟相亜鈿合金釵私語䖏長恨歌唯将舊物表深情鈿合金釵寄将去釵留一股合一扇釵擘黄金合分佃但令心似金鈿堅天上人間㑹相見臨别殷勤重寄詞詞中有誓两心知七月七日長生殿夜半無人私語時筭誰在回廊影下願天上人間占得歡娱年年今夜賀新郎宋謙父壷山靈鵲橋𥘉就七夕歌神官召集役灵鵲直渡銀河横作橋記迢迢重湖風浪去年時候嵗月不留人易老萬事茫茫宇宙但獨對西風搔首巧拙豈関今夕事柰癡兒騃女流傳􅍝添話柄柳州柳柳宗元如柳州作乞巧文道人識破灰心乆只好風凉月佳時踈狂如舊休笑雙星經嵗别杜詩銀漢㑹双星謝惠連詩雲漢有灵匹弥年闕相從人到中年巳後雲雨夣楚㐮王高唐夢詩見前註可曽常有雪藕調氷花熏茗杜詩公子調水水佳人雪藕絲正梧桐雨過新凉透且隨分一盃酒鵲橋仙謝勉仲鈎簾借月染雲為愰花靣玉枝交映凉生河漢衣裘而徃及至月宫寒凜時異上不能禁静能出丹二粒進上服之起舞弄清影何似在人間杜詩人間月影清轉朱閤低綺户照無眠李白詩月明𣣔素秋不眠不應有恨何事長向别時圓唐詩月如無限月長圓人有悲歡離合月有隂晴圎缺此事古難全但願人長乆千里共婵姢文選謝荘月賦隔千里兮共明月李白憶舊遊詩婵姢美女𥘉月輝東坡自亭云丙辰中秋歡飲逹且大醉作此篇廉懐子由菬溪漁隱云先君甞云桺詞鱉山綵結蓬莱島當云綵締坡詞低騎户當云窺綺户二字既改其詞益佳苕溪云中秋詞自東坡水調歌頭一出餘詞尽廢然其後亦豈無佳調如晁次膺緑頭鴨一詞殊清碗但樽爼間歌猴以其篇長惮唱故煙没無聞焉其詞云晚雲收淡天一片琉璃爛銀盤来從海底皓色千里登渾瑩無塵素娥澹泞浄可數丹桂参差玉露𥘉令金風未凛一年無似此佳時向坐乆踈星時度烏鵲正南飛瑶䑓令䦨干凭暖欲正遅遅念佳人音塵隔後對此應觧相思最関情漏声正永暗断腸花影潜移料得來宵清光未咸隂晴天氣又争知共疑恋如今别後還是隔年期人縱徤清樽素月長願相隨念奴嬌新添憑高眺遠見長空萬里雲無留迹桂魄飛来光射䖏冷浸一天秋碧玉宇瓊樓乗鸞来去人在清􅋽國龍城録八月望日唐明皇遊月宫寒氣逼人露下霑衣見大府榜曰廣寒清虚之府少前見素娥十餘人皆皓衣乗白鵉舞於大桂樹下江山如畫望中煙樹歷歷我醉拍手狂歌舉杯邀月對影成三客李白詩舉盃􅌽明月對影成三人起舞排徊風露下今夕不知何夕詩今夕何夕便𣣔乗風翩然歸去何用騎鵬翼水晶宫裏一聲吹断横笛念奴嬌新添葉少藴石林居士洞庭波冷望氷輪𥘉轉滄海沉沉萬頃孤光雲陣卷長笛吹破層隂洶湧三江銀漢無際遥帶五湖深酒䦨歌罷至今鼉怒龍吟回首江海平生漂流容易散佳㑹難尋縹緲髙城風露爽獨倚危檻重臨醉倒清樽嫦娥應笑猶有向来心廣寒宫殿事見前注為余聊借瓊林洞仙歌泗州中秋作此絶筆之詞也新添晁無咎青煙羃䖏碧海飛金鏡永夜閑階臥桂影露􅋽時零亂多少寒螿神京逺惟有藍橋路近藍橋神仙之所居也水晶簾不下雲母屏開冷浸佳人淡脂粉待都将許多明付金樽投暁共流霞傾盡杜詩細酌流霞更携取胡床上南楼晋庾亮在武昌諸佐吏殷浩之徒乗秋夜徃共登南楼不覺亮至亮曰諸君少住老子扵此㒷復不淺便㨿明床與浩等談詠看玉做人間素秋千頃苕溪叢詰云允作詩詞要當如常山之蛇救首救尾不可偏也如晁無咎作中秋洞仙歌其首云青煙羃䖏至閑堦卧桂影固巳佳矣其後云待都将許多明付與金樽至素秋千頃若此可謂善救首尾者也至朱希真作中秋念奴嬌則不知出此其首云挿天翠柳𬒳何人椎上一輪明月照我藤床凉似水飛入瑶䑓銀闕亦巳佳矣其後云洗尽凢心滿身清露冷浸蕭蕭髪明朝塵世記取林向人説此兩句全無意味收拾得不佳􅨕并本篇其氣素然矣金菊對芙蓉重陽辛㓜安逺水生光遥山聳翠霽煙深鎻梧桐正零瀼玉露淡蕩金風杜詩皆傳玉露秋張景陽詩金風扇素節東籬菊有黄花吐陶詩採菊東籬下礼記月令菊有黄華對映水㡬簇芙蓉重陽佳致可堪此景酒釅花濃追念景物無窮嘆少年胸襟忒煞英雄把黄英紅蕚甚物堪同除非腰佩黄金印晋周顗傳明年殺諸賊奴取金印如斗大座中擁紅粉嬌容此時方稱情懷尽拚一飲千鍾六么令新添仙吕周美成快風收雨亭舘清殘燠池光静横秋影岸柳如新沐聞道冥城酒羙昨日新醅熟䡖鑣相逐衝泥䇿馬来折東籬半開菊陶潜採菊東籬下華堂花艶對列一一驚郎目牧之為御史分司李司徒閑居路一日開筵杜引三爵冷曰華堂今日綺筵開誰唤分司御史来忽彂狂吟驚滿座兩行紅粉一時回梁武帝㐮陽歌大提諸女兒花艶驚郎目歌韻巧共泉声間雜琮琤玉韓愈詩泉聲玉琮琤惆悵周郎已老莫唱當時曲吴志云周俞暁音樂時人語曰曲有誤周郎顧幽歡難卜杜詩幽歡下夜䦨明年誰徤更把茱茰再三嘱杜詩明年此㑹知誰徤好把茱茰子細看水調歌頭韓無咎南澗今日我重九莫負菊花開試尋高䖏携手躡屐上崔嵬放目蒼崖萬仞雲護暁霜成陣古詞㡬點護霜雲影轉知我與君来古寺倚修竹古詩日暮倚修竹飛檻絶纎埃笑談間風滿座酒盈杯仙人跨海休問隨䖏是蓬莱落日平原西望鼓角秋深悲壮杜詩五更鼓角声悲壮戯馬但荒䑓文選刘𥙿為宋公在彭城九月九日遊項羽戯馬䑓細把茱茰㸔一醉且徘徊木蘭花慢亰仲遠筭秋来景物皆勝賞况重陽正露冷𣣔霜輕煙不雨玉宇開張刘休元詩王宇来清凮蜀人從来好事遇良辰不肯負時光藥市家家簾幙酒樓䖏䖏絲簧婆娑老子興難忘庾虎云老子扵此興復不淺聊復與平章也隨兮登高風俗記九日登髙以穣灾厄茱茰綴席杜綴席茱茰好菊蘃浮觴李詩携觴酌流霞搴菊泛寒蕋明年未知誰徤笑杜陵底事獨凄􅋽事見前注不道頻開笑口年年落帽何妨孟嘉為桓温叅軍九日温宴龍山時佐史吏並戎服風至吹嘉帽墮落嘉不覺之南鄊子蘇東坡霜降水痕収杜詩寒水各依痕淺碧𥻘𥻘露逺洲酒力漸消風力軟颼颼破帽多情却恋頭詩見前詞詩酒若為酬韓詩嘉節迫吹㡌杜牧之詩但将酩酊酬佳節但把清樽断送秋萬事到頭都是夢潘閬詩万事到頭都似夢休嗟百計不如人休休明日黄花蝶也愁鄭谷九日菊詩節去蜂蝶愁不知暁庭猶繞折殘技自縁今日人心别未必秋香一夜衰三人老人録云自来九日多用落㡌事独東坡云破帽多情却恋頭尤為竒特鷓鴣天黄山谷黄菊枝頭破暁寒人生莫放酒盃乾風前横笛斜吹雨醉裏簮花倒著冠舊俗重陽日挿菊花飲酒晋山翁倒著白接篱身健在杜明年此日知誰健且加飡杜加飡可扶老舞裙歌板盡清歡杜興来終日尽君歡黄花白髮相牽捝杜九日詩昔日黄花酒今朝白髮稠付與時人冷眼㸔西江月蘇子瞻點點樓前細雨重重江外平湖李白平詩湖注澄流當年戯馬㑹東徐事見前今日凄􅋽南浦莫恨黄花未吐且教紅粉相扶酒䦨不必㸔茱莄俯仰人間今古杜詩侻仰悲身世醉花隂李易安薄霧濃雲愁永晝瑞腦噴金獸金獸所以炷香佳節又重陽寳枕紗厨半夜秋𥘉透東籬把酒黄昬後陶渊明飲酒詩採菊東籬下悠然見南山有暗香盈䄂莫道不銷魂文選江淹别賦黯然銷䰟惟别而已簾捲西風人似黄花痩除夕東風齊着力胡浩然殘臘收寒三陽𥘉轉已换年華東君律管迤邐到山家䖏䖏笙簧䁀沸㑹佳宴坐列仙娃花叢裏金炉滿爇龍麝煙斜見前注此景轉堪誇深意祝夀山福海増加玉觥滿泛且莫厭流霞杜詩細酌流霞幸有迎春夀酒詩爲此春酒以介眉夀銀缾浸㡬朶梅花休辭醉園林秀色古詩春到園林皆挺秀百草萌牙送入我門来黄鍾商調胡浩然荼壘安扉靈馗掛户風浴通黄帝上古之時有神荼欝壘兄弟二人性能执鬼於度朔山桃樹下簡閱百鬼之無道者縳以葦索执以飼虎張平子東都賦云首以欝壘神茶副焉明皇晝寢夢一小鬼衣絳贖鼻洗一足履一是腰懸一履搢一筠扇盗太貞綉香嚢大叱問之小鬼奏曰臣乃虚耗也上怒𣣔呼力士俄見一大鬼頂破帽衣藍抱繋角帶靸朝靴徑捉小鬼先刳其目然後擘而啖之上問尔為誰奏云臣終南山進士鍾馗也神儺烈竹轟雷神異經西方深山中有人長丈餘犯人則病寒熱名曰山臊人以竹著火中焷林有聲而山臊驚焷動念流光四序式適回湏知今歲今宵盡似頓斍明年明日催王䛩除夜詩今歲今宵尽明年明日催寒隨一夜去春逐五更耒向今夕是䖏迎春送臘羅綺筵開今古徧同此夜賢愚共添一歲貴賤仍階互祝遐齡山海固難催石崇富貴籛鏗夀晋石崇富埒王公鉞籛鏗即彭祖夀八百歲更潘岳儀容子建才潘岳美姿容所至擲果盈車曹子建有七歩成詩之才仗東風盡力一齊吹送入此門来天文氣候念奴嬌黄山谷断虹霽雨滕王閤記虹銷雨霽净秋空山染修眉新緑韓南山詩天宇浮修眉濃緑昼新就桂影扶踈杜詩斫却月中桂扶踈万古同誰便道今夕清輝不足杜詩刀里共清輝萬里青天嫦娥何䖏王充論衡后羿妻請不死之薬又西王母因竊其薬以奔月宫是為姮娥駕此一輪玉寒光零亂李白詩我歌月徘徊我舞影零乱為人偏照醽醁龍城録魏左相䏻治酒其名醽醁名濤公称醽醁似蘭生翠濤過玉薤千日醉不醒十年味不敗年少隨我追遊晚城幽徑遶張園森木見詞話注共倒金荷家萬里難得樽前相属老子平生江南江北最爱臨風曲南唐韓熈載詩僕本江比人今作江南客再去江北遊江南有人意孫郎㣲笑坐来聲歕霜竹古詞倚風三歕横竹苕溪漁隱云山谷云入月十七日與諸生歩自永安城入張寛夫園符月以金荷葉酌客客有孫叔敏善長笛連作數曲諸甥曰今曰之㑹樂矣不可以無述公因作此曲記之文不加點或以為可継東坡赤璧之詞云念奴嬌上太守月詞范元卿玉楼絳氣異聞録古鏡記隋御史王度有宝鏡大業中有胡僧云宅上常有碧光連日絳氣属天此宝鏡氣也捲霞綃雲浪飛空蟾魄人世江上驚照耀杜月詩江上同照鳥鵲自多驚煙靄鰲峰千尺陸海蓬壺銀葩星暈點破琉璃碧士筠詩衝破碧琉璃有人吟笑紫荷香滿晴陌韻語陽秋云近世作文多以紫荷囊作侍從事使不知其誤晋與服志云入座尚書則荷紫以生紫為拾囊縫之服外在扵左肩所謂荷紫者非荷芰之荷乃負荷之荷也人徒見南史着紫荷囊四字遂作一句言之殊不知晋書荷紫之義亦未免有此矣况是東府君候唐李宻傳東璧圖書之府西清别騎甘泉賦或彷徨扵西清注西清謂西廂清閑䖏樽爼開華席迤邐飛輪催杖屦入對青藜仙客王子年拾遺記刘向校書天禄閤夜有老父着黄衣植青藜杖叩閤而進見向暗中誦書乃吹杖端煙然因只見向問其姓名曰我太乙之精荆公詩曰不知太乙遊何䖏定把青藜燭照公𥜗袴歌謡人鹿范傳迁南陽太守先蜀多火災禁民夜作以防火范但令儲水為便百姓歌之曰廉叔度来何暮不禁火民安作昔無𥜗令五袴昇平風露取金蓮側梅花吹動李白從軍行笛奏梅花曲滿城依舊春色念奴嬌月詞朱希真挿天翠柳杜高柳半天青𬒳何人堆上一輪明月照我藤床凉似水飛入瑶䑓銀闕瑶䑓崑崙之異名李白詩瑶䑓雪花數千點又香閤不瑶闕二露冷笙簫坡詩至今㣲月夜笙蕭來絶山風清環珮玉鎻無人掣閑雲收盡海光天影相接誰信有藥長生杜月詩搗薬兎長生素娥新煉就飛霜液雪撃碎珊瑚晋石崇冨盛以鐡如意擊碎珊瑚樹争似看仙桂扶踈竒絶酉陽雜爼言月桂髙百丈人有斫伐樹創随合洗盡凡心滿身清露冷瀟瀟髮唐褚遂良帖華髮瀟瀟明朝塵世記取休向人說念奴嬌中秋月朱希真尋常三五古詩三五明月滿問今夕何夕詩繆綢今夕何夕嬋姢都勝李白詩婵姢羙如𥘉月輝天闊雲收崩浪静深碧琉璃千頃杜詩江里碧琉璃銀漢無聲杜詩河漢声西流氷輪直上玉原夫人詩氷輪碾太清玉兎歩碧虚桂濕扶踈影綸巾玉塵晋謝万常自綸巾以見簡文帝王衍每提玉柄塵尾清談与手同色庾楼無限清興晋庾亮在武昌諸佐吏殷浩之徙乗月夜徃共登南樓不覺亮至亮曰諸君少住老子於此興復不淺便據胡床与浩等談詠誰念江梅飄零李白詩平生江海心垂老見飄零不堪回首驚鵲南枝冷魏文帝短歌行月明星稀鳥鵲南飛撓樹三匝無枝可依萬點蒼山何䖏是脩竹吾廬三徑陶淵明詩吾亦愛吾庐歸去来辭三徑就荒松菊猶存香霧雲鬟清輝玉臂杜香霧雲鬟􅊜清輝玉臂寒醉了愁重醒參横斗轉隋開皇中趙師雄迁羅浮一日於松林間酒肆旁舎見羙人淡桩素服出迎時殘雪未消月色㣲明师雄与語芳香襲人因与共飲乆之東方巳白起視梅大花樹下月落參横但惆悵而巳轆轤聲㫁金井杜轆轤東堦鹿李梧桐落金井一葉飛銀床念奴嬌李漢老素光練静映秋山杜詩索䆫素月垂文練又吹笛秋山凮月清隠隠修眉横緑見前注杜韓詩鳷鵲楼髙天似水選謝眺詩金皮麗鳷鵲玉繹低建章李白秋声賦碧天如水兮窅窅悠悠碧瓦寒生銀粟東坡詩凍合玉楼寒起粟萬丈斜暉奔雲湧霧飛過盧仝屋韓詩玉川先生洛城裹破屋數間而已矣更無塵氣滿庭風碎梧竹誰念鶴髮仙翁五代史周桓公曰吾老矣鷄皮鶴髮當年曽共賞紫巖飛瀑對影三人聊痛飲李白月下独酌詩舉林邀明月對飲成三人世說王孝伯曰但痛飲熟讀离騷便可作名士一洗離愁千斛古詩百年莫惜千回飲一醉䏻消萬斛愁斗轉參横見前注翩然歸去萬里騎黄鵠杜詩安能騎黄鵠滿天霜暁呌雲吹断横玉苕溪漁隱云李漢老此詞有滿天霜曉呌雲吹断横玉之句乃用崔魯華清宫詩銀河漾漾月輝輝楼碍天邊織女機横玉呌雲清似水滿空霜逐一聲飛或云呌雲乃笛名非也念奴嬌和前韻姚孝寕素娥睡起龍城記八月望日明皇遊月宫見素娬十余人皆皓衣乘白鵉駕氷輪碾破一天秋緑氷輪見前注醉倚髙楼風露下凛凛寒生肌粟横管孤吹龍吟風勁文選馬融長笛賦近世双笛從羌起羌人伐竹未及巳龍吟水中不見形截竹吹之声相似雪浪翻銀屋李白詩江中白浪如銀屋壮遊回首㑹稽何限修竹晋王羲之蘭亭序暮春之𥘉㑹于㑹稽山隂之蘭亭修禊事也此地有崇山峻嶺茂林修竹今夜對月依然樽前湏快㵼山頭嗚瀑吸也清光傾肺腑洗我明珠千斛韓簸弄明月珠坡詩我無明月十斛珠只恐婵姢明年依舊衰鬢先成鵠舉盃相勸為予且掛團玉念奴嬌八韓子蒼海天向晚漸霞收餘綺波澄㣲緑謝眺詩餘霞散成綺江淹別賦春草碧色春水緑波木落山髙真箇是一雨秋容新詠雪醜奴兒令康伯可馮夷剪碎澄溪練馮夷何伯也謝玄暉詩澄江静如練飛下同雲詩上天同雲雨雪雰雰着地無痕柳絮梅花䖏䖏春崔郁雪詩不辨梅花与雪花山隂此夜明如晝晋王徽之居山隂雪夜𥘉霽月色明朗忽憶戴安安時在剡便乗舡詣之不前而反人間其故曰乗興而行興尽而反何必見戴安道耶月滿前村莫掩溪門恐有扁舟乗興人事見上注花庵詞客云順庵作此詞促飬直赴雪夜溪堂之約一本澄溪作澄江飛下同雲作吹下紛紛柳絮梅花䖏䖏春作栁絮楊花觸䖏春既用柳絮又用楊花是関門閉户掩柴扉也月滿前村作月破黄昏既曰此夜又破黄昏意亦重複青玉案陳瑩中碧空黯淡同雲繞同雲見前注漸枕上風聲峭明透紗牎天𣣔暁謂雪之明透上紗䆫如天将暁也珠簾纔捲古詞捲上珠簾一光羙人驚報一夜青山老謂雪遍山頭故云一夜青山老使君命客金尊倒杜爛熳倒芳樽正千里瓊瑶未經掃欹壓江梅春信早韓欺梅併壓枝十分農事滿城和氣管取来年好謝惠連雪賦盈尺則呈瑞扵豐年憶秦娥雲垂幕隂風慘淡天花落天花落千林瓊玖滿空鸞鶴謂雪如瓊玖之遍千林鸞鶴之滿空也征車渺渺穿華薄路迷迷路増離索増离索楊子离群而索居楚溪山水碧湘樓閤詠雨滿江紅斗帳高張寒窗静瀟瀟雨意詩風雨瀟瀟鷄鳴膠膠南楼近更移三皷古詞楼頭尚有三通皷漏傳一水説文漏以銅盛水莭晝夜以為刻點點不離楊柳外聲聲只在芭蕉裏唐詩一夜不眠孤客耳主人䆫外有芭蕉也不管滴破故鄊心唐詩無端一夜空堦雨滴破思郷萬里心愁人耳文選夜雨滴空堦堦空堦裏空堦滴不入滴入愁人耳無似有逰絲細杜詩落絮逰絲别有情聚復散珎珠碎杜詩万珠跳猛雨天應分付與别離滋味破我一床蝴蝶夢莊子荘周夢胡蝶相相然蝴蝶也輸他雙枕鴛鴦睡古詩客從遠方来遺我一端綺文彩双鴛鴦裁為合歡𬒳向此際别有好思量人千里選謝希逸月賦羙人邁兮音問闕隔千里兮共明月洞仙歌九李元膺簾纎細雨殢東風如困縈断千絲為誰恨向楚宫一夢乃楚襄王巫山夢事多少悲凉無䖏問愁到而今未盡分明都是淚泣柳沾花常與騷人伴孤悶盧仝茶歌七椀破孤悶記當年得意䖏酒力方酣怯䡖寒玉爐香潤温庭筠詞篆縷玉爐香又豈識情懐苦難禁對點滴簷聲夜寒燈暈杜夢覺燈花暈綺羅香春雨史邦卿㣲冷欺花薄煙困柳蕭遇詩水堤烟報柳千里偷催春暮盡日冥迷愁裏𣣔飛還住驚粉重蝶宿西園鄭谷䗋詩微雨宿花房喜泥潤燕歸南浦杜芹泥隨燕嘴最妨他佳約風流鈿車不到杜陵路沈沈江上望極還𬒳春潮急難尋官渡唐韋詩春潮帶雨晚未急野渡無人舟自横隱約遥峯和淚謝娘眉嫵眉嫵事見前注臨断岸新緑生時是落紅帶愁流䖏記當日門掩梨花古詞雨打梨花深閉門剪燈深夜語司空曙詩孤灯寒照雨又唐詩笑剪灯花夜向䦨春霽春晴胡浩然遅日融和杜遅日江山麗乍雨歇東郊嫩草凝碧江淹賦春草碧色紫燕雙飛海棠相襯粧點上林春色黯然望極困人天氣古詞䡖暖䡖寒正是困人天氣渾無力又聽得園苑数聲鶯囀柳隂直唐詩鶯声巧轉緑楊隂當此暗想故園繁華􅓻然遊人依舊南陌院深沉梨花乱落晏詩棃花院落溶溶月那堪如練點衣白酒量頓寛洪量窄筭此情景除非殢酒狂歡恣歌沉醉有誰知得秋霽秋晴新添陳後主虹影侵堦乍雨歇長空萬里凝碧孤鶩髙飛落霞相映逺状水鄊秋色滕王閤詩落霞與孤鶩斉飛秋水共長天一色黯然望極動水無限愁如織又聽得雲外数声新鴈正嘹嚦當此暗想畫閤䡖抛杳然殊無些箇消息漏聲稀銀屏冷落王建詞銀烛秋光冷昼屏那堪殘月照窓白衣帶頓寛猶阻隔筭此情苦除非宋玉風流共懐傷感有誰知得醉蓬莱桞耆卿漸亭皐葉下隴首雲飛素秋新霽韓詩時愁積雨霽華闕中天鎻匆匆佳氣光武紀論望氣者至南陽望見春陵郭曰氣佳㦲欝欝葱䓤嫩菊黄深拒霜紅淺近寳階香砌玉宇無塵金莖有露西都賦杭仙掌以承露櫂双立之金莖碧天如水正值昇平萬機多暇夜色澄鮮漏声迢逓南極星中有老人呈瑞杜今宵南極外甘作老人星此際宸遊鳯輦何䖏度管絃聲脆太液波翻太夜宫名披香簾捲唐蘇世長傳侍宴披香殿月明風細花庵詞客云耆卿爲屯田員外郎㑹太史奏老人星現時秋霽宴禁中仁宗命左右詞臣爲樂章曰侍属耆卿應制耆卿方兾進用作此詞奏呈上見首有漸字色若不懌讀至宸逰鳳輦何処乃與御製真宗晚詞暗台上慘然不恱又讀至太液波翻曰何不言波澄投之扵地自此不復擢用曉景蝶恋花暁行周羙成月皎驚烏棲不定畢公叔早行詩火逺天俱白煙深月𣣔黄驚烏不定拂下一林霜更漏将殘轣轆牽金井杜詩云硯寒金井水又六一公詞金井轆轤聞汲水唤起兩眸清烱烱淚花落枕紅綿冷李賀詩九山静緑淚花紅執手霜風吹鬢影李賀詩春風吹鬢影去意徊徨别語愁難聽楼上䦨干横斗柄吚喔晨鷄鳴闌干横斗柄露寒人逺鷄相應南鄉子新添周羙成晨色動粧楼連昌宫辭晨光未出簾影黒太真流洗楼上頭短燭熒熒悄未收自在開簾風不定颼颼池靣氷澌趂水流吴均詩散漫下氷澌早起怯梳頭𣣔綰雲鬟又却休不㑹沉吟思底事凝眸兩點春山滿鏡愁滿庭芳秦少游山抺㣲雲杜月詩縱破㣲雲掩天連衰草畫角聲断譙門暫停征棹聊共飲離樽李詩别離有相思瑶瑟與金樽多少蓬莱舊事空回首煙靄紛紛斜陽外寒鴉数點流水遶孤村杜孤村春水生銷魂當此際選江淹别賦黯然消魂惟别而巳天寳遺事長安東覇陵有橋呼為銷䰟橋香囊暗觧羅帶輕分謾嬴得秦楼薄倖名存秦楼事見前集注此夫何時見也襟䄂上空染啼痕杜啼垂舊血痕傷情䖏韓凄然自傷情髙城望断杜望極春城上燈火已黄昏行香子新添蘇子瞻北望平川野水荒灣共尋春杜尋春到野亭飛歩巉嚴和風弄䄂魏文帝歌孟春之月和風𥘉暢香霧縈鬟杜香霧雲鬟湿正酒酣人語笑白雲間陶供景詩山中可所有巃上多白雲只何自怡悅不堪持寄君飛鴻落照相将歸去澹姢姢玉宇清閑何人無事宴坐空山望長橋上燈火亂使君還苕溪漁隱云惟北之地平夷自京師至汴口並無山惟隔淮方有南山南山石崖上有東坡行香子詞後題云与泗守過南山晚帰作字畫是東坡所書小字但無姓名崇觀間禁元祐文字遂鐫去之余居泗上打得此碑詞至今尚存馬臨江僊新添李知㡬方舟煙桞踈踈人悄悄韓詩俏俏深夜語畫楼風外吹笙李衛公詩桂殿夜涼吹玉笙倚欄聞喚小紅聲薫香臨欲睡坡詩燈盡不挑垂暗葉香炉重撥尚餘薫坡詞寳香薫𬒳成孤宿玉漏巳三更崔夜詩玉漏銅壼且莫催坐待不来来不去一方明月中庭劉禹錫生公講堂詩一方明月可中庭粉墻東畔小橋横起来花影下王介甫詩春色惱人眠不得月移花影上䦨干扇子撲飛萤王建宮詞銀烛秋光冷昼屏䡖羅小扇撲流萤天堦夜色凉如水卧㸔牽牛織女星南鄊子新添黄叔䁑王林萬籟寂無聲荘子子游曰地籟則衆竅是巳人籟則比竹是巳敢問天籟子綦曰夫吹万木同而使其自巳也衾鐡稜稜近五更魏鶴山詩衾鐵稜夢夢不成香断燈昏吟未稳見前坡詩詞註凄清只有霜華畔月明杜霜溪素月高趙紫芝詩禽翻竹葉霜𥘉下人立梅華月正高應是夜寒凝惱得梅花睡不成我念梅花花念我關情起看清氷滿玉鉼地理宫室金陵西河懐古周羙成佳麗地謝玄暉詩江南佳麗地金陵帝王州南朝盛事誰記山圍故國遶清江䯻鬟對起怒濤寂寞打孤城風檣遥度天際謝玄暉詩天際識帰舟断崖樹猶倒倚莫愁艇子曽繋空遺舊跡鬰蒼蒼霧沉半壘夜深月過女墻来賞心東畔臨淮水劉禹錫金陵詩山圍故國周遭在朝打孤城寂寞囬淮水東邊舊時月夜深還過女墻来樂府詩莫愁在何䖏住在石城西艇子折两漿催送莫愁来韓握時雍是石城艇子来两漿伊啞過花塢鄭谷詩石城昔為莫愁鄊莫愁魂散石城荒帆去帆来風浩渺花開花謝春悲凉詩話總龜云賞心亭丁晋公所作奏准絶致酒旗戯皷甚䖏市歐陽公詩西風酒旗市想依稀王謝鄰里燕子不知何世入尋常巷陌人家相對如説興亡斜陽裏劉禹錫烏衣巷詩朱雀橋邊野草花烏衣巷口夕陽斜舊時王謝堂前燕飛入尋常百姓家漁隱叢話云王謝是二姓即王導謝安之族所居名烏衣巷有曰烏衣之聚不當作謝字或者乃引劉斧摭遺所載唐王謝謝海遇風抵一州見烏衣囯王以女妻之後航思歸取飛雲軒令榭入其中閉目少息至其家視之梁上双燕泥湳後寄詩曰誤到華胥國裏耒主人終日独怜才雲軒漂去無消息洒泪春風㡬百回女荅曰昔日相逢冥数合今時暌逺是生離耒年縱有想思字三月天南無鴈飛此小説虚誕何可信桂枝香金陵懷古王介甫登臨送目文選宋玉九辨登山臨水兮送将歸正故國晚秋天氣𥘉肅文選天髙万物肅瀟洒澄江似練謝玄暉詩澄江静如練翠峯如族征帆去棹殘陽裏背西風酒旗斜矗綵舟雲淡杜詩清江白日落欲尽復携羙人登綵舟星河鷺起李白鳯凰䑓詩三山半落青天外一水中分白鷺州圖畫難足念自昔豪華競逐恨門外樓頭悲恨相續千古憑髙對此謾嗟荣辱羅鄴金陵登歩詩憑高惆悵㧾今古一何殊六朝舊事隨流水吴東晋宋齊梁陳並都金陵是為六朝但寒煙衰草凝緑杜詩江頭宫殿鎻千門細柳新蒲為誰緑至今啇女時時尚歌後庭遺曲南史張貴妃傳陳後主遊宴後庭其曲有玉樹後庭花畧曰璧月夜夜滿瓊樹朝朝新啇女甞歌此古今詞話云今陵懷古諸公寄詞於挂枝香凡三十餘首獨介甫最為絶唱東坡見之不覺嘆息曰此老乃野孤精也念奴嬌赤璧懐古蘇子瞻大江東去浪淘盡千古風流人物李芳名動千古謝安寄為江左風流第一故壘西邊人道是三國周郎赤璧吴志周瑜字公瑾為建威中郎将吴中皆呼為周郎曹操入荆州劉琮舉衆䧏曹公得其水軍舡及歩兵數十萬将士聞之皆恐惧時劉俻又新為曹公所玻因用魯肅計進駐夏口遣諸葛亮詣權欲謀同舉權遂遣瑜及程普等与備并力逆曹公於赤璧瑜部将黄盖曰今冦衆我寡难与待乆然觀操兵方進船艦首尾相接可燒而走也乃取蒙衝闘艦數十艘實以薪草膏油權其中褁以惟幕上建牙旗書報曹公詐以欲䧏軍吏皆延􅖪觀望指言盖䧏放諸船同時發火時風甚猛悉延燒岸上营湏知㷔煙張天人馬燒溺死者甚衆曹公退赤亂石穿空驚濤拍岸捲起千堆雪李白詩濤白雪山来江山如畫一時多少豪傑遥想公瑾當年小喬𥘉嫁了瑜𥘉從琮㧞之時獲喬公二女皆囯色䇿納大喬瑜納小喬䇿從容戯瑜曰喬公五女錐流离得吾二人爲婿亦足矣雄姿英發吴志權謂吕子明可次於公瑾但言議英發不交之耳羽扇綸巾蜀志諸葛亮葛巾羽扇談咲間檣艣灰飛煙㓕李白赤璧歌二龍争闘决雌雄赤璧楼舡掃地空烈火𥘉張照雲海周瑜於此破曹公諸本多作強虜灰飛煙㓕投李曰此歌既曰楼船掃地空則用墻艣二字其義優於強虜故國神遊多情應笑我早生華髪人生如夢李白詩處世若大夢胡爲劳其生一樽還酹江月召溪漁隱云東坡大江東去赤璧詞語意高妙真古今絶唱近時有人和此詞題於郵亭璧間不著姓氏語雖麄豪亦氣槩亦喜今併録之詞云炎精中否歎人村委靡都無英物戎馬長驅三犯闕誰作連城堅璧楚漢吞并曹刘割據白㡌今如雪書生鑚破舊編說甚豪傑天意建我中興吾君神武小曽孫周發海嶽封強俱效賊狂虜何曽追㓕翠羽笛巡叩闗無路途徒有衝冠髮孤忠耿耿劒鋒冷浸秋月西湖酹江月西湖和韻新添辛㓜安晚風吹雨戰新荷聲亂明珠蒼璧誰把香奩收寳鏡雲錦周遭紅碧坡詩貪看翠盖擁紅粧不斍湖邉一夜霜卷却天機雲錦叚從教匹練寫秋光飛鳥翻空游魚吹浪慣听笙歌席坐中豪氣看君一飲千石遥想䖏士風流䖏士謂林浦也鶴隨人去已作飛仙客北山移文山人去兮夜鶴怨茅舎竹籬今在否松竹已非疇昔欲徃當年望湖樓下水與雲寛窄醉中休問断膓桃葉消息遊湖賀新郎新添劉改之龍洲睡覺啼鶯暁醉西湖兩峯日日買花簮帽去盡酒徒無人問惟有玉山自倒襄陽歌玉山自倒非人推任拍手兒童争笑㐮陽歌㐮陽小兒齊柏手欄街争唱白銅鍉傍人借問笑何事笑殺山翁醉似泥一騎乘風翻然去避魚龍不見波聲悄歌韻逺唤蘇小白居易詩濤聲夜入伍貟庙柳色春藏蘇小家神仙路近蓬莱島列仙傳謝自然泛海求蓬莱一道士謂曰蓬莱隔弱水三十万里非飛仙不可到紫雲深參差樹有煙花遶杜詩紫禁正耐煙花遶人世紅塵西障日庾亮出據上流擁強兵趍向者多歸之王道内不能平遇西風塵起舉扇自障曰元規塵汚人禇彦句以腰扇障目百計不如歸好付樂事與他年少費盡柳金梨雪句李白宫詞柳色黄金嫰梨花白雪香問沉香亭北何時召心未愜鬂先老明皇与貴妃在沉香亭賞牡丹遣髙力士召李白應制賦清平調詞云名花國色两相歡長得君王帶笑看觧釋春風無限意沉香亭北倚䦨干錢塘望海潮新添桞耆卿東南形勝三吴都㑹仁宗御製池有湖山羙東南第一州錢塘自古繁華煙柳畫橋風簾翠幙參差十萬人家雲樹繞堤沙白居易詩万株松竹青山上十里沙堤明月中怒濤卷霜雪天塹無涯市列珠璣户盈羅綺競豪奢重湖疊巘清佳有三秋桂子十里荷花羗管弄晴菱歌泛夜嬉嬉釣叟蓮娃千騎擁高牙乗時聽簫皷咲賞煙霞異日圖将好景歸去鳯池誇羅鶴林云此詞流播金玉亮聞歌欣然有慕於三秋桂子十里荷花遂起投渡江之志近時謝䖏厚詩云誰把杭州曲子謳荷花十里桂三秋那知卉木無情物牽動長江万古愁余謂此詞虽牽動長江之愁然卒為全生送死之媒未足也至扵荷艶桂香粧點湖山之清麗使士大夫流連扵歌舞嬉逰之樂遂忘中原是則深可恨耳八聲甘州追和東坡韻新添眺無咎謂東坡未老賦歸来天未遣公歸向西湖兩䖏秋波一種飛靄澄暉又擁竹西歌吹杜牧詩斜陽竹西路歌吹是楊州僧老水蘭非一笑千秋事浮世危機莫倚平山欄檻是醉翁飲䖏歐陽文忠公知除州日作亭琅邪山自号醉翁因以名亭後守楊州扵僧寺建平山堂甚得觀覧之勝堂下手值柳数株後数年公在翰林金華劉原父出守維陽出家樂飲餞親作朝市惜之詞江雨霏霏送孤鴻揮手相接眼中稀念平生相從江海任飄蓬杜平生江海心不遣此心違登臨事更何湏惜吹帽淋衣天台玉楼春詠劉阮事周羙成桃溪不作從容住秋藕絶来無續䖏當時無柰鳥声哀今日重尋芳草路續齊楷記漢永平中剡縣有劉晨阮肇入天台山採藥迷失道路糧盡望山頭有桃共取食之下山得澗水飲之見有一杯流出中有麻胡飯屑二人相謂曰去去不逺矣因過水深四丈許行一里又度一山出大溪見二女絶色唤劉阮姓名如有舊交道郎等来何晚也因邀過家床帳帷幔非人世所有又有仙客數人将三万桃至云来慶女婿各出樂噐作樂二人就女家止宿遂行夫婦之禮住半年天氣常如二三月木鳥哀鳴永歸甚切女曰罪根未烕使君等如此送從洞口去鄕里異之自入山至歸巳七代子孫矣欲還女家尋山路不蒦煙中列岫靑無数鴈背夕陽紅欲暮人如風後入江雲杜詩半入江風半入云情似雨餘粘地絮俗東坡有點綘唇詠天台云醉様輕舟信流直到花深処塵縁拍誤无計花間住煙水茫茫回首斜陽暮山无𢾗乱紅如雨不計来時路盖全用刘阮天台事也今併附于此洞仙歌垂虹橋林外飛梁壓水飛梁橋也尓雅釋各橋水梁也虹影澄清暁橘里漁村半烟草嘆今来古徃淮南子斉俗説徃古来今謂之宙物换人非天地裏惟有江山不老雨巾風帽郭林宗遇雨其巾垫而拆其角一孟嘉宴龍山風至吹落嘉帽也四海誰知我一劒横空㡬畨過按玉龍嘶未断月冷波寒歸去也林屋洞關無鎻韓詩洞門無鎻鑰俗客不曽来認雲屏烟障是吾庐淵明詩吾亦爱吾庐任滿地蒼苔年年不掃杜詩石田茅屋荒古今詞話云此詞乃近時林外題予蒼苔吴江垂虹亭世或傳以為吕洞賓所作者非也水閤天仙子景物因人成勝槩滿目更無塵可碍等閑簾幙小䦨干衣未觧心先快明月清風如有待杜詩江山如有待誰信門前車馬隘别是人間閑世界李白詩别有天地非人間杜鶯花隨世界坐中無物不清凉山一帶水一派流水白雲長自在増修菚註妙選群英草堂詩餘卷上増修箋註妙選羣英草堂詩卷下後集人物名賢詞話隠逸滿江紅幽居吕居仁東里先生家何在山隂溪曲晋王猷字徽之甞居山隂對一川平野杜詩星垂平野闊數椽茅屋昨夜岡頭新雨過門前流水清如玉抱小橋回合柳參天杜詩喬木上參天揺新緑杜詩茅齋八九縁踈籬下叢叢菊陶詩東簡採菊下虚簷外蕭蕭竹李白修北詩修窓竹嘆古今得失是非荣辱韓詩弃置人間事古来今独非杜詩吾老甘貧病萦懐有是非又忘情任荣辱湏信人生歸去好世間万事何時足問此青春醖酒何如詩為此春酒以介眉夀今朝熟苕溪漁隠曰余性樂閑退一丘一壑盖特老焉吕居仁所作此詞能具道阿堵中事毎一哥之未甞不挈節也摸魚兒退居眺無咎買陂塘旋栽楊柳依稀淮岸湘浦東皐雨過新痕漲歸去来辞登東皐以舒肅沙觜鷺来鷗聚堪愛䖏最好是一川夜月光流注無人自舞任翠幄張天柔䄄籍地酒盡未能去青綾𬒳休憶金閨故歩杜諸公金潤彦儒冠曽把身誤杜儒冠多誤身弓刀千騎成何事荒了召平瓜圃漢召平秦故東陵侯也種瓜長安城門東其瓜羙故今傳東陵之瓜盖自召平始也君試覷滿青鏡星星鬂影昔十八囯春秋符不遺謝玄青銅鏡星星白鬂也今如許功名浪語便似得班超封侯万里歸計恐遅暮後班超傳家貧常為官慵書以俱養乆劳苦甞輟業投筆嘆曰大丈夫無他志畧尤當效傳介子張騫立功異域以取封侯安能乆事筆硯間乎其後諸相者曰生燕領虎額當封侯万里之外後使西域封定逺侯花庵詞客云晁無咎摸魚兒真能道急流勇退之意真西山極愛賞之沁園春退間新添辛㓜安三逕𥘉成歸去耒辞三逕就荒松菊尤存鶴怨猿驚北山移文山人去兮夜鶴怨蕙帳空兮曉猿驚稼軒未来甚雲山自許平生意氣衣冠人笑抵死塵埃意倦湏還身閑要早豈為蓴羔鱸鱠㢤張翰事見前秋景注秋江上看驚弦鴈避駭浪船回東崗更葺茅齋好都把軒窓臨水開要小舟行釣先應種柳踈籬護竹莫礙觀梅秋菊堪餐离騷食秋菊之落英春蘭可佩同上紉秋蘭以為佩兮留待先生手自栽沈吟乆怕君恩未許此意徘徊哨遍歸去来辞蘇子瞻為米折腰因酒棄家口躰交相累歸去来誰不遣君歸斍從前皆非今是露未睎征夫指予歸路門前笑語喧童稚嗟旧菊都荒新松暗老吾年今已如此但小窓容膝閉柴扉䇿杖看孤雲暮鴻飛雲出無心鳥倦知還本非有意噫歸去来兮我今忘我兼忘世親戚無浪語琴書中有真味歩翠麓﨑嶇泛溪窈窕㳙㳙暗谷流春水觀草木欣榮幽人自感吾生行且休矣念寓形宇内復㡬時不自覺皇皇𣣔何之委吾心去留誰計神仙知在何䖏富貴非吾願但知臨水登山嘯詠自引壷觴自醉此生天命更何疑且乗流遇坎还止並陶渊明帰去来辞東坡自序云陶渊明賦帰去来辞有其詞而無其聲余治東坡築雪堂於上人俱笑其漏独鄱陽董毅夫見而恱之有卜鄰之意乃取帰去来辭稍歸隱括使就声律以遺毅夫使家童歌之時相從於東坡釋耒而和之扣生而為之節不亦樂乎漁父鷓鴣天黄魯直西塞山邊白鷺飛桃花流水鱖魚肥張志和漁歌子云西塞山前白露飛桃花流水鱖魚肥清箬笠緑簑衣斜風細雨不湏歸志和居江湖自号玄真子朝廷尚覔玄真子何䖏如今更有詩青箬笠緑簑衣斜風細雨不湏歸見上注人間欲避風波險一日風波十二時山谷自序云李如虎云玄真子漁父詞以鷓鴣天歌之極入律值少数句因以玄真子遺事足之憲宗昼像訪之江湖不得因令集其歌詩上之玄真兄松齡惧其放浪而不返和其漁父云樂在風波釣是閑草堂松桂巳勝攀大湖水洞庭山狂風浪起且湏還此余續成之意漁家傲新添謝無逸秋水無痕清見底杜秋水清無底蓼花汀上西凨起古詩修修風動蓼花汀一葉小舟煙霧裏韓文公詩共泛䔥䔥一葉舟蘭棹艤柳條帶雨穿双鯉自嘆直鈎無䖏使笛声吹散雲山翠鱠落霜刀紅縷細新酒羙醉来独枕簑衣睡吕洞賓詩不脫簑衣卧月明佳人滿庭芳蘇東坡香靉雕盤寒生氷筯開元遺事冬日雪霽皆為氷妃子取翫帝問之妃子曰所翫氷筯也畫堂别是風光主人情重杜主人情䦨熳開宴出紅粧􅕹玉圎槎素頸洛神賦延􅖪秀項皓質呈露柳耆卿詞亦使此全句藕絲嫩新織仙裳双歌罷虚欄轉月餘韻尚悠颺人間何䖏有司空見慣應謂尋常坐中有狂客惱乱愁腸唐杜鴻漸司空鎮洛時劉禹錫為蘇州刺史過洛杜出二妓為宴酒酣命妓進詩扵劉􅎅甚醉就寢中夜酒醒見二婦人侍側驚問其故對以席上作詩司空因命侍寝令誦其詩曰髙髻雲鬟宫様粧秋風一曲杜韋娘司空見慣渾閑事惱断蘇州刺史腸報道金釵墜也十指露春笋纎長張祐客住南幕中赴宴時杜紫㣲為支使南座有属良之意索骰子賭酒杜紫㣲吟曰骰子巡巡褁手拈無因得見玉纎纎祐應曰但知報道金釵落彷彿还因露指尖親曽見全勝宋玉想像賦高唐楚襄王夢与巫山神女接目以告宋玉玉因為高唐賦玉林詞選云柳耆郷有晝夜楽詞云秀香家住桃花徑筭神仙才堪並層波細剪明眸膩玉圎槎素􅖪爱把歌喉當延逞遏天邊乱云愁凝言語似嬌鶯一事声堪听洞房飲散簾幃静擁香衾歡心称金炉射裊青烟鳯帳烛摇紅無限狂心乗酒興這歡悮漸入佳境猶自怨鄰雞道秋宵不永盖為贈妓作也此詞䴡以淫不當入選東坡嘗引用其語故併此詞録之意難忘周羙成衣染鶯黄温庭筠舞衣詩云偷得鶯黄鎻金縷愛停歌駐拍勸酒持觴低鬟蝉影動杜牧續張㑹真詩低鬟蝉影動回歩玉塵蒙私語口脂香方千羙人詩些些私語恐人知杜詩口脂面薬隨恩澤􅉉露滴竹風凉拚劇飲淋浪王令詩好使渇耒能劇飲舒亶詩空得淋浪酒蒲衣夜漸深籠燈就月子細端相端相猶正視也知音見說無雙觧移宫换羽未怕周郎吴志周郎少精意扵音樂虽三爵之後其有闕誤瑜必知之必顧故时人語曰曲有誤周郎顧長顰知有恨貪耍不成粧㱔子事惱人腸試說與何妨又怨伊尋消問息痩减容光崔氏詩自從消痩减容光憶秦娥香馥馥文選蘇詩馥馥我蘭房樽前有箇人如玉詩野有死􅍪有女如玉白駒其人如玉人如玉翠翹金鳯内家粧束長恨歌翠翹金雀玉搔頭嬌羞爱把眉兒蹙李白詩嬌歌半欲羞逢人只唱相思曲相思曲一聲聲是怨紅愁緑桞梢青有箇人人海棠標韻見楊妃海棠睡未足注下飛燕輕盈前成帝趙飛燕体䡖能為掌上之舞酒暈潮紅羞娥凝緑一笑生春長恨歌回頭一笑百媚生爲伊入限熏心更說甚巫山楚雲見髙唐雲雨事注斗帳香消紗窓月冷着意温存小冲山宋豊之花様妖嬈柳様柔眼波流不断滿眶秋眼波見前注窺人佯整玉搔頭嬌無力舞罷却成羞長恨歌侍兒扶起嬌無力無計與遅留薛能惜春詩無計延春日何能留少年滿懐禁不得許多愁一溪春水送行舟無情月偏照水東楼選七哀詩明月照高楼玉女揺仙佩新添桞耆卿飛瓊伴侣偶别珠宫未返神仙行綴漢武帝内傳西王毋呼武帝共坐許飛瓊鼓云和之黄唐許澤甞夢登山有宫室陵云旣入見数人方飲酒招之至暮不罷賦詩曰曉入瑶䑓露氣清座中惟有許飛瓊塵心未尽俗縁在十里下山空月明他日復夢至其䖏飛瓊曰子何故顕予姓名人間乎座上即改曰天風吹下歩虚声飛瓊曰善伴合也必要經仙宮中有蘃宫之闕取次梳粧尋常言語有得㡬多姝麗擬把名花比恐傍人笑我談何容易細思筭竒葩艶卉惟是深紅淺白而巳争如這多情占得人間千嬌百媚湏信昼堂綉閣皓月清風忍把光隂䡖弃自古及今佳人才子少得當年双羙左傳曰賈大夫悪娶妻羙其妻三年不言不笑唐刺史韋詵有女羙擇其宜帰告妻曰常求佳婿今得之矣明日請其族使觀之其婿粧寛衣碧衣瘠而長無入族人皆笑呼碧鸛雀此夫悪而婦羙者也㐮陽記諸葛孔明甞擇婦而娶阿承醜女俚諺曰莫作孔明娶婦正得阿承醜女登徒子之妻蓬頭夸耳缺唇歷人傍行楼又疥且痔登徒子恱之生五子此夫羙而婦悪者也自古及今少双羙似此之類且任相偎倚未消得憐我多才多藝願妳妳蘭心蕙性枕前言下表余深意為盟誓曲礼約信曰誓位牲曰盟今生断不辜鴛𬒳古詩云客從逺方耒遺我一端綺文彩双夗央裁為合歡𬒳妓女水龍吟贈妓秦少游小楼連苑横空下窺繡轂雕鞍驟李白詩花下醉雕鞍踈簾半捲蘇易簡詩叚􅎅半捲天香散单衣𥘉試詞話佳人𥘉試薄羅衣清明時候破䁔䡖風弄晴㣲雨𣣔無還有賣花声過尽垂桞院落紅成陣飛鴛甃玉佩丁東别後悵佳期參差難又名韁利鎻天还知道和天也痩花下重門李花下一壼酒桞邊深巷杜帰院桞邊迷不堪回首念多情但有當時皓月照人依舊高斉詩話秦少游在蔡州与营妓娄婉字東玉者甚宻贈之詞云小楼連苑横空又曰玉佩丁東别後是也又贈妓陶心而詞南歌子云玉漏迢迢尽銀河淡淡横夢囘宿酒未全醒㔾𬒳鄰雞催起怕天明臂上粧猶在禁間淚上盈水邊灯火漸人行天上釣殘月帶三星末句謂心宇也玉樓春妓舘歐陽永叔妖冶風情天與指清瘦飢膚氷雪妬荘子飢膚若氷雪百年心事一宵同愁聽雞声窓外度幽冥録宋処宗窓下有長鳴雞信阻青禽雲雨暮漢武帝祭西王母王毋𣣔下先遣青鳥啣書耒海月空驚人兩処強将離恨倚江楼江水不能流恨去按司馬栖有贈妓一詞名蝶恋花云妾本錢塘江上住花落花開不管流年度燕子啣将春色去紗窓㡬陣黄梅雨斜挿犀梳雲半吐檀板䡖𫾣唱徹黄金縷望断行云無覔処夢回明月在南浦又毛覷民有贈錢塘妓惜分飛詞云淚湿䦨干花着露愁到眉峯碧聚此恨平分取更無言語空相覷断雨殘雲無意緒寂寞朝朝暮暮今夜山深処断䰟分付朝回去大爲東坡稱賞澤民由此得名此二詞話語皆祖六一翁月意南鄊子題南劒妓舘新添潘庭堅我怕倚䦨千閣下溪声閣外山惟有舊時山共水依然暮雨朝雲去不還暮雨朝雲見髙唐賦云云應是躡飛鵉月下時時整佩環月又漸低霜又下趙夭楽詩禽翻竹葉霜𥘉下人立梅花月正髙更闌折得梅花獨自看人事上附宫詞閨情風情旅况離别宫詞臨江仙新増鹿䖍扆金鏁重門荒苑静綺窓愁對秋空翠華一去寂無蹤長恨歌翠華揺揺時復上西出都門百餘里玉樓歌吹声断已隨風司上玉楼宴罷醉如春煙月不知人事改夜䦨還照深宫藕花相向野塘中暗傷亡國清露泣香紅按周羙成西詞云燕子不知何山向尋常巷陌人家相對如說㒷日斜陽裏亦是就姻月不知人事改句変化出耒宫春小重山新増和凝春入神京萬木芳禁林鶯語滑蝶飛忙暁桃凝露妬啼粧紅日永風和百花香煙鎻柳絲長御溝澄碧水轉池塘選詩垂楊䕃御溝時時㣲雨洗風光天衢逺杜詩献可天衢直到䖏引笙篁愚按和凝為石晋宰相有喜迁鶯一詞云暁月墜宿雲披銀燭錦屏推建章鍾動王繮低宫漏出花遅昏態淺耒双燕紅日新長一線嚴粧欲罷轉黄鸝飛上万年枝此詞与小重山詞語意相類至扵薄命女一詞云天欲暁宫漏穿花声繚繞窓裏星光少冷霞寒侵悵額殘月光沉樹抄夣断錦幃空悄悄強起愁眉小此詞頗尽宫中幽怨之意併附于比小重山韋荘一閉昭陽春又春昭陽官殿名夜寒宫漏永夢君恩臥思陳事暗銷魂羅衣湿流血旧啼痕李珠淚湿羅衣杜啼血舊血痕歌吹隔重閽遶庭芳草緑選刘安招隠芳草生兮萋萋倚長門李詩月光欲到長門殿别作深宫一叚愁萬般惆悵向誰論顒情立宫殿欲黄昏潘閬宫詞經年不見君王靣花落黄昏空掩門玉楼春李後主晚粧𥘉了明肌雪春殿嬪娥魚貫列易剥卦六五貫魚以宫人寵笙簫吹断水雲閑重按霓裳歌遍徹見月類注臨春誰更飄香屑杜詩香飄合殿春風轉醉拍䦨干情未切帰時休照燭花紅杜詩坐乆燭花紅待放馬蹄清夜月閨情觧連環周羙成怨懐難託嗟情人断絶信音遼邈意妙手能觧連環戦國䇿始皇遺齊君王后玉連環曰斉多智也觧此環否以示群臣不知觧君王后引推推破之謝秦使曰謹以觧矣似風散雨收霧䡖雲薄燕子楼空暗塵鎻一床弦索唐張建封節制武寕好賢楽善眄眄廼徐府竒色公納之燕子楼三日楽不息公薨眄眄感激深恩逝不他適杜甫暗塵生古鏡元禎詩夜半月髙絃索鳴想移根换葉尽是舊時手種紅藥汀洲漸生杜若謝晀詩芳洲采杜若注杜若香草名料舟移岸曲人在天角東坡詩故人各在天一角記得當日音書把閑語閑言尽緫燒却水驛春回望寄我江南梅蕚吴陸凱与范曄善自江南寄梅花詣長安与曄井贈詩曰折梅逢驛使寄与隴頭人江南無所有聊贈一枝春拚今生對酒對花為伊淚落菩薩蛮李太白平林漠漠煙如織寒山一帶傷心碧暝色入髙楼有人楼上愁杜詩暝色延山經欄千空佇立宿鳥帰飛急何䖏是回程長亭更短亭白氏六帖五里一短亭十里一玉林云太白此詞允長亭為百代詞曲之祖南鄊子孫夫人暁日壓重􅉉斗帳春寒起未忺天氣困人梳洗懶眉尖淡畫春山不喜添韓南山詩天字浮脩眉濃緑昼新就閑把綉絲撏認得金針又倒拈陌上遊人歸也未選王孫遊兮不歸厭厭詩厭厭夜飲滿院楊花不捲簾惟其不捲簾所以楊花滿院憶秦娥花深深杜詞穿花峽蝶深深舞一鈎羅襪行花隂行花隂閑将桞帶試結同心李白詩横垂宝帶同心結耳邊消息空沉沉畫眉楼上愁登臨楚詞登山臨水兮送将帰愁登臨海棠開後望到如今燭影摇紅乳燕穿簾謝晀詩風簾双燕入乱鶯啼樹清明近桞詩山城過雨百花盡榕葉滿庭鶯乱啼隔簾時度桞花飛杜桞花閑度竹猶覺寒成陣長記眉峰偷隠臉桃紅難藏酒暈唐詩桃花笑臉紅背人微笑半亸鵉釵䡖籠蝉鬂古今注魏文帝宫人莫瓊樹始制今蝉鬂望之縹緲如蝉故号曰蝉鬂别乆啼多眼應不似當時俊滿園珠翠逞春嬌没个他風韻若見賓鴻試問待相将綵牋寄恨杜高文擲綵牋㡬時得見闘草帰来双鴛微潤賣花聲新添康伯可蹙損逺山眉幽怨誰知羅衾滴盡淚烟脂見前集注夜過春寒愁未起門外鴉啼古詩唤婢打鴉兒莫教枝上啼啼時驚妾夢不得到遼西惆悵阻佳期人在天涯東風頻動小桃枝崔護詩桃花依旧笑東風正是銷魂時候也暸亂花飛按伯可又有賣花声一闋云愁撚断釵金逺信沉沉秦筝調怨不成音郎馬不知何処也楼外春深好夢已難尋夜夜餘衾目窮千里正傷心記得當𥘉郎去路緑樹隂隂亦是詠閨思併附見于此應天長新添康伯可管絃綉陌燈火畫橋塵香舊時歸路腸断䔥娘麗情集楊生賦崔娘詩情潤潘郎玉不如中