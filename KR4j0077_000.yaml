浣溪沙此調乃攤破浣溪沙一名山茶子李景手捲真珠上玉鈎李白詩真珠高捲對簾鈎杜凨簾自上鈎依前春恨鎻重楼風裏落花誰是主陳謝貞詩凨定花猶落思悠悠李詩極目心悠悠青鳥不傳雲外信漢武帝好神仙乃築灵䑓設祭西王母感得王母与帝将仙桃下至漢宮妃王母欲下先有青鳥一双㗸書报帝帝與王母相見後升雲駕而去胡曽詩青鳥西况隴樹秋摭遺青鳥去時雲路断丁香空結雨中愁囬首緑波三峽暮接天流杜詞源倒流三峽水温叟詩話李景有曲手捲真珠上玉鈎或改為珠簾舒信道有曲云十年馬上春如夢或改云如春夢非所謂知音浣溪沙風壓輕雲貼水飛乍晴池舘燕爭泥李堯夫燕詩江上飛高雨乍情沈郎多病不勝衣沈約事見前注沙上未聞鴻鴈信歐陽公詩驚起暮天沙上鴈竹間時有鷓鴣啼李詩苦竹南枝鷓鴣啼此情惟有落花知浣溪沙一曲新詞酒一盃敏揵詩千首飄零酒一盃去年天氣舊亭臺夕陽西下㡬時囬無可柰何花落去似曽相識燕歸來小園香徑独徘徊風隱叢話晏元献公赴杭州道過維陽憇大明寺冥目徐行使侍吏誦璧間詩板戒其勿言爵里姓名終篇者無㡬又俾别誦一詩云水調隋宫曲當年亦丸成哀音已亡國廢沼尚留名義鳳終陳迹鳴蛙只廢声凄凉不可問落日下荒城徐間之江都尉王琪詩也召至同飯又同步逰池上春晩已有落花晏云每得句書墻璧間或弥年未甞強對且如無可柰何花落去至今未能也王應声曰佀曽相識燕帰來此辝置舘卜筭子秦處度春透水波明寒峭花枝痩極目煙中百尺樓杜極目揔無波楊文公詩楼危高百尺人在楼中否四和裊金鳬四和謂香金鳬謂香鴉也雙陸思纎手双陸棊也選纎纎出素手擬倩東風浣此情情更濃如酒謁金門鴛鴦浦春漲一江花雨桞子厚詩春浦漲桃花隔岸数声𥘉過櫓韓詩香凨隔岸聞杜詩柔櫓輕鷗外曉風生碧樹舟子相呼相語詩招招舟子杜詩相呼相近水中鷗載取暮愁歸去杜詩載得暮愁歸寒食江村芳草路杜詩寒食江村路愁来無着処謁金門空相憶杜詩見酒湏相隱憶無計與傳消息天上嫦娥人不識後漢書注姮娥奔月謂身為蟾蜍又杜詩莫教明月去晋着酔姮娥寄書何處覔春睡斍來無力長恨歌侍兒扶起嬌無力始是新承㤙澤時不忍把伊書跡滿院落花春寂寂王維詩落花寂寂啼山鳥又杜詩寂寂春将晚断腸芳草碧李白詩今成断腸草謁金門春雨足詩信南山益之以霡霂旣優旣握既沽旣足注春小雨也染就一溪新緑桞外飛來双羽玉杜甫鷗詩却思双玉羽弄晴相對浴杜天睛喜浴鳬楼外翠簾高軸倚遍欄干幾曲雲淡水平煙樹簇寸心千里目杜欲使寸心傾選宋玉招䰟注眇然逺視目極千里生查子晏叔原金鞍羙少年杜詩後邉簇馬立金鞍又詩瀟洒羙少年去躍青驄馬劉貢父詩天外青驄響玉蹄牽繋玉楼人翠𬒳春夜寒選翡翠未𬒳爛齊光消息未帰來杜詩去住彼此無消息寒食梨花謝歳時記冬至後一百五百謂之寒食無處說相思背立秋千下秋千北方戌戯探春令緑楊枝上曉鶯啼僧斉巳鶯詩避人双入緑楊深報融和天氣𬒳数声吹入紗牕裏又驚起嬌娥睡緑雲斜嚲金釵墜阿房宮賦緑云擾擾梳曉鬟也張祐客淮南幕中赴宴時杜紫微為攴使南座有属意之処索骰子賭酒牧㣲吟曰骰子廵廵褁手拈無因得見玉纎纎祐應之曰但知假道金釵落彷彿还應露指尖惹芳心如醉為少年濕了鮫綃帕上都是相思淚如夢令楼外殘陽紅滿春入桞條将半桞詩青入桞條新桃李不禁風囬首落英無限腸断腸断人共楚天俱遠杜楚客今腸断又長歌楚去碧浣溪沙張子野錦帳重重捲暮霞屏風曲曲闘紅牙恨人何事苦離家枕上夢魂飛不去覺來紅日又西斜唐詩夢魂不知逺非過大江西又韓愈詩云水滄茫白日向西滿庭芳草襯殘花浣溪沙張子野水滿池塘花滿枝文選白水滿春塘杜詩黄四娘家花滿蹊千朶万朶壓枝低亂香深裏語黄鸝杜詩兩个黄鸝鳴翠桞東風輕軟弄簾幃日正長時春夢短坡詞世事短如春夣燕交飛処桞煙低古詞双双飛燕桞邊輕玉牕紅子闘棊時菩薩蛮何籕南園滿地堆䡖絮李白詩南園緑草飛胡蝶杜詩䡖輕花絮飛愁聞一霎清明雨雨後却斜陽杏花零落香王徽之寒食詩路徑㣲雨落花村無言匀睡臉杜牧之題桃花夫人廟詩云云枕上屏山掩時節欲黃昏無聊独倚門潘閬宮詞花落黄昏空掩門點綘唇何籕春雨𪷟𪷟淡煙深鎻垂楊院暖凨䡖扇落尽桃花片薄倖不來前事思量遍無由見淚痕如線杜詩伏枕淚思㾗界破殘粧面點絳唇何籕鶯踏花飜亂紅堆徑無人掃杜詩花徑不曽縁客掃杜䳌来了梅子枝頭小撥尽琵琶揔是相思調方于詩琵琶弦促千般調知音少列湯問伯牙鼓琴志在高山鍾子期曰峩峩然若太山志在流水子期曰洋洋然若江河子期死伯牙以丗無知音也暗傷懐抱門掩青春老小重山趙徳仁楼上風和玉漏遅崔液詩玉漏銅臺且莫催秋千庭院静落花飛古今藝術秋干北方戍戯杜凨能高下飛午窻纔起暖金巵白楽天詩玉液黄金巵匀面了欄畔看春池杜春池賞不稀何事苦顰眉鄭谷詩眉黛有時顰碧雲春信断侭來時鴛鴦㳺戯鎮相随雲務歛新月掛天西記祭義月生扵西醉春凨陌上清明近行人難借問風流何處不歸來悶悶悶囬鴈峰前戯魚波上囬鴈峯在今衡州試㝷芳信夜永蘭膏烬春睡何曽穏枕邊珠淚㡬時乾恨恨恨惟有窻前過來明月照人方寸列子仲尼篇吾見子心矣方寸之地虚矣夏景隔浦蓮周羙成新篁揺動翠葆唐儀衛志天子有羽葆華盖曲徑通深窈唐詩竹徑通幽処夏果收新脆金丸落飛鳥李賀詩年少皆把金丸落飛鳥濃靄迷岸草蛙声閙驟雨鳴池沼杜詩驟雨落河魚水亭小韓愈詩空凉水上亭浮萍破處􅉉花簾影顚倒杜詩灯前細雨􅉉花落綸巾羽扇晋謝万常看白綸巾見簡文帝又晋志顧荣伐陳敏以白羽扇揮之賊衆大敗醉卧北窻啼曉晋陶渊明爲彭澤令觧印綬賦帰去來辭甞言夏月虚閑高卧北窻之下清風颯至自謂羲皇上人屏裏呉山夢柯到驚覺依前身在江表後秦王猛謂符堅日謝安中皆江表偉人苕溪漁隱云羙成此詞云浮萍破処􅉉花簾影顛倒按杜少陵詩灯前細雨􅉉花落羙成用􅉉花二字与出処意不相合方知用字之嘆如此賀新郎𥘉夏葉夣得市林居士睡起流鶯語韋蘇州詩流鶯日日啼花間掩蒼苔陳充落花詩巳謝蒼苔容點綴房櫳向曉乱紅無数李賀将進酒况是青春日将暮桃花乱落如紅雨吹盡殘花無人問惟有垂楊自舞漸暖靄𥘉囬䡖暑寳扇重㝷明月影文選班婕妤詩裁為合歡扇團圓佀明月暗塵侵尚有乗鵉女龍城録八月望日明皇逰月宫見素娥千余人皆皓衣乗白鵉驚舊恨鎮如許江南夢断衡皐渚岑叅詩洞房昨夜春風起遥憶羙人湘江水枕上片時春夣中行尽江南数千里浪粘天蒲萄漲緑㐮陽歌遥看漢水鴨頭緑恰似蒲萄𥘉發醅半空煙雨古詞余花落処滿地和烟雨無限楼前滄波意李白詩离恨滿滄波誰採蘋花寄取桞子厚詩春凨無悵瀟湘意欲採蘋花不自由但悵望蘭舟容與桞子厚詩騷人遥駐木蘭舟又凢歌聊逍遥兮容与萬里雲㠶何時到李白詩云㠶遙望不相見送孤鴻目断千山阻選目断孤鴻又韓詩千山隔兮万山阻誰爲我唱金縷裴慶余詩滿額鵝黃金縷衣翠翹浮動玉釵垂從教水濺羅𥜗湿疑是巫山行雨時念奴嬌夏日避暑僧仲殊故園避暑杜詩故園松桂發又袁紹至夏㑹客大飲號可朔避暑飲爱䌓隂翳日桞宗元詩是時春向暮桃李生䌓隂流霞供酌杜詩細細酌流霞竹影篩金泉潄玉韓聮句云竹影金鎻碎泉声玉琮琤紅映薇花簾箔白楽天詩紫薇花對紫薇郎素質生風唐文宗詩薫凨自南來殿閣生㣲凉香肌無汗綉扇長閑却班婕妤怨歌行裁為合歡扇團圓似明月云云弃捐篋笥中㤙情中道絶雙鵉栖處緑筠時下風籜王子年拾遺記蓬萊有浮筠之幹莖青葉紫有青鵉集其上吹断舞影歌声李白独酌詩我歌月徘徊我舞影零乱陽臺人去有當年池閣宋玉高唐賦朝朝暮暮陽臺之下佩結蘭英凝念乆屈原離騷紉秋蘭以爲佩言語精神依約燕别雕梁滕白燕詩眞珠高捲語雕梁鴻歸紫塞杜詩蕭蕭恨塞鴈音信憑誰託爭知好景爲君長是䔥索坡詩一年好景君湏記正是橙黄橘緑時李白詩古路如秋凨相逢尽䔥索瀟湘逢故人慢𥘉夏王和甫薫凨微動家語南凨之薫弓方榴花弄色萱草成窩說文忘憂草也翠幃敞䡖羅試李賀詩羅幃綉幕圍香凨冰簟𥘉展㡬尺湘波韓謝贈簟詩八尺含風漪踈􅉉廣厦前王傳廣文之下稱瀟湘一枕南柯異聞傳淳于棼宅南有古槐醉夢入槐安囯見王王曰吾南柯郡屈卿為守及窹見占槐直上南枝即南柯郡也引多少夢魂歸緒洞庭雨棹煙簑驚囬處閑晝永更時時燕雛鶯友相過正緑影婆婆况庭有幽花杜詩幽花歌滿樹池有新荷六帖池荷𥘉貼水青梅煑酒幸随分贏取高歌功名事到頭終在歲華忍負清和選首夏猶清和洞仙歌夏夜蘇子瞻氷肌玉骨自清凉無汗荘逍遥逰藐姑射之山有神人焉則盧若氷雪綽約若処子杜詩清凉破炎毒水殿風來暗香滿綉簾開一點明月窺人杜月詩関山同一點人未寢欹枕釵横鬢亂起來携素手文選纎纎出素手又李陵詩携手上河梁逰子暮何之庭戸無聲李白詩囬風送無声時見踈星渡河漢試問夜如何杜詩明朝有封事試問夜如何夜巳三更金波淡玉繩低轉文選謝眺詩金波䴡鳷鵲玉繩低疑章但屈指西凨㡬時來又不道流年暗中偷換桞子厚詩從此發耒非一事豈容華髮待流年東坡自序云僕七歲時見眉州老尼姓朱忘其名年九十餘自言甞随其師入蜀主孟㫤宫中一日大热主與花歮夫人夜起避暑摩訶池上作一詞朱其能記之今四十年朱巳死乆矣人無知此詞者独記其首兩句暇日㝷未豈洞仙歌令乎為足之云漫叟詩話云楊元素作本事曲記東坡洞仙歌詞謂錢塘有一老尼能誦後主詩首章两句後人為足其意以之且詞余甞見一十人誦全篇云氷肌玉骨清凉無汙水殿風暗香暖簾開明月獨窺人欹枕釵横雲鬢乱起来瓊戸啓無声時見跂星度河漢屈指西風㡬時来只恐流年暗中換苕溪漁隱云漫叟詩話所載本事曲云錢塘一老能誦後主詩首章兩句與東坡洞仙歌序全然不同當以序為正也雨中花夏景王逐客百尺清泉聲陸續韓詩清泉潔塵襟映瀟洒碧梧翠竹面千歩囬廊重重簾幙晏殊詩楼臺側畔楊花過簾幕中間燕子飛小枕欹寒玉試展鮫綃看畫軸迷異記南海中有發人室水居如魚不廢機軸見一片瀟湘凝緑待玉漏穿花銀河垂地李帝遣銀河一派垂月上欄千曲漫叟詩話云余甞觀上詞不用浮瓜沉李之事而天然有塵外凉思其詞語非觸热者之所知臨江仙歐陽永叔池外輕雷池上雨雨聲滴碎荷聲小楼西角断虹明欄干凭倚処李白詩沉香亭北倚欄干待得月華生陶渊明詩月華臨静夜燕子飛來窺畫棟滕王閣詩畫棟朝飛南浦云玉鈎垂下簾旌凉波不動簟紋平韓詩水紋浮枕簟水晶双枕傍有堕釵横太貢外傳上皇登沉香亭詔妃子妃子時夘酒未醒醒後殘粧鬢亂釵横夏𥘉臨劉巨濟泛水新荷杜詩圎荷浮緑水舞風䡖燕詩輕燕受風斜園林夏日𥘉長唐文宗詩我爱夏日長庭樹隂濃雛鶯學弄新篁小橋飛入横塘跨青蘋緑藻幽香杜詩萍藻舒翠縷朱欄斜倚霜紈未揺衣𬒮先凉怨歌行新裂齊紈素皎絜如霜雪裁為合歡扇團圓似明月歌歡稀遇怨别多同路遥水逺煙淡梅黃杜四月熟黃梅輕衫短㡌相携洞府流觴蘭亭記又有清流激湍引以為流觴曲水况有紅粧醉帰來宝蠟成行選詩娥娥紅粉粧拂牙床紗厨半開月在囬