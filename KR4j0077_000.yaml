鶗鳺春分鳴則衆芳生秋分鳴則衆芳歇咫尺江山分楚越左僖九年天威不違顔咫尺注八寸曰咫莊子自其異者觀之肝膽楚越也目斷魂銷應是音塵絶謝莊月賦美人邁兮音塵闕夢破五更心欲折角聲吹落梅花月玉樓春晏叔原秋千院落重簾暮寂寞春間扄繡戶墻頭紅杏雨餘花門外緑楊風後絮朝雲信斷知何處應作巫陽春夢去見前髙唐注紫騮認得舊遊蹤嘶過畫橋東畔路踏莎行歐陽永叔候館梅殘禮也官遺人五十里一市市有候館溪橋柳細杜市稿官柳細草芳風暖搖征轡離愁漸逺漸無窮迢迢不斷如春水寸寸柔腸盈盈粉淚樓髙莫近危欄倚平蕪盡處是春山李桑柘羅平蕪行人更在春山外一剪梅新增李易安紅藕香殘玉簟秋輕解羅裳獨上蘭舟雲中誰寄錦書來鴈字回時月滿樓古詩寄書雲間鴈選詩裁詩月滿樓花自飄零水自流一種相思兩處間愁古詞一種相思兩地愁此情無計可消除才下眉頭却上心頭苕溪漁隱云近時婦人能文詞者如趙明誠之妻李易安長於詞有漱玉集三卷行于丗此詞頗盡離别之情當為拈出陽關引新增寇平仲塞草煙光闊杜野潤煙光薄渭水波聲咽春朝雨霽輕塵斂征鞍發指青青楊柳又是輕攀折見前集上卷內動黯然知有後會甚時節更盡一杯酒見前王維詩注歌一闋歎人生裏難歡聚易離别且莫辭沉醉聽取陽關徹念故人千里自此共明月月賦隔千里兮共明月草堂詩卷畢虞美人李後主春花秋月何時了往事知多少小樓昨夜又東風月令東風解凍故國不堪回首月明中柳詩夜深瀟灑月明中雕欄玉砌應猶在只是朱顔改問君都有幾多愁恰似一江春水向東流雪浪霽日記云􅍮公問山谷云作小詞曽看李後主詞否云曽看􅍮公云何處最好山谷一以江春水向東流為對􅍮公云未若細雨夢回維塞逺小樓吹徹玉笙寒尤為髙妙蝶戀花秦少遊鍾送黃昏雞報曉昏曉相催杜隂陽割昏曉世事何時了韓詩莫將世事憂身事萬古千愁人自老李詩與爾同銷万古愁春來依舊生芳草忙處人多間處少間處光隂幾箇人知道獨上小樓雲杳杳天涯一點青山小坡詩青山髮是中原臨江仙夜登小閣憶吳中舊遊新增陳去非簡齋憶昔午橋橋上飲坐中多是豪英長溝流月去無聲杜月湧大江流杏花踈影裏吹笛到天明二十餘年成一夢此身雖在堪驚間登小閣望新晴古今多少事漁唱起三更苕溪漁隱云去非舊有詩云風流丘􅊤真吾事籌䇿廟堂非所知其後登政府無所建明卒如其言九日詞云九日登臨有故常隨晴隨雨一傳觴用退之淮西碑𣣔事故常之語如憶吳中舊遊臨江仙一闋清苑竒麗簡齋詞集推此詞最愛春從天上來新增吳彥髙米元章之壻海角飄零嘆漢苑秦宫墜露飛葻夢裏天上金屋銀屏見前注歌吹競舉青冥問當時遺譜有絶藝鼓瑟湘靈杜甫酹高蜀州詩鼓瑟至今悲帝子注湘妃堯之女故曰帝子傳言湘靈鼓瑟餘見詞後詞話促哀彈似林鶯嚦嚦山溜冷冷梨園太平樂府長恨歌梨園弟子白髮新椒房阿檻青娥老醉幾度春風鬢髮星星見前注舞徹中原塵飛滄海風雪萬里龍庭寫胡笳幽怨人憔悴不似丹青酒醒一軒涼月燈火青熒彥髙序云會寧府遇老媪善鼓瑟自言梨園舊籍因有感而賦此後三山鄭中卿嘗從張貴謨使虜亦聞虜中有歌之者警悟青玉案人生南北如𡵨路劉説符篇玉朱見岥路而泣之謂生可以南可以此中丗事悠悠等風絮造化小兒無定據唐列傳甚為造化小兒相苦翻來覆去杜詩畨手作雲覆手雨倒橫直竪眼見都如許伊周功業何須慕不學淵明便歸去見前注坎止流行隨所寓見前東坡哨遍詞玉堂金馬王維長玉賦歷金門步玉堂有日矣竹籬茅舍揔是無心處西江月新增朱希真世事短如春夢岑參詩枕上片時春夢中人情薄似秋雲杜天際秋雲薄不須計較苦勞心萬事元來有命幸遇三杯酒美况逢一朵花新片時歡笑且相親明日隂晴未定此即及時行樂之意黃玉林云希真又有一闋云日日深杯酒滿朝朝小圃花開自歌自舞自開懷且喜無拘無礙青史幾畨春夢紅塵多少竒才不須計較與安排領取而今見在此二詞辭淺意深可以言世之役役於非望之福者滿庭芳蘇東坡蝸角虛名蠅頭微利算來著甚干忙事皆前定誰弱又誰強且趂間身未老詩話云未老得間方是間儘教我些子踈狂百年裏渾教是醉三萬六千埸襄陽歌百年三万六千日一日須傾三百杯思量能幾許憂愁風雨一半相妨又何須抵死説短論長幸對清風皓月苔茵展雲幕髙張江南好千鍾美酒一曲滿庭芳按詩僧號晦庵者亦有一詞名滿江紅云優擾勞生待足何時是足據見定隨家豐儉便堪龜縮得意濃時休進步須防世事多畨覆枉教人白了少年頭空祿祿誰不願黃金屋誰不愛千種粟奈五行不是這般題目枉使心機空計較兒孫自有見孫福又不須採藥訪蓬萊但寡欲此詞亦是逹觀之見俗以北曲與坡詞作對刋碑刻云八聲甘州送參寥子蘇東坡有情風萬里選春風太多情捲潮來無情送潮歸問錢塘江上西河浦口幾度斜暉不用思量今古俯仰昔人非誰似東坡老白首忘機記取西湖西畔正暮山好處空翠煙霏韓詩出入高下窮煙霏算詩人相得如我與君稀約他年東還海道願謝公雅志莫相違西州路不應回首為我沾衣注見苕溪詞話詳載苕溪漁隱云晉書謝安雖受朝寄然東山之志始未不踰每形於言色及鎮新城盡室而行造泛海之裝𣣔須經略粗定自海道還東雅志未就遂遇疾篤還都尋夢羊曇為安所愛重安薨后輟樂彌年行不由西州路嘗因大醉不覺至州門左右白曰此西州門也曇悲感以馬䇿扣扉誦曹子建詩曰生存華屋處零落歸山丘因慟哭而去東坡用此故事若世俗之論必以為我成謙矣然其詞石刻后東坡題云元祐六年三月六日余以東琴年譜考之元祐四年知杭州六年召為翰林學士承旨則此詞蓋此時作也白后復守頴徙禓入長禮曹出師定武至紹聖元年方南遷嶺表建中靖國元年北歸至嘗乃薨凡十一載則世俗成讖之論果足言耶慶夀喜遷鶯丞相生日新增康伯可臘殘春早正簾幕護寒樓臺清曉空運當千佳辰餘五嵩嶽誕生元老詩嵩高維嶽峻極干天維嶽降神生甫及申維申及甫維周之翰帝遣阜安宗社人仰雍容廊廟盡揔道是文章孔孟勳庸周召師表方眷遇魚水君臣須信從來少蜀志先主之有孔明如魚之有水玉帶金魚朱顔緑鬚占斷世間榮耀篆刻鼎彛將遍整頓乾坤都了洗兵馬行整頓乾坤濟時了願歲嵗見柳梢青淺梅英紅小按此詞語意儘佳惜皆媚竈之語蓋為檜相作耳水龍吟夀韓南間新增辛幼安渡江天馬南來幾人真是經綸毛長安父老新亭風景可憐依舊見前集內注夷甫諸人神州沉陸幾曽回首算平戎萬里功名本是真儒使君知否况有文章山斗韓愈傅其言行文章學者仰之如太山北斗對桐隂滿庭清晝當年墮地而今試看風雲奔走緑野風煙裴度有緑野堂平泉草木李德袼有平泉宴遊之地東山歌酒謝安有東山之勝待他年整頓乾坤事了為先生夀千秋歲夀史致道新添塞垣秋草又報平安好韓詩新竹報平安樽爼上英雄表金湯生氣象珠玉霏談笑杜詩清談玉露繁又效搖落九天隨風生珠玉春近也梅花得似人難老莫惜金樽倒鳯詔看看到留不住江東小從容帷幄裏張良傳運籌帷幄之中決勝千里之外整頓乾坤了見前注千百歲從今盡是中書考唐書郭子儀身任外安危者四十余年僉中書令考二十四富貴夀考哀榮終始自述驀山溪新增宋謙父壷山壷山居士未老心先懶愛學道人家辦竹几蒲團茗碗青山可買小結屋三間開一徑俯青溪修竹栽教滿客來便請隨分家常飯若肯小留連更薄酒三杯兩盞吟詩度曲風月任招呼身外事杜莫思身外無窮事且盡生前有限杯不關心自有天公管飲饌器用詠茶品令黃魯直鳯舞團團餅恨分破教孤令金渠躰淨隻輪慢碾玉塵光瑩湯響松風早減二分酒病蠻甌志劉禹錫正病酒乃饋菊苗虀换白樂天六班茶茶囊以醒酒味濃香永醉鄉路成佳境古詩𬋩束騷人入醉鄉雇愷之漸入佳境恰如燈下故人萬里歸來對影口不能言心下快活自省苕溪漁隱云曽直諸茶詞余謂品令一詞最佳能道人所不能言尤在結尾三四句阮郎歸歌停檀板舞停鸞髙陽飲興闌晉山簡每至高陽習家池飲大醉而歸獸煙噴盡玉壷乾香分小鳯團楊大年談非貢茶凡十四品曰龍茶鳯團京誕龍茶以貢乘輿及賜執政視士長主餘皇族學士將帥皆得鳯茶雲浪淺露珠圎捧甌春笋寒春笋佳人指也綘紗籠下躍金鞍杜詩花邊立馬躍金鞍歸時人倚欄古今詞話云觀者欮服此詞八句伏八景音律一同殊不散亂人爭寶之刻之琬琰挂于堂室之間也愚觀山谷集有一曲詠前寨亦名阮郎歸云烹茶留客駐金鞍月斜窗外山見郎容易别郎難有人愁逺山歸去後憶前歡晝屏金傳山一杯春露莫留殘與郎失玉山并附于此醉落魄紅牙板歇韶聲斷六么𥘉徹小槽酒滴真珠竭李賀小槽酒滴真珠紅紫玉甌圎淺浪泛春雪香芽嫩蘂清心骨醉中襟量與天闊李白醉與大地同量夜闌似覺歸仙闕走馬章臺踏碎滿街月秦有章臺華前走馬章臺街下詠酒鷓鴣天勸酒晏叔原彩袖殷勤捧玉鍾當年拚却醉顔紅唐詩衰顔酒惜紅舞低楊柳樓心月歌盡桃花扇底風從别後憶相逢幾回夢魂與君同今宵剩把銀缸照猶恐相逢是夢中雪浪齋日記晏叔原此詞云舞低楊柳樓心月歌盡桃花扇底風此等句不愧六朝宫液體趙德麟候鯖録眺無咎云叔原不蹈襲人語而風調間雅自是一家如舞低楊柳樓心月盡桃花扇底風自可知此人不生于三家村中也浣溪沙歐陽永叔堤上遊人逐畫船拍堤春水四垂天韓海氣昏昏水拍天緑楊樓外出秋千白髮戴花君莫笑六么催拍盞頻傳六么曲名人生何處似樽前侯鯖録云歐陽永叔浣溪沙云堤上遊人逐盡船拍堤春水四垂天緑楊樓外出秋千此等語句要皆絶妙只一出字是後人著意道不到處黃魯直云東坡居士曲世所見者幾百首或謂於音律小不諧此詞橫放桀出自是曲子中縛不住者西江月勸酒黃山谷斷送一生唯有破除萬事無過韓文公詩逺山橫黛蘸秋波逺山橫黛眉也秋波眼也不訪傍人笑我花病等間瘦弱春愁沒處遮欄杯行到乎莫留殘韓文公詩杯行到君莫停手古詞飲盡莫留殘不道月斜人散後山詩話云此詞用韓文公遠興詩斷送一生唯有酒又贈鄭兵曹詩破除万事無過酒才去一字遂為切對而語益峻又云杯行到手莫留殘不到月斜人散謂思相離之憂則不得不盡飲谷一改為留連遂使兩句文義相夫故併論之詠笛水龍吟蘇東坡楚山修竹如雲異村秀出千林表龍鬚半翦鳯膺微漲玉肌勻繞愚溪云笛製取良簳首存一節節間留纎枝剪而束之節以下若􅈾處則微漲而全體皆傾白淨此三句形容盡矣木落淮南雨晴雲夢月明風裊狀景物自中郎不見蔡雍為中郎將雍𥘉避難江南宿於柯亭之館以竹為椽雍仰而盻之曰此良竹也取以為笛竒聲獨絶傳至于今桓伊去後見月類念奴嬌詞下注知辜負秋多少聞道嶺南太守後堂深緑珠嬌小緑珠石崇家妾素善吹笛綺窗學弄梁州𥘉遍霓裳未了楊妃外傳梁州乃開元間西梁州所獻之曲也其同則貴妃為之天寶間羅公逺待明皇中秋宴公逺奏曰陛下能從臣遊乎命取桂枝杖向空擲之為大橋色如白金上同行數十里至大成闕公逺曰此月宫也仙女數百衣素飄然舞于廣庭中上問此為何曲日霓裳羽衣曲也上密記其聲節及回即喻伶人象其音調製為霓裳羽衣之曲𥘉遍謂如今樂府諸大曲凡數十解於顛前則有棑偏顛後則有延遍𥘉遍豈非排遍之首解嚼徴含宫泛商流羽宋玉對楚王問引商刻角雜以流徴國中屬和者不過數人也一聲雲杪古今詩話長笛一聲人倚樓為使君洗盡蠻風瘴雨作霜天曉醉落魄詠佳人吹笛張子野雲輕柳弱內家髻子新梳掠生香真色人難學橫管孤吹月淡天垂幕朱唇淺破櫻桃崿方千贈美人朱唇深淺𬒳櫻桃倚樓人在欄千角夜寒指冷羅衣薄聲入霜林䔩䔩驚梅落杜牧笛詩梅花落處響穿雲苕溪漁隱云樂府雜録云笛者羌樂也古曲有折楊柳落梅花故杜少陵有詩故園楊柳今搖落何得磻中曲盡生此皆言折楊柳曲也復齋謾録言古曲有落梅花非謂吹笛則梅落詩人用事不悟其失余以為不然蓋詩人有因笛中有落梅花曲故言吹笛則梅落其理甚通用事殊未為失目如角聲中有大小梅花曲𥘉不言落詩人尚猶如此用之故秦太虛和黃決曹云月落參橫晝角哀暗香消盡梅花老者是也古今詩詞用吹笛則梅落者甚衆若以為失則落柳花之曲何為笛中獨有之決不虛設也如張子野此詞䔩䔩驚梅落托遣載梅花詩南枝向暖北枝寒一種春風有兩般一仗高樓莫吹笛大家留取倚欄干眺次膺填入水龍吟詞云最是關情處髙樓上一聲羌管仗何人説與爭取倚闌看孫濟師落梅詞云一聲羌管吹鳴咽玉溪半夜梅花翻雪泛觀古今詩詞用事一律可見復濟之妄辨也詠筝菩薩蠻張子野哀筝一弄湘江曲聲聲寫盡湘波緑桞子厚漁翁詩漁翁夜傍西岩宿曉及湘江燃楚竹日高煙湲不見人欵乃一聲山水緑纎指十三絃細將幽恨傳當筵秋水慢白樂天詩雙眸剪秋水玉柱斜飛鴈鴈筝鴈也筝柱斜列差如鴈飛也僧貫休詩刻成筝拄鴈相參挨彈到斷腸時杜甫詩誰家巧作斷腸聲春山眉黛低注見前生查子含羞整翠鬟得意頻相顧鴈柱十三絃一一春鶯語嬌雲容易飛夢斷知何處桞詩一聲夢斷楚江曲深院銷黃昏陳陳芭蕉雨魏野詩黃昏微雨堪惆悵古詩共聽芭蕉雨漁舟滿庭芳紅蓼花繁黃蘆葉亂夜深玉露𥘉零霽天空濶雲淡楚江清獨掉孤蓬小艇悠然過煙渚沙汀金鈎細絲綸慢捲牽動一潭星列湯問篇以獨繭絲為芒針為􅍮蓧蓧為竿剖粒為餌引盈車之魚于百朷之淵時時橫短笛清風皓月相與忘形任人笑生涯泛梗飄萍杜欄醉是生涯選飄萍泛而萍傳飲罷不妨醉卧塵勞事有耳誰聽江風靜曰髙未起茶歌日髙丈五睡正濃枕上酒微醒花桞禽鳥梅花花犯周美成粉墻低也花照眼依然舊風味杜詩花枝照眼句還成林耳詩堪笑胡維亦風味解將聲調角中吹露痕輕綴疑淨洗鉛華無限佳麗王介甫梅詩不御鉛華知國色去年勝賞曽孤倚氷盤共宴喜更可惜雪中高樹香篝熏素𬒳杜詩雪樹元同色熏𬒳事詳見前注今年對花最匆忽相逢似有恨依依愁悴凝望久青苔上旋看飛墜相將見脆圎薦酒人正在空江煙浪裏但夢想一枝瀟灑黃昏斜照水林逋詩踈影橫斜水清淺暗香浮動月黃昏玉林詞選云此只詠梅花而紅餘反覆道盡三年間事昔人謂好詩貟美流轉如彈丸餘于此詞亦云愚謂此謂梅詞弟一絳都春早梅新增寒隂漸曉報驛使探春南枝開早陸凱寄梅事見前注坡詞往天庾嶺上梅花南枝巳落北枝方開寒暖之失異也粉蘂弄香芳臉凝酥瓊枝小林和靖詩藥訝粉綃裁天悴帶疑紅蠟綴𥘉乾雪天分外精神好向白玉堂前應到化工不管朱門閉也暗傳音耗薛維翰詩白玉堂前一樹梅今朝匆見數枝開兒家門户重重閉春色何因得入來輕渺盈盈笑靨稱嬌面愛學宫粧新巧幾度醉吟獨倚欄千官粧倚欄二事並見前注黃昏後月籠踈影橫斜照更莫待單于吹老便須折取歸來膽瓶頓放了孤鵉早梅天然標格是小蕚堆紅芳姿凝白淡佇新粧淺點壽陽宫額見前注東君想留厚意倩年年與傳消息昨夜前材雪裏有一枝先折僧齊巳詩前材深雪裏昨夜一枝開念故人何處水雲隔縱驛使相逢難寄春色見前注試問丹青手是怎生描得曉來一畨雨過更那堪數聲羌笛歸去和羔未晚勸行人休摘玉燭新周美成溪源新蠟後見數朵江梅剪裁𥘉就暈酥砌玉芳英嫩故把春心輕漏前村昨夜見前注想弄月黃昏時候孤岸峭踈影橫斜濃香暗沾襟袖尊前賦與多才問嶺外風光故人知否夀陽謾鬪宋武帝女夀陽公主人曰臥于含章詹下梅花落其額上成五出之花拂之不去三日洗之乃落宫女竒之競效為梅花粧終不似照水一枝清瘦岑參梅花詩𢾗枝清瘦出踈籬風嬌雨秀好亂插繁花盈首杜詩安得健步移遠梅亂掃繁花向晴昊須信道羌管無情看看又奏李賀詩羌笛奏落花按孫濟師有落梅詞菩蕯蠻云一聲羌笛吹鳴咽干溪半夜梅翻雪江月正茫茫斷橋流水香含章春𣣔暮洛日千山雨一點著枝酸吳媚先齒寒亦是用羌笛奏落梅之事今併附見于此驀山溪曹元寵洗粧真態唐詩雨洗宮梅一樣粧不假鉛華飾唐詩洗出鉛華見玉肌竹外一枝斜和靖詩竹外一枝斜更好想佳人天寒日暮杜詩天寒翠輔重日暮倚修竹黃昏院落無處著清香風細細雪垂垂何况江頭路月邊踈影夢到銷魂處結子欲黃時又須作廉纎細雨見前夏詞注孤芳一世供斷有情愁消瘦損唐詩氷肌消瘦為誰愁東陽也試問花知否西江月蘇子瞻玉骨那愁瘴霧梅聖俞集梅詩玉骨綃裳䪨太孤天教飛雪伴清癯氷肌自有仙風海仙時遣探芳叢倒挂緑毛么鳯南海真禽名倒挂子緑毛如鸚鵡而小素面翻嫌粉涴洗粧不褪唇紅高情巳逐曉雲空不與梨花同夢冷齋夜話東坡在惠州作梅花詞時待兒名朝雲老新亡其寓意蓋為朝雪作也苕溪漁隱王直方詩話載眺以道云説之𥘉見東坡詞便知道此老須過海只為古今人不曽道到此須罰數去此言鄙俚近于忌人之長幸人之禍直方無纎載之詩話寧不畏人之譏誚乎髙齋詩話髙情巳遂曉雲空不與梨花夢同後見王昌齡梅詩落落寞寞路不分夢中喚作梨花雲方知坡老用此詩也漢宫春眺叔用瀟灑江梅向竹梢深處橫兩三枝東君也不愛惜雪壓風欺無情燕子怕春寒輕失佳期惟是有南來歸鴈年年長見開時選秋風辭草木黃落兮鴈南歸清淺小溪如練謝跳詩澄江靜如練問玉堂何似茅舍踈籬傷心故人去後冷落新詩微雲淡月對孤芳分付他誰空自倚清香未減風流不在人知苕溪漁隱云此詞用玉堂事乃引用薛維翰白玉堂前一樹梅詩事或云宫苑之玉堂非也又云曽端伯編樂府雅詞以此詞為李漢老作非也乃朝叔用作政和間以獻蔡攸是時朝廷方興大晟府蔡攸携此詞呈其父云今日于樂府中得一人京覽其詞喜之即徐大晟府丞梨花水龍吟新添周美成素肌應怯餘寒艷陽占盡青羌地樊川照月靈關遮路殘紅斂避傳火樓臺妬花風雨僧祖可詩未須風雨勒梨花長門深閉亞簾櫳半濕一枝在手偏勾引得黃昏淚别有風前月底布繁英滿園歌吹樂天詩惟聽梨園尚吹發朱鉊退盡潘妃却酒昭君乍起雪浪翻空粉裳縞衣韓愈詩風揉由練雪羞比波浪畨空香無俟王介甫詩積李兮絞衣不成春意恨玉容不見瓊英謾好與何人比長恨歌玉容寂寞淚闌干談助元有女名瓊英幼以香屑雜食啖之長而肌香名曰香兒荷花念奴嬌僧仲殊水楓葉下乍湖光清淺􅋽生啇素西帝宸遊羅翠蓋西帝謂白帝也杜天高白帝秋擁出三千宫女白居易詩怨女三千放去宫絳綵嬌春鉛華掩晝占斷卯央浦歌聲搖曵浣沙人在何處别岸孤裊一枝廣寒宫殿冷落棲愁苦雪艷氷肌羞淡泊偷把胭脂勻注媚臉籠霞芳心泣露不肯為雲雨金波影裏前天文志月穆穆以金波為誰長恁凝佇桂花金菊對芙蓉花則一名種分三色嫩紅妖白嬌黃尓雅木桂樹一名木屖花淡白其淡紅者謂之丹桂黃花者能著子正清秋佳景雨霽風涼韓詩時秋積雨霽新涼入郊墟郊墟十里飄蘭麝瀟灑處旖旎非常自然風韻開時不惹蝶亂蜂狂謝元逸詠木屖詩西風掃盡狂蜂蝶獨伴天邊桂子香携酒獨揖蟾光問花神何屬離兊中央引騷人乘興廣賦詩章幾多子爭攀折嫦娥道三種清香狀元紅是黃為榜眼白探花郎落花六醜周美成正單衣試酒悵客裏光隂虛擲劉賓客詩遙羡光隂不虛擲願春暫留春歸如過翌一去無迹杜甫詩林如過翌稀為問家何在夜來風雨送楚宫傾國李延年歌此方有佳人絶世而獨立一笑傾人城再笑傾人國溫庭詩荺夜來風雨送殘花叉鈿墮處遺香澤杜詩神女花鈿落亂點桃蹊輕翻柳陌劉賓客詩桃蹊柳陌好經過多情更誰追惜但蜂媒蝶使時叩窗隔東園岑寂池亭詩岑寂東園可散愁斬蒙籠暗碧詩選緑羅結髙林蒙籠蓋一丘靜繞珍叢底成嘆息長條故惹行客似牽衣待話别情無極殘英小強簮巾幘應詩醉酒巾幘落終不似一朵叉頭顫裊向人欹側漂流處莫趂潮汐陳充落花詩終尋流水送漂流王介甫詩百年滄州自朝夕恐斷鴻尚有相思字何由見得事見托遺見王卷詳柱烏衣國事楊花水龍吟章質夫燕忙鶯懶芳殘正堤上柳花飄墜輕飛點晝青林全無才思間趂遊絲杜落絮遊絲别有情靜臨深院日長門閉傍珠簾散漫垂垂𣣔下依前𬒳風扶起謝道韞詩未若桞絮因風起蘭帳玉人睡覺怪春衣雪霑瓊綴繡床漸滿香毬無數才圎却碎時見蜂兒仰粘輕粉桞詩仰蜂粘落絮魚吞池水望章臺路杳韓翊寄桞氏詩章臺桞章臺柳昔日青青今在否縱有長條似舊垂也應有折他人手金鞍遊蕩有盈盈淚玉林詞話云質夫傍珠簾散慢數語形容盡之矣水龍吟和章質夫韻東坡似花還似飛花白居易詩花非花霧非霧也無人惜從教墜拋家傍路思量却是無情有思韓之詩楊花榆莢無情退思惟解慢天作雪飛縈損柔腸困酣嬌眼𣣔開還閉夢隨風万里尋郎去處又還𬒳鶯呼起不恨此花飛盡恨西園落紅難綴見前注曹子建清夜遊曲園曉來雨過遺蹤何在一池萍碎公舊注云楊花落水為深萍驗之果然春色三分二分塵土一分流水葉通鄉賀聖朝郊詞三分春色一分愁悶二分風雨細看來不是楊花點點是離人淚曲洧舊間云章質夫水龍吟詠楊花其命意用事清麗可喜東坡和之若豪放不入律吕徐而視之聲䪨諧婉便覺質夫詞有織繡工夫故朝叔用云東坡如毛嬙西施盡洗却面與天下婦人聞好質夫豈可比耶桞蘭陵王周美成桞隂直煙裏絲絲弄碧隋堤上曽見幾畨拂水飄綿送行色登臨望故國為衍云望秦晉之故國誰惜京華倦客杜詩旅食京華春長亭路年去嵗來應折柔條過千尺間尋舊蹤迹又酒趂哀絃燈照離席杜哀絃繞白雪梨花榆火催寒食愁一箭風快半篙波䁔歐陽詢詩急風吹緩箭坡詩愁中半篙水回頭迢遞便數驛望人在天北悽惻江淹别賦行子腸斷百感悽惻恨堆積漸别浦縈回津堠岑寂斜陽冉冉春無極念月榭携手露橋吹笛沉思前事似夢裏淚暗滴草點綘唇林和靖金谷年年鄭谷草詩金谷園應役亂生春樹誰為主餘花落處選詩鳥散餘花落滿地和煙雨羅鄴草詩不似萋萋南浦見晚來煙雨正相和又是離歌杜詩亂離還奏樂飄泊且聽歌一闋長亭暮王孫去萋萋無數南北東西路見前注詩話總龜云林和靖不特工于詩尤工于詞如作點綘唇乃詠草耳終篇不出一草字詠燕雙雙燕新添史邦卿過春社了王介甫詩處處定知秋后别年年長向社前逢度簾幕中間去年塵冷差池𣣔住詩燕燕于飛下上其音差池其羽試入舊巢相並還相雕梁藻井又軟語商量不定飄然快拂花梢翠尾分開紅影芳徑芹泥雨潤鄭谷詩落花徑裏得泥忙愛貼地爭飛競誇輕俊紅樓歸晚看足桞昏花䏃應自棲香正穩便忘了天涯芳信愁損翠黛雙蛾日日畫欄獨憑玉林詞話云薑堯章極稱賞桞昏花瞑之句形容雙燕亦曲盡其妙矣詠鶯黃鶯兒新添桞耆卿園林睛晝春誰主暖律潛催杜詩東君回暖律幽谷暄和黃鸝翩翩乍遷芳樹伐木詩伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木觀露濕縷金衣開元遺事明皇每于禁苑中見黃鶯呼為金衣公子葉映如簧語詩巧言如簧曉來枝上綿蠻似把芳心深意低訴無據乍出暖煙來又趂遊蜂去恣狂蹤迹兩兩相呼黃昏霧吟風舞當上苑桞濃時别館花深處此際海燕偏饒都把韶光與杜鵑滿江紅新添康伯可惱殺行人東風裏為誰啼血尓雅杜鵑名怨鳥夜啼逹旦血清草木間凡鳴皆北向正青春未老流鶯方歇胡蝶枕前顛倒夢杏花枝上朦朧月問天涯何事苦關情思離别聲一喚腸千結閩嶺外江南陌正長堤楊桞翠條堪折鎮日叮嚀千百遍只將一句頻説道不如歸去不如歸傷情切范希文詩夜入翠煙啼晝尋芳樹飛春山無限好猶道不如歸孤鴻卜算子蘇子曕缺月挂踈桐漏斷人𥘉靜時見幽人獨往來縹眇孤鴻影驚起却回頭杜牧詩驚起暮天沙上鴈有恨無人省㨂盡寒枝不肯棲楓落吳江冷崔信明詩樹落吳江冷山谷云東坡道人在黃州作此詞語意髙妙似非喫煙火人語自非胸中有万卷書筆下無一點塵俗氣孰能至此苕溪漁隱曰揀盡寒枝不肯棲之句或云鴻鴈未嘗棲宿樹枝惟在田野葦叢間或改作寒蘆亦是但此詞本詠夜景至換頭但只説鴻正如賀新郎詞乳燕飛華屋本詠夏景至換頭只説榴花蓋作文之法語意到處即為之不可限以繩墨衡陽居士云缺月刺明微也漏斷暗時也幽人不得志也獨往來無助也驚鴻賢人不安也回首愛君不忌也無人省君不察也㨂盡寒枝不肯棲不偷安于高位也寂寞吳江冷非所安也此與考槃詩相似安肅荆聚校刋增修箋注妙選草堂詩餘卷下後集
