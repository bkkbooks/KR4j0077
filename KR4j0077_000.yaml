夫人云藍橋便是神仙宅何必﨑嶇上玉京漢張敝守京兆為妻畫眉長安傳為京兆嫵翠幕深中對徽容空在紈素待花前月下見了不教歸去梅花神花娘歌月下花前不暫離暫離已見銀河逺過秦樓新添周美成京浴清蟾葉喧涼吹李商隱云凨葉共成喧唐太宗詩涼破肅離宮巷陌馬聲𥘉斷間依露井笑撲流螢惹破畫羅輕扇孟蜀花夫人詩銀蠋秋光冷畫屏輕羅小扇撲流螢玉階夜色涼如水卧看牽牛織女星人靜夜久憑欄愁不歸眠立殘更箭嘆年華一瞬人今千里夢沉書逺空見説鬢怯瓊梳容銷金鏡李白詩明朝金鏡裏了了玉臺前漸懶趂時勻染梅凨地溽虹雨苔滋王勃云虹銷雨霽杜甫詩楚雨石䒤滋一架舞紅都變誰信無憀為伊才減江淹南史江淹少宿于治亭夢人授五色筆因而有文章後夢郭璞取其筆自此為詩無美句人稱才盡情傷荀倩出説荀奉倩妻曹氏有艷色妻嘗病熱奉倩嘗以呤身尉之妻亡嘆曰佳人難再得人吊之不哭而傷神無幾奉倩亦亡但明河影下還看稀星數點側犯新添前人暮霞霽雨小蓮出水紅粧靚何遜詩霧多蓮出水風定看步襪江妃照明鏡張文潛蓮花詩水宮仙子閗新粧輕步凌波蹽明鏡飛螢度暗草秉燭逰花境古詩云何不秉燭遊人靜携艷質追涼就槐影杜詩意昔好追涼金環皓腕雪藕清泉瑩文選美女篇滚袖見素手皓腕約金環杜甫詩佳人雪藕絲誰念省滿身香猶是舊荀令李端贈郭駙馬詩焚香荀令偏憐小蓋荀令則年十五擬國婚之選不𣣔連姻帝室乃逺遁長沙尋不獲見説胡姬酒壚寂靜王琰新詠云辛延年羽林郎詩昔有崔家奴姓馮名子都依倚將軍勢調笑酒家胡胡姬年十五春日獨當壚長𥚑連理帶廣袖合歡𥜗左傳注胡姫乃齊景公妾也煙鎖漠漠藻池苔井謝玄暉生煙粉漠漠杜詩青苔生古井賀新郎趙文䁀晝永重簾捲古詞簾捲畫堂人寂靜乍池塘一畨過雨芰荷𥘉展古詞一畨兩過池塘十里芰荷香竹引新梢半含粉杜詩新梢才出墻又完竹半含籜緑蔭扶踈滿院逐花絮蜂稀蝶懶窗戶沉沉人不到伴清幽時有流鶯囀凝思久意何限玉叉墜枕風鬟顫見前注湛虛堂壼氷瑩徹簟波零亂鮑昭隂清明如玉壼氷古詞展霜簟相波生細波自是仙姿清無暑月影空垂素扇古詞寶扇垂尋明月影破午睡香銷餘篆一枕湖山千里夢正白蘋煙歸耒晚蘇飬直清江曲白蘋滿掉歸耒晚秋滿蘆花兩岸霜雲弄碧楚天逺塞翁吟周美成暗葉啼凨雨李賀云木葉啼凨雨窗外曉色瓏璁李賀云雞鳴罷唱曉瓏璁散水麝小池東亂一岸芙蓉蘄州簟展雙紋浪輕帳翠縷如空夢逺别淚䀶重淡鉛臉斜紅忡忡嗟憔悴新寬帶結羞艷冶都銷鏡中詩憂心忡忡蕭鄰詩纎腰非學桞寬帶為思君有蜀𥿄堪憑寄恨韓握有寄恨詩云蜀𥿄虛晉小字紅等今夜灑血書詞剪燭親封韓愈云刳肝以為𥿄酒血以書詞毛逹可妻詩剪燭親封錦字書菖蒲漸老早晚成花教見薰凨夏雲峯桞耆卿宴堂深軒檻雨輕壓暑氣低沉花洞彩舟泛􅕌坐繞清潯楚臺風快楚衮與宋玉登臺有風颯然而至曰快哉此風湘簟冷永日披襟古詞湘簟展清波坐久覺踈絃脆管换新音越娥蕙態蘭心逞妖艷泥歡􅌽寵難禁筵上笑歌間發舄履交侵史記淳于髠曰男女同席舄履交錯醉鄉歸處古詞醉鄉天廣大須盡興滿酌髙吟向此免名韁利鎖虛費光隂訴衷情近前人景闌晝永漸入清和氣序古詩首夏猶清和榆錢飄滿間階蓮葉嫩生翠沼遙望水邊幽徑山崦孤村是處園林好間情悄綺陌逰人漸少少年風韻自覺隨春老追前好帝城信阻天涯目斷暮雲芳草佇立空殘照過澗歇新添桞耆卿淮楚曠望極千里火雲燒空吳融苦熱行火雲焰熖燒天紅盡日西郊無雨易密雲不雨自我西郊厭行旅數幅輕帆旋落艤棹兼葭浦避畏景左傳夏日可畏篡要夏日畏景兩兩舟人夜深語此際爭可便恁奔利名九衢塵裏衣冠冒炎暑回首江鄉月觀風亭水邊石上幸有散髮披襟處晉有八逹胡毋輔謝琨畢卓相尋阮孚之徒嘗散髮祼袒閉戶酣飲張景陽曰袖簮解朝衣散髮歸海隅束髮為從宫散髮為罷官披襟即宋玉謂有風颯然而至開襟而當之女冠子桞耆卿淡煙飄薄鶯花謝清和院落樹隂翠密葉成幄麥秋霽景選詩密葉成翠幄月令孟夏是月也麥秋至夏雲忽變竒峰古詩夏雲多竒峰倚寥廓波䁔銀塘漲新萍緑魚躍想端憂多暇陳王是日嫩苔生閣謝莊月賦陳王𥘉喪應劉端憂多暇青苔生閣芳塵凝榭正鑠石天高流金晝永楚辝十日代出流金鑠石楚榭光風轉蕙選詩光凨記蕙蘭披襟處波翻翠幕以文會友沉李浮瓜文帝書浮甘瓜于清流沉朱李于寒水忍輕諾别館清間避炎蒸豈須河朔愧文帝典論劉松袁紹常以三伏之際晝夜酣飲以避一時之暑故河朔相傳為避署飲但樽前隨分雅歌艷舞盡成歡樂大聖樂𥘉夏新添千朵竒峰半軒微雨曉來𥘉過漸燕子引教雛飛見前注蓞􅔽暗薰芳草池面涼多淺斟瓊巵浮緑􅾹展湘簟雙紋生細波見前注輕紈舉動團圎素月怨竒行輕裂齊紈素皎潔如霜雪裁為合歡扇團圓似明月仙桂婆娑臨風對月姿樂便好把千金􅌽艷娥幸太平無事擊壤鼓腹携酒髙歌通曆帝堯之時有老人擊壤于路曰吾日出而作日入而息鑿井而飲耕田而食帝可以于我哉莊子云赫胥氏之時民居不知所為行不如所之含哺而嬉鼓腹而逰富貴安居功名天賦爭奈皆由時命呵休眉鎖問朱顔去了還更耒麼秋景秋望滿江紅趙元稹慘結秋隂西風送絲絲雨濕桑柔詩注西凨謂之大凨選張景陽雜詩密雨如散絲凝望眼征鴻幾字暮投沙磧唐韻磧水渚有石者李白詩英風振少磧𣣔往鄉關何處是水雲浩蕩連南北李白詩搖盍柱水雲河隄繞緑水桑柘連水盡南天不見了二雲園林安可限南北但修眉一抹有無中遙山色韓南山詩天宇浮修眉光緑畫新就杜詩巫峽寒空半有無天涯路江上客腸巳斷李白詩喬首相思空斷腸頭應白杜霸霸丹青巳白頭空搔首詩搔首踟蹰興嘆莫年離隔莫與暮同杜詩道路只今多離隔欲待忘憂除是酒晉顧榮謂張翰曰惟酒可以忘憂又陶潛詩泛此忘憂物奈酒行𣣔盡愁無極便挽將江水入樽罍唐韻云罍酒樽也寫胸臆杜詩異縣逢故人𥘉欣寫胸臆秋思憶秦娥李太白簫聲咽秦娥夢斷秦樓月列仙傳簫史善吹簫能至孔雀白鶴秦穆公女弄玉亦好吹蕭遂妻之數年吹似鳯聲鳯凰止其屋公為作鳳臺一旦夫妻皆隨鳯去今古古相傳以為秦樓秦樓月憶秦娥之異名秦樓月年年桞色霸陵傷别樂逰原上清秋節咸陽古道音塵絶音塵絶西風殘照漢家陵闕花菴詞客云太白比詞及菩薩蠻一詞為百代詞曲之祖秋怨長相思一重山兩重山山逺天髙煙水寒杜詩路下天髙秋水清相思楓葉丹謝靈運詩早霜楓葉丹菊花殘杜詩菊花徒此不須開菊花殘塞鴈高飛人未還一簾風月間閨怨菩薩蠻秦少遊蛩聲泣露驚秋枕羅幃泪濕鴛鴦錦獨卧玉肌涼殘更與恨長隂風翻翠幌雨澀澄花暗杜詩燈花何大喜畢竟不成眠李白詩月明欲素不成眠鴉啼金井寒夜寒金井索秋閨菩蕯蠻秦少遊金風蔌蔌驚黃葉高樓影轉銀蟾匝夢斷繡簾垂杜詩朱簾秀杜闈黃鶴注黃鶴摟也昭陽殿織朱為簾風至則鳴如行雨之聲月明鳥鵲飛魏文帝短歌行月明星稀鳥鵲南飛繞住三匝無技可依新愁知幾許欲似絲千縷鴈巳不堪聞砧聲何處村杜詩月明何處砧槝練子心耿耿詩耿耿不寐如有隱憂淚雙雙皓月清凨冷透窗桃源夫人月詩皓彩盈虛碧晉陶潛傳高卧比窗之下清凨颯至自謂羲皇上人人去秋來宫漏永花深無語對銀缸東坡宴西湖詩銀缸畫燭照湖明唐韻缸燈也小重山汪彥章月下潮生紅蓼汀分昭度詩黃蜂語罷海潮生殘霞都斂盡韋應物詩殘日照高閣四山青柳梢風急墮流螢杜詩青栁檻前稍韋應物詩流螢度高閣隨波去點點亂寒星别語記丁寧如今能間隔幾長亭白氏六帖十里一長亭夜來秋氣入銀屏宋玉九卞悲哉秋之為氣也梧桐雨還恨不同聽長恨歌秋雨梧桐葉落時點綘唇高柳蟬嘶選詩寒蟬鳴高柳採菱歌斷秋風起郭璞江賦采菱歌以叩舷又武帝詞秋凨起兮白雲飛晚雲如髻韋應物詩髙髻雲鬟宮樣粧湖上山橫翠簾捲西樓滕王閣記朱簾暮捲西山雨過雨涼生𬒮天如水李白秋聲賦碧天如水兮畫樓十二有箇人同倚選鮑晚詩鳯樓十二重趙紫微討長笛一聲人倚樓花唐云此詞畫樓十二有個人同倚之句曲盡曲盡閨情秋怨尾犯柳耆卿夜雨滴空階出選詩孤館夢回情緒蕭索一片間愁丹青難邈秋漸老蛩聲正苦夜將闌燈花旋落最無端處捴把良宵秪恁孤眠却佳人應􅏜我别後寡信輕諾老子曰輕諾者必寡信記得當𥘉剪香雲為約甚時向深閨幽處按新詞流霞共酌論衡曰曼卿好道去家三年而反曰仙人保上天飲我流霞一杯多日不飢再同􅌚笑肯把金玉珠珍博慶春宮新添前人雲接平岡山圍塞野路回漸轉孤城衰柳啼鴉驚風驅鴈杜詩大風吹斷柳啼殺後棲鴉山谷詩驚風鴻鴈不成行動人一片秋聲倦途休駕淡煙裏微芒見星塵埃憔悴生怕黃昏離思牽縈華堂舊日逢迎花艷參差香霧飄零韓愈詩花艷大堤娼杜詩香霧雲鬟濕絃管當頭偏憐嬌鳯夜深簧暖笙清眼波傳意恨密約匆匆未成許多煩惱只為當時一餉留情金菊對芙蓉新添康伯可梧葉飄黃萬山空翠斷霞流水爭輝正金風西起海燕東歸憑攔不見南來鴈望故人消息遲遲木犀開後不應誤我好景良時只念獨守孤幃把枕前祝付一旦分飛上秦樓逰賞秦女事見前注酒殢花迷誰知别後相思苦誚為伊瘦損香肌花前月下黃昏院落見前注珠淚偷垂拜星月慢新添周美成夜色催更清塵收露小曲幽坊月暗竹檻燈窗識秋娘庭院秋注見瑞尨吟笑相遇似覺瓊枝玉樹暖日明霞光爛古離别願一見顔色不異瓊枝樹晉謝玄云如芝蘭玉柱生于庭階水眄蘭情捴平生稀見韓琮集吳魚秋鴈無消息水眄蘭情别未久畫圖中舊識春風面杜詩云畫圖省識春凨面誰知道自到瑶臺畔眷戀雨潤云溫苦驚風吹散念荒寒寄宿無人館重門閉敗壁秋蟲歎怎奈何一縷相思隔溪山不斷更漏子新添溫庭筠玉爐香紅蠟淚詩選蠟燭淚流思底事岑參紅淚金燭盤偏照畫堂秋思眉翠薄鬢雲殘夜長衾枕寒長恨歌翡翠衾寒誰與共梧桐樹三更雨長恨歌秋雨梧桐夜落時不道離情正苦一葉葉一聲聲空階滴到明選詩夜雨滴空階落溪詩話云溫庭筠湖隂曲警句云吳波不動楚山逺花倚闌干春晝長庭筠工于樂府極為綺靡花間集可見矣其更漏子一詞尤為佳作千秋歲引新添王介甫别館寒砧岑參詩寒砧有鄉愁孤城畫角髙適詩城中畫角兩三聲一派秋聲入寥廓東歸燕從海上去燕子春社自北而耒至秋社向東而歸南來鴈向沙頭落武帝秋凨辝草木黃落兮鴈南歸又宋迪瀟相八景平沙落鴈楚臺風宋玉傳楚王逰于闌臺有凨颯至王乃披襟以當之曰快哉此凨庾樓月晉庾亮在武昌與諸佐吏殷浩之徒乘夜月共上南樓宛如昨無奈𬒳些名利縛無奈𬒳他情擔閣可惜風流揔間却當𥘉謾留華表語續搜神記遼東城門有華表柱有白鶴集其上言曰有鳥鳥鳥丁令威去家千年今來歸城中如故人民非何不學仙家纍纍而今誤我秦樓約見秦女吹蕭前注夢闌時酒醒後思量著風流子新添張文潛亭皋木葉下選洞庭波兮木葉下重陽近又是搗衣秋白居易秋詩月明砧杵動家家搗秋練奈愁入庾腸庾信愁賦閉之欲驅愁愁終不肯去久收𣣔避愁愁巳知人處老侵潘鬢見前注謾簮黃菊花也應羞楚天晚白蘋煙盡處紅蓼水邊頭芳草有情夕陽無語鴈橫南浦杜詩别浦鴈賓秋人倚西樓趙嘏詩殘星