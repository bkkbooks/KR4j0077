薄腸𣣔斷愁難著李白詩美人不來空斷腸倚蓬窗無寐引杯孤酌杜詩看劒引杯長馬周悠然獨酌寒食清明都過了東坡詩寒食清明都過了石泉槐火一時新可憐辜負年時約想小樓日日望歸舟杜詩眼前今古意江漢一歸舟人如削滿江紅暮春朝無咎東武南城新堤固漣漪𥘉溢伐檀詩河水清且漣漪隱隱遍長林高阜卧紅堆碧枝上殘花吹盡也與君試向江邊覔問向前猶有幾多春三之一葉道卿賀聖朝詞三分春色二分愁悶一分風雨宫裏事何時畢風雨外無多日相將泛曲水滿城爭出君不見蘭亭修禊事當時座上皆豪逸到如今修竹滿山隂空陳迹晉王羲之三月三日蘭亭記永和九年暮春之𥘉會于會稽山隂之蘭亭修禊事也此地有崇山峻嶺茂林修竹又有清流激湍引以為流觴曲水暢敘幽情是日也天朗氣清惠風和暢云云俯仰之間以為陳迹臨冮仙緑暗汀洲三月暮落花風靜收垂楊低映木蘭舟李嶠分隂行木蘭為楫桂為舟半篙春水滑一假夕陽愁李白月光𣣔到長門殿别作深宮一假愁選花䲧夕陽遲灞水橋東回首處開元天寶遺事長安東灞陵有橋迎來送往皆至此人呼為銷魂橋美人親上簾鈎青鵉無計入紅樓行雲歸楚峽飛夢到楊州蝶戀花蘇東坡花褪殘紅青杏小燕子來時鄭谷杏花詩雙燕却來時緑水人家繞楊微之詩流水人家穿竹徑枝上桞綿吹又少天涯何處無芳草唐詩在處有芳草墻裏秋千墻外道墻外行人墻裏佳人笑笑漸不聞聲漸悄多情却𬒳無情惱古今詞話豫得此詞真本于友人處極有理趣緑水人家繞非繞字乃曰人家曉曉字與繞字蓋霄壤也蝶戀花晏同叔簾幕風輕雙語燕晏殊詩簾幕中間燕子飛午醉醒來桞絮飛撩亂心事一春猶未見餘花落盡青苔院李白詩落花寂寂委青苔百尺朱樓間倚遍楊億詩危樓高百尺薄雨濃雲抵死遮人面消息未知歸早晚杜詩去住勤此無消息斜陽只送平波逺蝶戀花歐陽永叔庭院深深深幾許楊桞堆煙簾幕無重數金勒雕鞍逰冶處杜詩白馬嚼囓黃金勒李白詩花月醉雕鞍樓高不見章臺路𥘉學記秦有章臺路雨橫風狂三月暮門掩黃昏潘䦘宫詞花落黃昏空掩門無計留春住薛能惜春詩無計延春日何能留少年淚眼問花花不語亂紅飛過秋千去易安居士序歐陽公作蝶戀花有深深深幾許之句豫酷愛之用其語作庭院深深數闋其聲即舊臨江仙也浣溪沙春暮周美成樓上晴天碧四垂杜晴天捲片雲樓前芳草接天涯勸君莫上最高梯新笋看成堂下竹落花都上燕巢泥鄭谷燕詩落花徑裏得泥香忍聽林表杜鵑啼如夢令春晚池上春歸何處滿目殘花飛絮韓文公詩桞巷還飛絮孤館悄無人夢斷月堤歸路無緒無緒簾外五更風雨如夢令李易安昨花雨踈風驟濃睡不消殘酒盧同茶奇日高丈五睡正濃試問捲簾人却道海棠依舊知否知否應是緑肥紅瘦苕溪漁隱云近時婦人能文詞如李易安頗知佳句如云緑肥紅瘦只此語甚新又九日詞簾捲西凨人似黃花瘦此言亦婦人所難到也武陵春風住塵香花已盡日晚倦梳頭物是人非事事休𣣔語淚先流聞説雙溪春尚好文選明月雙溪水清凨八誅樓也擬泛輕舟只恐雙溪舴艋舟載不動許多愁怨王孫夢斷漏悄愁濃酒惱寶枕生寒翠屏向曉杜翠屏冝晚對門外誰掃殘紅夜來凨選落花詩落盡万株紅無人系晚風玉簫聲斷人何處列仙傳肖史者秦穆王府人善吹肖秦穆公女弄玉吹肖作鳯鳴後隨鳯去春又去忍把歸期負此情此恨此際擬託行雲問東君杜詩東君曰回暖律上青玉案凌波不過橫塘路洛神賦凌波微步羅襪生塵但目送芳塵去晉王嘉拾遺記石虎起樓四十丈雜寶異香為屑風作則揚之名曰芳塵錦瑟年華誰與度杜醉卧佳人錦瑟傍月樓花院綺窗朱户惟有春知處古詩交疏結綺窗韓詩黃簾緑幕朱戶間碧雲冉冉衡皋暮綵筆空題斷腸句杜詞雕章五滿筆如杠梅花滿枝空斷腸試問間愁知幾許一川煙草杜水暖通草徑或曰川豈有草乎應之曰杜江白草纎纎無名江上草豈得無草乎滿城風絮梅子黃時雨杜四月熟黃梅生梅熟時多雨潘子真詩話世稱方回所作梅子黃時雨為絶唱蓋用寇萊公語也寇云杜鵑啼處血成花梅子黃時雨如霧點絳唇紅杏飄香李賀梨花詩曲水飄香去不回桞含煙翠拖金縷王禹稱桞詩丹禁拖金縷水邊朱戶門掩黃昏雨愧野詩黃昏微雨堪惆帳燭影搖紅一枕傷春緒歸不去鳯樓何處秦穆公女弄玉登樓吹肖感鳯來芳草迷歸路劉安招隱詩王孫逰兮不歸芳草生兮萋萋桞梢青子規啼血寇萊公詩杜鵑啼處血成花可憐又是春歸時節滿院東凨海棠鋪繡梨花飛雪丁香露泣殘枝誚未比愁腸寸結自是休又多情多感不干凮月沈休文事見未卷瑞鶴伈注賀聖朝葉道卿滿斟緑醑留君住莫匆匆歸去杜詩相逢難衮衮告别莫匆匆三分春色二分愁悶一分凨雨花開花謝都來幾日且高歌休訴杜詩回首且高歌知他來歲牡丹時候相逢何處鳯凰閣遍園林緑暗渾如翠幄陸士衡詩密葉成翠幄下無一片是花蕚杜詩一片花飛減却春可恨狂凨橫雨忒煞情薄盡底把韶華送却楊花無奈是處穿簾透幕豈知人意正瀟索李白詩世路如秋凨相逢盡肖索春去也這般愁沒處安著怎奈向黃昏院落天仙子張子野水調數聲持酒聽水調歌頭曲名午醉醒來愁未醒送春春去幾時回韓詩吏人休報事公作送春詩臨晚鏡傷流景往事後期空記省沙上並禽池上瞑雲破月來花弄影重重翠幕密遮燈風不定人𥘉靜明日落紅應滿徑古今詩話有客謂張子野曰人皆謂公張三中即心中事眼中淚意中人也公曰何不目之為張三影客不曉公曰雲破月來花弄影嬌柔擲起薕壓捲花影桞徑無人墜飛絮無影此余平生所得志高齊詩話子野嘗有詩云浮萍斷處見山影又長短句云雲破