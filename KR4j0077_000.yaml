浣溪沙此調乃攤破浣溪沙一名山茶子李景手捲真珠上玉鈎李白詩真珠高捲對簾鈎杜凨簾自上鈎依前春恨鎖重樓風裏落花誰是主陳謝貞詩凨定花猶落思悠悠李詩極目心悠悠青鳥不傳雲外信漢武帝好神仙乃築靈臺設祭西王母感得王母與帝將仙桃下至漢宮妃王母欲下先有青鳥一雙㗸書報帝帝與王母相見後升雲駕而去胡曽詩青鳥西况隴樹秋托遺青鳥去時雲路斷丁香空結雨中愁回首緑波三峽暮接天流杜詞源倒流三峽水溫叟詩話李景有曲手捲真珠上玉鈎或改為珠簾舒信道有曲云十年馬上春如夢或改云如春夢非所謂知音浣溪沙風壓輕雲貼水飛乍晴池館燕爭泥李堯夫燕詩江上飛高雨乍情沈郎多病不勝衣沈約事見前注沙上未聞鴻鴈信歐陽公詩驚起暮天沙上鴈竹間時有鷓鴣啼李詩苦竹南枝鷓鴣啼此情惟有落花知浣溪沙一曲新詞酒一杯敏揵詩千首飄零酒一杯去年天氣舊亭臺夕陽西下幾時回無可奈何花落去似曽相識燕歸來小園香徑獨徘徊風隱叢話晏元獻公赴杭州道過維陽憩大明寺冥目徐行使侍吏誦璧間詩板戒其勿言爵里姓名終篇者無幾又俾别誦一詩云水調隋宫曲當年亦丸成哀音已亡國廢沼尚留名義鳳終陳迹鳴蛙只廢聲凄涼不可問落日下荒城徐間之江都尉王琪詩也召至同飯又同步逰池上春晚已有落花晏云每得句書墻璧間或彌年未嘗強對且如無可奈何花落去至今未能也王應聲曰似曽相識燕歸來此辝置館卜算子秦處度春透水波明寒峭花枝瘦極目煙中百尺樓杜極目揔無波楊文公詩樓危高百尺人在樓中否四和裊金鳬四和謂香金鳬謂香鴉也雙陸思纎手雙陸棊也選纎纎出素手擬倩東風浣此情情更濃如酒謁金門鴛鴦浦春漲一江花雨桞子厚詩春浦漲桃花隔岸數聲𥘉過櫓韓詩香凨隔岸聞杜詩柔櫓輕鷗外曉風生碧樹舟子相呼相語詩招招舟子杜詩相呼相近水中鷗載取暮愁歸去杜詩載得暮愁歸寒食江村芳草路杜詩寒食江村路愁來無著處謁金門空相憶杜詩見酒須相隱憶無計與傳消息天上嫦娥人不識後漢書注姮娥奔月謂身為蟾蜍又杜詩莫教明月去晉著醉姮娥寄書何處覔春睡覺來無力長恨歌侍兒扶起嬌無力始是新承恩澤時不忍把伊書迹滿院落花春寂寂王維詩落花寂寂啼山鳥又杜詩寂寂春將晚斷腸芳草碧李白詩今成斷腸草謁金門春雨足詩信南山益之以霡霂既優既握既沽既足注春小雨也染就一溪新緑桞外飛來雙羽玉杜甫鷗詩却思雙玉羽弄晴相對浴杜天睛喜浴鳬樓外翠簾高軸倚遍欄干幾曲雲淡水平煙樹簇寸心千里目杜欲使寸心傾選宋玉招魂注眇然逺視目極千里生查子晏叔原金鞍美少年杜詩後邉簇馬立金鞍又詩瀟灑美少年去躍青驄馬劉貢父詩天外青驄響玉蹄牽繫玉樓人翠𬒳春夜寒選翡翠未𬒳爛齊光消息未歸來杜詩去住彼此無消息寒食梨花謝歲時記冬至後一百五百謂之寒食無處説相思背立秋千下秋千北方戌戲探春令緑楊枝上曉鶯啼僧齊巳鶯詩避人雙入緑楊深報融和天氣𬒳數聲吹入紗窗裏又驚起嬌娥睡緑雲斜嚲金叉墜阿房宮賦緑云擾擾梳曉鬟也張祐客淮南幕中赴宴時杜紫微為攴使南座有屬意之處索骰子賭酒牧微吟曰骰子巡巡褁手拈無因得見玉纎纎祐應之曰但知假道金叉落倣佛還應露指尖惹芳心如醉為少年濕了鮫綃帕上都是相思淚如夢令樓外殘陽紅滿春入桞條將半桞詩青入桞條新桃李不禁風回首落英無限腸斷腸斷人共楚天俱遠杜楚客今腸斷又長歌楚去碧浣溪沙張子野錦帳重重捲暮霞屏風曲曲鬪紅牙恨人何事苦離家枕上夢魂飛不去覺來紅日又西斜唐詩夢魂不知逺非過大江西又韓愈詩云水滄茫白日向西滿庭芳草襯殘花浣溪沙張子野水滿池塘花滿枝文選白水滿春塘杜詩黃四娘家花滿蹊千朵万朵壓枝低亂香深裏語黃鸝杜詩兩個黃鸝鳴翠桞東風輕軟弄簾幃日正長時春夢短坡詞世事短如春夢燕交飛處桞煙低古詞雙雙飛燕桞邊輕玉窗紅子鬪棊時菩薩蠻何籕南園滿地堆輕絮李白詩南園緑草飛胡蝶杜詩輕輕花絮飛愁聞一霎清明雨雨後却斜陽杏花零落香王徽之寒食詩路徑微雨落花村無言勻睡臉杜牧之題桃花夫人廟詩云云枕上屏山掩時節欲黃昏無聊獨倚門潘閬宮詞花落黃昏空掩門點綘唇何籕春雨𪷟𪷟淡煙深鎖垂楊院暖凨輕扇落盡桃花片薄幸不來前事思量遍無由見淚痕如線杜詩伏枕淚思䀶界破殘粧面點絳唇何籕鶯踏花翻亂紅堆徑無人掃杜詩花徑不曽緣客掃杜鵑來了梅子枝頭小撥盡琵琶揔是相思調方于詩琵琶弦促千般調知音少列湯問伯牙鼓琴志在高山鍾子期曰峩峩然若太山志在流水子期曰洋洋然若江河子期死伯牙以丗無知音也暗傷懷抱門掩青春老小重山趙德仁樓上風和玉漏遲崔液詩玉漏銅臺且莫催秋千庭院靜落花飛古今藝術秋干北方戍戲杜凨能高下飛午窗才起暖金巵白樂天詩玉液黃金巵勻面了欄畔看春池杜春池賞不稀何事苦顰眉鄭谷詩眉黛有時顰碧雲春信斷侭來時鴛鴦遊戲鎮相隨雲務斂新月挂天西記祭義月生于西醉春凨陌上清明近行人難借問風流何處不歸來悶悶悶回鴈峰前戲魚波上回鴈峯在今衡州試尋芳信夜永蘭膏燼春睡何曽穩枕邊珠淚幾時乾恨恨恨惟有窗前過來明月照人方寸列子仲尼篇吾見子心矣方寸之地虛矣夏景隔浦蓮周美成新篁搖動翠葆唐儀衛志天子有羽葆華蓋曲徑通深窈唐詩竹徑通幽處夏果收新脆金丸落飛鳥李賀詩年少皆把金丸落飛鳥濃靄迷岸草蛙聲閙驟雨鳴池沼杜詩驟雨落河魚水亭小韓愈詩空涼水上亭浮萍破處􅉉花簾影顚倒杜詩燈前細雨􅉉花落綸巾羽扇晉謝万常看白綸巾見簡文帝又晉志顧榮伐陳敏以白羽扇揮之賊衆大敗醉卧北窗啼曉晉陶淵明為彭澤令解印綬賦歸去來辭嘗言夏月虛間高卧北窗之下清風颯至自謂羲皇上人屏裏吳山夢柯到驚覺依前身在江表後秦王猛謂符堅日謝安中皆江表偉人苕溪漁隱云美成此詞云浮萍破處􅉉花簾影顛倒按杜少陵詩燈前細雨􅉉花落美成用􅉉花二字與出處意不相合方知用字之嘆如此賀新郎𥘉夏葉夢得市林居士睡起流鶯語韋蘇州詩流鶯日日啼花間掩蒼苔陳充落花詩巳謝蒼苔容點綴房櫳向曉亂紅無數李賀將進酒况是青春日將暮桃花亂落如紅雨吹盡殘花無人問惟有垂楊自舞漸暖靄𥘉回輕暑寶扇重尋明月影文選班婕妤詩裁為合歡扇團圓似明月暗塵侵尚有乘鵉女龍城録八月望日明皇逰月宫見素娥千余人皆皓衣乘白鵉驚舊恨鎮如許江南夢斷衡皋渚岑參詩洞房昨夜春風起遙憶美人湘江水枕上片時春夢中行盡江南數千里浪粘天蒲萄漲緑襄陽歌遙看漢水鴨頭緑恰似蒲萄𥘉發醅半空煙雨古詞余花落處滿地和煙雨無限樓前滄波意李白詩離恨滿滄波誰採蘋花寄取桞子厚詩春凨無悵瀟湘意欲採蘋花不自由但悵望蘭舟容與桞子厚詩騷人遙駐木蘭舟又凡歌聊逍遙兮容與萬里雲帆何時到李白詩云帆遙望不相見送孤鴻目斷千山阻選目斷孤鴻又韓詩千山隔兮万山阻誰為我唱金縷裴慶余詩滿額鵝黃金縷衣翠翹浮動玉叉垂從教水濺羅𥜗濕疑是巫山行雨時念奴嬌夏日避暑僧仲殊故園避暑杜詩故園松桂發又袁紹至夏會客大飲號可朔避暑飲愛繁隂翳日桞宗元詩是時春向暮桃李生繁隂流霞供酌杜詩細細酌流霞竹影篩金泉潄玉韓聮句云竹影金鎖碎泉聲玉琮琤紅映薇花簾箔白樂天詩紫薇花對紫薇郎素質生風唐文宗詩薰凨自南來殿閣生微涼香肌無汗繡扇長間却班婕妤怨歌行裁為合歡扇團圓似明月云云棄捐篋笥中恩情中道絶雙鵉栖處緑筠時下風籜王子年拾遺記蓬萊有浮筠之幹莖青葉紫有青鵉集其上吹斷舞影歌聲李白獨酌詩我歌月徘徊我舞影零亂陽臺人去有當年池閣宋玉高唐賦朝朝暮暮陽臺之下佩結蘭英凝念久屈原離騷紉秋蘭以為佩言語精神依約燕别雕梁滕白燕詩真珠高捲語雕梁鴻歸紫塞杜詩蕭蕭恨塞鴈音信憑誰託爭知好景為君長是蕭索坡詩一年好景君須記正是橙黃橘緑時李白詩古路如秋凨相逢盡蕭索瀟湘逢故人慢𥘉夏王和甫薰凨微動家語南凨之薰弓方榴花弄色萱草成窩説文忘憂草也翠幃敞輕羅試李賀詩羅幃繡幕圍香凨冰簟𥘉展幾尺湘波韓謝贈簟詩八尺含風漪踈􅉉廣厦前王傳廣文之下稱瀟湘一枕南柯異聞傳淳于棼宅南有古槐醉夢入槐安國見王王曰吾南柯郡屈卿為守及窹見占槐直上南枝即南柯郡也引多少夢魂歸緒洞庭雨棹煙簑驚回處間晝永更時時燕雛鶯友相過正緑影婆婆况庭有幽花杜詩幽花歌滿樹池有新荷六帖池荷𥘉貼水青梅煮酒幸隨分贏取高歌功名事到頭終在歲華忍負清和選首夏猶清和洞仙歌夏夜蘇子瞻氷肌玉骨自清涼無汗莊逍遙逰藐姑射之山有神人焉則盧若氷雪綽約若處子杜詩清涼破炎毒水殿風來暗香滿繡簾開一點明月窺人杜月詩關山同一點人未寢欹枕叉橫鬢亂起來携素手文選纎纎出素手又李陵詩携手上河梁逰子暮何之庭戶無聲李白詩回風送無聲時見踈星渡河漢試問夜如何杜詩明朝有封事試問夜如何夜巳三更金波淡玉繩低轉文選謝眺詩金波麗鳷鵲玉繩低疑章但屈指西凨幾時來又不道流年暗中偷換桞子厚詩從此發耒非一事豈容華髮待流年東坡自序云僕七歲時見眉州老尼姓朱忘其名年九十餘自言嘗隨其師入蜀主孟昶宫中一日大熱主與花歮夫人夜起避暑摩訶池上作一詞朱其能記之今四十年朱巳死久矣人無知此詞者獨記其首兩句暇日尋未豈洞仙歌令乎為足之云漫叟詩話云楊元素作本事曲記東坡洞仙歌詞謂錢塘有一老尼能誦後主詩首章兩句後人為足其意以之且詞余嘗見一十人誦全篇云氷肌玉骨清涼無汙水殿風暗香暖簾開明月獨窺人欹枕叉橫雲鬢亂起來瓊戶啓無聲時見跂星度河漢屈指西風幾時來只恐流年暗中換苕溪漁隱云漫叟詩話所載本事曲云錢塘一老能誦後主詩首章兩句與東坡洞仙歌序全然不同當以序為正也雨中花夏景王逐客百尺清泉聲陸續韓詩清泉潔塵襟映瀟灑碧梧翠竹面千步回廊重重簾幕晏殊詩樓臺側畔楊花過簾幕中間燕子飛小枕欹寒玉試展鮫綃看畫軸迷異記南海中有發人室水居如魚不廢機軸見一片瀟湘凝緑待玉漏穿花銀河垂地李帝遣銀河一派垂月上欄千曲漫叟詩話云余嘗觀上詞不用浮瓜沉李之事而天然有塵外涼思其詞語非觸熱者之所知臨江仙歐陽永叔池外輕雷池上雨雨聲滴碎荷聲小樓西角斷虹明欄干憑倚處李白詩沉香亭北倚欄干待得月華生陶淵明詩月華臨靜夜燕子飛來窺畫棟滕王閣詩畫棟朝飛南浦云玉鈎垂下簾旌涼波不動簟紋平韓詩水紋浮枕簟水晶雙枕傍有墮叉橫太貢外傳上皇登沉香亭詔妃子妃子時卯酒未醒醒後殘粧鬢亂叉橫夏𥘉臨劉巨濟泛水新荷杜詩圎荷浮緑水舞風輕燕詩輕燕受風斜園林夏日𥘉長唐文宗詩我愛夏日長庭樹隂濃雛鶯學弄新篁小橋飛入橫塘跨青蘋緑藻幽香杜詩萍藻舒翠縷朱欄斜倚霜紈未搖衣𬒮先涼怨歌行新裂齊紈素皎潔如霜雪裁為合歡扇團圓似明月歌歡稀遇怨别多同路遙水逺煙淡梅黃杜四月熟黃梅輕衫短帽相携洞府流觴蘭亭記又有清流激湍引以為流觴曲水况有紅粧醉歸來寶蠟成行選詩娥娥紅粉粧拂牙床紗厨半開月在回