夫人云藍橋便是神仙宅何必﨑嶇上玉京漢張敝守京兆為妻畫眉長安傳為京兆嫵翠幕深中對徽容空在紈素待花前月下見了不教歸去梅花神花娘歌月下花前不暫离暫离已見銀河逺過秦楼新添周羙成京浴清蟾葉喧凉吹李商隱云凨葉共成喧唐太宗詩凉破粛离宮巷陌馬聲𥘉断閑依露井笑撲流螢惹破畫羅䡖扇孟蜀花夫人詩銀蠋秋光冷畫屏輕羅小扇撲流螢玉堦夜色凉如水卧看牽牛織女星人静夜乆凭欄愁不帰眠立殘更箭嘆年華一瞬人今千里夢沉書逺空見説鬂怯瓊梳容銷金鏡李白詩明朝金鏡裏了了玉臺前漸懶趂時匀染梅凨地溽虹雨苔滋王勃云虹銷雨霽杜甫詩楚雨石䒤滋一架舞紅都変誰信無憀爲伊才减江淹南史江淹少宿扵治亭夢人授五色筆因而有文章後夢郭璞取其筆自此為詩無羙句人称才尽情傷荀倩出説荀奉倩妻曹氏有艶色妻甞病热奉倩甞以呤身熨之妻亡嘆曰佳人难再得人吊之不哭而傷神無幾奉倩亦亡但明河影下還看稀星数點側犯新添前人暮霞霽雨小蓮出水紅粧靚何遜詩霧多蓮出水風定看歩韈江妃照明鏡張文潜蓮花詩水宮仙子閗新粧輕歩凌波蹽明鏡飛螢度暗草秉燭逰花境古詩云何不秉烛㳺人静携艶質追凉就槐影杜詩意昔好追凉金環皓腕雪藕清泉瑩文選羙女篇滚䄂見素手皓腕約金環杜甫詩佳人雪藕絲誰念省滿身香猶是舊荀令李端贈郭駙馬詩焚香荀令偏怜小盖荀令則年十五擬囯婚之選不𣣔連姻帝室乃逺遁長沙㝷不獲見説胡姬酒壚寂静王琰新詠云辛延年羽林郎詩昔有崔家奴姓馮名子都依倚将軍势調笑酒家胡胡姬年十五春日独當壚長𥚑連理帶廣䄂合歡𥜗左傳注胡姫乃齊景公妾也煙鎻漠漠藻池苔井謝玄暉生煙粉漠漠杜詩青苔生古井賀新郎趙文䁀晝永重簾捲古詞簾捲畫堂人寂静乍池塘一畨過雨芰荷𥘉展古詞一畨兩過池塘十里芰荷香竹引新梢半含粉杜詩新梢才出墻又完竹半含籜緑䕃扶踈滿院逐花絮蜂稀蝶懶窓戸沉沉人不到伴清幽時有流鶯囀凝思乆意何限玉釵墜枕風鬟顫見前注湛虚堂壼氷瑩徹簟波零亂鮑昭隂清明如玉壼氷古詞展霜簟相波生細波自是仙姿清無暑月影空垂素扇古詞宝扇垂㝷明月影破午睡香銷餘篆一枕湖山千里夢正白蘋煙帰耒晚蘇飬直清江曲白蘋滿掉歸耒晩秋滿芦花兩岸霜雲弄碧楚天逺塞翁吟周羙成暗葉啼凨雨李賀云木葉啼凨雨牕外曉色瓏璁李賀云雞鳴罷唱曉瓏璁散水麝小池東亂一岸芙蓉蘄州簟展雙紋浪輕帳翠縷如空夢逺别淚㾗重淡鈆臉斜紅忡忡嗟憔悴新寛帶結羞艶冶都銷鏡中詩憂心忡忡䔥鄰詩纎腰非斈桞寛帶爲思君有蜀𥿄堪憑寄恨韓握有寄恨詩云蜀𥿄虚晋小字紅等今夜洒血書詞剪燭親封韓愈云刳肝以爲𥿄酒血以書詞毛逹可妻詩剪烛親封錦字書菖蒲漸老早晚成花教見薫凨夏雲峯桞耆卿宴堂深軒檻雨輕壓暑氣低沉花洞彩舟泛􅕌坐繞清潯楚臺風快楚衮与宋玉登臺有風颯然而至曰快哉此風湘簟冷永日披襟古詞湘簟展清波坐久覺踈絃脆管换新音越娥蕙態蘭心逞妖艶泥懽􅌽寵難禁筵上笑歌間發舄履交侵史記淳于髠曰男女同席舄履交錯醉鄕歸處古詞醉鄕天廣大湏盡興滿酌髙吟向此免名韁利鎖虚費光隂訴衷情近前人景䦨晝永漸入清和氣序古詩首夏猶清和榆錢飄滿閑堦蓮葉嫩生翠沼遥望水邊幽逕山崦孤村是處園林好閑情悄綺陌逰人漸少少年風韻自覺随春老追前好帝城信阻天涯目断暮雲芳草竚立空殘照過澗歇新添桞耆卿淮楚曠望極千里火雲燒空吴融苦热行火雲㷔熖燒天紅盡日西郊無雨易宻雲不雨自我西郊厭行旅数幅䡖㠶旋落艤棹兼葭浦避畏景左傳夏日可畏篡要夏日畏景兩兩舟人夜深語此際爭可便恁奔利名九衢塵裏衣冠冒炎暑囬首江鄕月觀風亭水邊石上幸有散髮披襟處晋有八逹胡毋𥙷謝琨畢卓相㝷阮孚之徒甞散髮祼袒閉戸酣飲張景陽曰䄂簮觧朝衣散髮帰海隅束髮爲從宫散髮爲罷官披襟即宋玉謂有風颯然而至開襟而當之女冠子桞耆卿淡煙飄薄鶯花謝清和院落樹隂翠宻葉成幄麥秋霽景選詩宻葉成翠幄月令孟夏是月也麥秋至夏雲忽変竒峰古詩夏雲多竒峰倚寥廓波䁔銀塘漲新萍緑魚躍想端憂多暇陳王是日嫰苔生閣謝荘月賦陳王𥘉䘮應劉端憂多暇青苔生閣芳塵凝榭正鑠石天高流金晝永楚辝十日代出流金鑠石楚榭光風轉蕙選詩光凨記蕙蘭披襟處波翻翠幕以文㑹友沉李浮瓜文帝書浮甘瓜扵清流沉朱李扵寒水忍䡖諾别舘清閑避炎蒸豈湏河朔媿文帝典論劉松袁紹常以三伏之際晝夜酣飲以避一時之暑故河朔相傳為避署飲但樽前随分雅歌艶舞盡成懽樂大聖樂𥘉夏新添千朶竒峰半軒㣲雨曉來𥘉過漸燕子引教雛飛見前注蓞􅔽暗薫芳草池面凉多淺斟瓊巵浮緑􅾹展湘簟雙紋生細波見前注䡖紈舉動團圎素月怨竒行䡖裂斉紈素皎㓗如霜雪裁為合歡扇團圓似明月仙桂婆娑臨風對月姿樂便好把千金􅌽艶娥幸太平無事擊壌鼓腹携酒髙歌通曆帝堯之時有老人擊壌扵路曰吾日出而作日入而息鑿井而飲耕田而食帝可以扵我哉荘子云赫胥氏之時民居不知所為行不如所之含哺而嬉鼓腹而逰富貴安居功名天賦争柰皆由時命呵休眉鎻問朱顔去了還更耒麽秋景秋望滿江紅趙元稹慘結秋隂西風送絲絲雨濕桑柔詩注西凨謂之大凨選張景陽雜詩宻雨如散絲凝望眼征鴻㡬字暮投沙磧唐韻磧水渚有石者李白詩英風振少磧𣣔徃鄕関何處是水雲浩蕩連南北李白詩揺盍柱水雲河隄繞緑水桑柘連水尽南天不見了二雲園林安可限南北但脩眉一抺有無中遥山色韓南山詩天宇浮脩眉光緑畫新就杜詩巫峽寒空半有無天涯路江上客腸巳断李白詩喬首相思空断腸頭應白杜覇覇丹青巳白頭空搔首詩搔首踟蹰興嘆莫年離隔莫与暮同杜詩道路只今多离隔欲待忘憂除是酒晋顧荣謂張翰曰惟酒可以忘憂又陶潜詩泛此忘憂物柰酒行𣣔盡愁無極便挽将江水入樽罍唐韻云罍酒樽也冩胸臆杜詩異縣逢故人𥘉欣冩胷臆秋思憶秦娥李太白簫聲咽秦娥夢断秦楼月列仙傳簫史善吹簫能至孔雀白鶴秦穆公女弄玉亦好吹䔥遂妻之数年吹似鳯聲鳯凰止其屋公為作鳳臺一旦夫妻皆随鳯去今古古相傳以為秦楼秦楼月憶秦娥之異名秦楼月年年桞色覇陵傷别樂逰原上清秋節咸陽古道音塵絶音塵絶西風殘照漢家陵闕花菴詞客云太白比詞及菩薩蛮一詞為百代詞曲之祖秋怨長相思一重山兩重山山逺天髙煙水寒杜詩路下天髙秋水清相思楓葉丹謝灵運詩早霜楓葉丹菊花殘杜詩菊花徒此不湏開菊花殘塞鴈高飛人未還一簾風月閑閨怨菩薩蛮秦少㳺蛩聲泣露驚秋枕羅幃泪濕鴛鴦錦獨卧玉肌凉殘更與恨長隂風翻翠幌雨澁澄花暗杜詩灯花何大喜畢竟不成眠李白詩月明欲素不成眠鴉啼金井寒夜寒金井索秋閨菩蕯蛮秦少㳺金風蔌蔌驚黄葉高楼影轉銀蟾匝夢断綉簾垂杜詩朱簾秀杜闈黄鶴注黄鶴搂也昭陽殿織朱爲簾風至則鳴如行雨之声月明鳥鵲飛魏文帝短歌行月明星稀鳥鵲南飛繞住三匝無技可依新愁知㡬許欲似絲千縷鴈巳不堪聞砧聲何處村杜詩月明何處砧槝練子心耿耿詩耿耿不寐如有隱憂淚雙雙皓月清凨冷透牎桃源夫人月詩皓彩盈虚碧晋陶潜傳高卧比牎之下清凨颯至自謂羲皇上人人去秋來宫漏永花深無語對銀缸東坡宴西湖詩銀缸畫烛照湖明唐韻缸灯也小重山汪彦章月下潮生紅蓼汀分昭度詩黄蜂語罷海潮生殘霞都歛盡韋應物詩殘日照高閤四山青柳梢風急墮流螢杜詩青栁檻前稍韋應物詩流萤度高閤随波去點點乱寒星别語記丁寕如今能間隔幾長亭白氏六帖十里一長亭夜來秋氣入銀屏宋玉九卞悲哉秋之為氣也梧桐雨還恨不同聴長恨歌秋雨梧桐葉落時點綘唇高柳蝉嘶選詩寒蝉鳴高柳採菱歌断秋風起郭璞江賦采菱歌以叩舷又武帝詞秋凨起兮白雲飛晚雲如髻韋應物詩髙髻雲鬟宮様粧湖上山横翠簾捲西樓滕王閤記朱簾暮捲西山雨過雨凉生𬒮天如水李白秋声賦碧天如水兮畫楼十二有箇人同倚選鮑晚詩鳯楼十二重趙紫㣲討長笛一声人倚楼花唐云此詞畫楼十二有个人同倚之句曲尽曲尽閨情秋怨尾犯柳耆卿夜雨滴空堦出選詩孤舘夢囬情緒䔥索一片閑愁丹青難邈秋漸老蛩声正苦夜将䦨灯花旋落最無端處捴把良宵秪恁孤眠却佳人應􅏜我别後寡信輕諾老子曰䡖諾者必寡信記得當𥘉剪香雲爲約甚時向深閨幽處按新詞流霞共酌論衡曰曼卿好道去家三年而反曰仙人保上天飲我流霞一杯多日不飢再同􅌚笑肯把金玉珠珍博慶春宮新添前人雲接平岡山圍塞野路囬漸轉孤城衰柳啼鴉驚風驅鴈杜詩大風吹断柳啼殺後棲鴉山谷詩驚風鴻鴈不成行動人一片秋声倦途休駕淡煙裏㣲芒見星塵埃憔悴生怕黄昏離思牽縈華堂旧日逢迎花艶參差香霧飄零韓愈詩花艶大堤娼杜詩香霧雲鬟湿絃管當頭偏怜嬌鳯夜深簧暖笙清眼波傳意恨宻約匆匆未成許多煩惱只為當時一餉留情金菊對芙蓉新添康伯可梧葉飄黄萬山空翠断霞流水爭輝正金風西起海燕東歸凭攔不見南来鴈望故人消息遅遅木犀開後不應誤我好景良時只念獨守孤幃把枕前祝付一旦分飛上秦楼逰賞秦女事見前注酒殢花迷誰知别後相思苦誚為伊痩損香肌花前月下黄昏院落見前注珠淚偷垂拜星月慢新添周羙成夜色催更清塵收露小曲幽坊月暗竹檻灯窓識秋娘庭院秋注見瑞尨吟笑相遇似斍瓊枝玉樹暖日明霞光爛古离别愿一見顔色不異瓊枝樹晋謝玄云如芝蘭玉柱生扵庭堦水眄蘭情捴平生稀見韓琮集呉魚秋鴈無消息水眄蘭情别未久畫圖中舊識春風面杜詩云畫圖省識春凨面誰知道自到瑶臺畔眷恋雨潤云温苦驚風吹散念荒寒寄宿無人舘重門閉敗壁秋䖝歎怎柰何一縷相思隔溪山不断更漏子新添温庭筠玉炉香紅䗶淚詩選䗶燭淚流思底事岑參紅淚金燭盤偏照畫堂秋思眉翠薄鬂雲殘夜長衾枕寒長恨歌翡翠衾寒誰与共梧桐樹三更雨長恨歌秋雨梧桐夜落時不道離情正苦一葉葉一声声空堦滴到明選詩夜雨滴空堦落溪詩話云温庭筠湖隂曲警句云吳波不動楚山逺花倚䦨干春昼長庭筠工扵樂府極爲綺靡花間集可見矣其更漏子一詞尤爲佳作千秋歲引新添王介甫别舘寒砧岑參詩寒砧有鄕愁孤城畫角髙適詩城中畫角兩三声一派秋声入寥廓東帰燕從海上去燕子春社自北而耒至秋社向東而帰南來鴈向沙頭落武帝秋凨辝草木黄落兮鴈南帰又宋迪瀟相八景平沙落鴈楚臺風宋玉傳楚王逰扵䦨臺有凨颯至王乃披襟以當之曰快㦲此凨庾楼月晋庾亮在武昌與諸佐吏殷浩之徒乗夜月共上南楼宛如昨無柰𬒳些名利縛無柰𬒳他情擔閤可惜風流揔閑却當𥘉謾留華表語續搜神記遼東城門有華表柱有白鶴集其上言曰有鳥鳥鳥丁令威去家千年今來帰城中如故人民非何不學仙家纍纍而今誤我秦楼約見秦女吹䔥前注夢䦨時酒醒後思量着風流子新添張文潜亭皐木葉下選洞庭波兮木葉下重陽近又是搗衣秋白居易秋詩月明砧杵動家家擣秋練柰愁入庾膓庾信愁賦閉之欲駆愁愁終不肯去久收𣣔避愁愁巳知人処老侵潘鬢見前注謾簮黄菊花也應羞楚天晚白蘋煙尽處紅蓼水邊頭芳草有情夕陽無語鴈橫南浦杜詩别浦鴈賓秋人倚西楼趙嘏詩殘星㡬點鴈横塞長笛一声人倚楼玉容知安否香牋共錦字兩處悠悠空恨碧雲離合選日暮碧雲合佳人殊未來青鳥沉浮向風前懊惱芳心一點寸眉兩葉禁甚閑愁情到不堪言処分付東流詠史詩夕陽西下水東流宴清都新添周羙成地僻無鍾皷杜詩地僻克網罟殘灯㓕夜長人倦難度寒吹断梗凨翻暗雨洒䆫戸李賀云棄之如断梗楽天諷詠云宿空床秋夜長長無睡天不明耿耿殘灯背璧影瀟瀟暗雨洒窻户断梗落木也賓鴻謾説傳書筭過盡千儔萬侣礼記月令云鴻鴈來賓漢書漢使詣单于曰天子扵上林射鴈得鴈足有蘇武帛書始信得廋信愁多江淹恨極湏賦庾信事見前注江淹作恨極賦試問平原芳草荣骨拱木疑䰟人生到此天道寧輪僕本恨人心驚不巳直念古者伏恨而死凄凉病損文園徽絃乍拂音韻先苦史記司馬相如与文君帰成都時有消渇疾后拜為孝文園令既病免家居茂陵而亡也淮水夜月金城暮草夢魂飛去劉禹錫詩淮水東邊旧時月夜深还過女墻耒西漢趙充囯碩至金城上方畧近西楚地也言舊逰之処見其夜月與暮草而傷䰟也秋霜半入清鏡侯老彭詩兩鬚秋霜一鏡中嘆帶眼都移舊処事見前注更乆長不見文君歸時認否華胥引新添周羙成川源澄映煙月𬈑濛去舟似葉韓愈詩川源共澄映又清相一葉舟岸足沙平蒲根水冷留鴈唼宋王九卞云鳬鴈皆唼梁藻兮别有孤角吟秋劉禹錫秋声賦万葉吟秋對曉風鳴軋紅日三竿醉頭扶起寒怯東坡詩酒醒門外日三竿離思相縈漸旨旨鬢絲堪鑷杜詩休鑷鬢毛斑舞衫歌扇何人䡖怜細閱張正見怨竒詩舞衫收冶䄂歌扇掩團紗點檢從前恩愛鳯牋盈篋愁剪灯花夜來和淚多疊何滿子新添孫巨源帳望浮生急景文選白鶴賦急景雕年悽凉宝瑟餘音詩清庙之瑟一唱而三嘆有遺音矣楚客多情偏怨别碧山逺水登臨目送連天衰草劉禹錫詩連天見青草胡曽詩茫茫衰草没章華夜闌㡬處踈砧古詞深院浄小庭空断續寒砧断續風無柰夜長人不寐数声和月到天明黃葉無風自落秋雲不雨長隂杜詩浮雲蔽秋曉天若有情天亦老揺摇幽恨難禁惆悵舊歡如夢斍來無處追㝷蝶恋花新添晏叔原庭院碧苔紅葉遍韓詩正直万洙紅葉滿黄菊開時巳近重陽宴日日露荷凋緑扇粉塘煙水明如練謝眺雨此恨音驛難通待憑征鴈帰時帶将愁去玉蝴蝶柳耆卿望處雲收雨断凭欄悄悄目送秋光晚景簫踈堪動宋玉悲􅋽見凨流子注水風䡖蘋花漸老月露冷梧葉飄黄明道詩凨向白蘋洲渚生古詩凨髙蕗井無梧僷遣情傷故人何在煙水茫茫杜牧詩孤城吹角水茫茫難忘文期酒㑹㡬辜凨月屡変星霜海闊山遥未知何處是瀟湘念雙燕難憑逺信李陵詩䄂中有知書愿寄双飛燕指暮天空識歸航唐詩天下必帰舟黯相望断鴻声裏立尽斜陽氐州第一周羙成波落寒汀村渡向晚遥看数點㠶小乱葉翻鴉驚凨破鴈東坡詩丹楓畨鴉伴水宿杜詩驚凨吹鴻鵠天角孤雲縹緲東坡云烟雲縹緲没孤臺官桞瀟踈甚上掛㣲㣲殘照景物関情川途換日頓來催老漸觧狂朋歡意少柰猶𬒳思牽情繞座上琴心史記司馬相如徃卓王孫家一座尽傾時王孫女文君新寡相如以琴心挑之機中錦字晋竇滔妻蘇氏能屬文符坚時滔坐徙流沙蘇氏為囬文七言詩織錦上以寄滔辞甚清宛此機中錦字也斍最縈懐抱也知人懸望乆薔薇謝歸來一笑𣣔夢髙唐楚㐮王夣神女事見前主未成眠霜空巳曉踈簾淡月寓桂枝香詞新添張宗瑞梧桐雨細長恨歌秋雨梧桐葉落時漸滴作去声秋声𬒳凨驚碎潤逼衣篝線裊蕙罏沉水古詩香殘蕙炷香譜有黒沉水悠悠歲月天涯醉一分秋一分憔悴𬗋簫吹断右詞紫簫声断倚楼人独素牋恨切夜寒鴻起又何苦凄􅋽客裏草堂春緑竹溪空翠落葉西凨吹老㡬畨塵世從前諳尽江湖味聽啇歌歸興千里露侵宿酒踈簾淡月照人無寐古詞深院净小庭空断續寒砧凨無禁夜長人不寐数声和月到簾櫳霜葉飛新添周羙成露迷衰草踈星掛王荆公詞但衰草寒烟疑录􅋽蟾低下林表素娥青女闘婵姢李啇隱詩青女素娥俱耐冷月中霜裏闘婵姢正倍添悽悄漸颯颯丹楓撼曉唐詩曉霜楓葉丹横天雲浪魚鱗小白樂天伊水細聚鱗甲見皓月相看又透入清輝半餉特地留照迢逓望極関山波穿千里度日如歲難到鳯楼今夜聽西凨柰五更愁抱想玉匣哀絃閉了無心重理相思調念故人牽离恨屏掩孤顰淚流多少蕙蘭芳引新添前人塞瑩晚空點青鏡断霞孤鶩滕王閤記落霞與孤鶩斉飛對客舘深扄霜草未衰更緑謝玄暉詩春草秋更录倦逰厭旅但夢繞阿嬌金屋漢武帝㓜時景帝問児欲得婦否長公主指其女曰阿嬌好否武帝對曰若得阿嬌當以金屋貯之耳想故人别後盡日空疑風竹李益詩開門凨動竹疑是故人來塞北氍毹江南圖障是處温燠更花管雲牋猶寫寄情舊曲音塵迢逓但勞逺目謝荘月賦羙人邁兮音塵闕今夜長争柰枕單人獨冬景木蘭花令新添徐昌圖沉檀煙起盤紅霧一剪霜風吹繡户漢宫花面學梅粧宋武帝女詩夀陽公主人日卧扵含章􅉉下梅花落公主額上成五岀之花挑之不去後宫人效之為梅花粧謝女雪詩裁桞絮丗説謝安雪日内集児女講論文義俄而雪驟公欣然曰白雪紛紛何所以兄子胡児曰撒塩空中差可擬兄女曰未若柳絮因風起公大笑爲樂兄女道俄王疑之妻也長垂天幕孤鵉舞旋炙銀笙雙鳯語潘岳笙賦将鳯翼以棌羽幕鵉音而厉声紅窻酒白苧柳耆卿繡幕垂畫堂悄寒風浙瀝遥天萬里黯淡同雲羃羃漸紛紛六花零亂散空碧韓詩外傳凡草木花多五岀雪花独六出如射宴瑶池把碎玉零珠抛擲林峦望中高下瓊瑶一色古詞正千里瓊瑶未掃嚴子陵釣臺後漢嚴光字子陵光武即位除諫譏大夫不出乃耕扵冨春山後名其処為嚴陵瀬