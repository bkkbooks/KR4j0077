front:
  text: 增修箋注妙選羣英草堂詩餘卷之上前集
  hash: sha256:7ea1e42607a6e55e08ce19a163b43475e053e909538038feeaba2d34abc2adad
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0077_SBCK_000-1a}
body:
  text: 名賢詞話春景瑞龍吟新添周美成章臺路漢書張敞走馬於章臺街下即路也還是褪粉梅梢試花桃樹愔愔坊陌人家定巢燕子歸來舊處栁惲詩玉戶夜愔愔杜詩頻來語燕定新巢黯凝佇因念箇人癡小乍窺門戶蘇子美常云癡小失所記倚柱愔愔更有情侵晨淺約宫黃障風映袖盈盈笑語李賀詩宫人靣靨黃梁簡文詩約黃能效月前度劉郎重到唐劉禹錫集云自朗州承召過玄都觀後復主客郎中重逰玄都唯見兔葵燕麥動搖春風耳再題詩云種桃道士知何處前度劉郎今獨來訪鄰尋里同時歌舞惟有舊家秋娘聲價如故杜牧杜秋娘詩尊杜秋有寵于景陵後賜歸故鄉豫過金陵感其窮且老因為之賦詩吟箋賦筆猶記燕臺句李義山詩序栁枝洛中里娘也年十七塗粧綰髻未嘗竟已余從昆讓山比栁枝居他日春隂讓山詠二燕臺詩栁枝問曰誰人為是讓山曰此吾少年叔耳栁枝乃手斷其帶結讓山為贈叔乞詩明日余䇿馬出其巷栁枝了鬟靚粧抱立扇下風障一袖指曰若叔何深望之䋶與郎俱余因諾之後不果留但悵望耳有詩云長吟逺下燕臺句惟有花香染未消知誰伴名園露飲東城間步杜詩名園依緑水筆談石曼卿露頂而飲杜牧佐沈傳師幕在江西時張好好以善歌入籍一年鎮宣城復置好好宣籍又二年沈著作以雙鬟納之又二年往東城縱步復見之事與孤鴻去杜牧詩恨如春草多事逐孤鴻去探春盡是傷離緒官栁低金縷杜甫詩官栁著行新溫庭筠詩不似垂楊惜金縷歸騎晚纎纎池塘飛雨斷腸院落一簾風絮張景陽詩飛雨灑朝蘭晏元獻詩梨花院落溶溶月栁絮池塘淡淡風花菴詞按美成此詞自章臺路至歸來舊處是苐一假自黯凝佇至盈盈笑語是苐二假此謂之雙拽頭屬正平調自前度劉郎以下即犯大石係苐三假至歸騎晚以下四句再歸正平今諸本皆于吟箋賦筆處分假者非也驀山溪黃山谷鴛鴦翡翠小小思珍偶山谷此詞本有所感鴛鴦翡翠乃成雙之物故鄭氏箋詩言其止則相偶飛則為雙性馴偶也李華長門怨亦云弱體鴛鴦席啼粧翡翠林眉黛斂秋波黃思恭昭君怨眉黛雪沾殘文選舞賦目流睇而橫波注斜視如水波之橫流也儘湖南山眀水秀娉娉嫋嫋恰似十三餘杜詩隔戶楊栁弱嫋嫋恰似十五女兒腰春未透花枝瘦正是愁時候尋芳載酒肯落誰人後祗恐逺歸來緑成隂韋應物詩間院緑隂生青梅如豆心期得處每自不由人長亭栁白氏六帖五里一短亭十里一長亭君知否千里猶回首杜詩回首見旌旗雪浪齊日記云山谷此詞云春未透花枝瘦正是愁時候極為學者稱賞秦堪處度嘗有小詞云春透水波明寒峭花枝瘦蓋法此也花心動阮逸女仙苑春濃杜詩庭春入眼濃又春光日自濃小桃開枝枝巳堪攀折李詩誰云敢攀折乍雨乍晴輕暖輕寒漸近賞花時節開元遺事長安春時盛于逰賞士女鬪花栽種以多者為勝栁搖臺榭杜詩風榭栁微舒記月令仲夏居臺榭注闍者謂之臺有木謂之榭東風軟李詩東風扇淑氣簾襱靜選詩牛女升月照簾襱幽禽調舌斷魂逺間尋翠徑頓成愁結此恨無人共説還立盡黃昏寸心空切杜詩歘使寸心傾強整繡衾獨掩朱扉簟枕為誰鋪設夜長宫漏傳聲逺杜早朝大明宫午夜漏聲催曉箭紗窗映銀缸眀滅李青缸明滅照悲啼夢回處梅梢半籠淡月花菴詞阮逸女女工于文詞惟此曲傳于世魚遊春水秦樓東風裏杜秦城樓閣煙花裏漢主山河錦繡中燕子還來尋舊壘章孝標燕詩舊壘老巢泥巳落今年故向社前歸餘寒猶峭坡春風料峭羊角轉紅日薄侵羅綺杜深紅淨羅綺嫩草方抽碧玉茵謝方春逰賦靡翠草以成䓢媚栁輕拂黃金縷李栁色黃金嫩鶯囀上林上林漢苑名僧齊巳鶯詩暖風催出囀喬林魚逰春水選補亡詩魚逰清沼江淹别賦春水緑波幾曲欄干遍倚李況香亭北倚闌干又是一番新桃李李詩天春三月時千門桃與李佳人應怪歸遲李當笑尓歸遲梅粧淚洗宋武帝夀陽公主人日臥含章􅉉下梅花落額後人效為梅花粧鳳簫聲絶沉孤雁史記蕭史秦人善吹蕭穆公有女字弄玉亦好吹蕭遂以妻焉時共登樓吹蕭作鳳鳴感鳳凰從天而降迎之升仙莫知所止前蘇武傳天子射上林中得雁其雁足上得子卿帛書望斷清波無雙鯉選詩客從逺方來遺我雙鯉魚呼童烹鯉魚中有尺素書雲山萬里李雲山萬重隔寸心千里復齋漫録政和中一中貴人使越州回得詞于古碑隂無名無譜不知何人作也録以進御命大晟府填腔因詞中語賜名魚逰春水云古今詞話東都防河卒于汴河上掘地得石刻有詞一關不題其目臣寮進上上喜其藻思絢麗欲命其名遂托詞中四字名曰魚逰春水令教坊倚聲歌之詞凡九十四字而風花鶯燕動植之物曲盡之此唐人語也後之狀物寫情不及之矣二説未詳孰是望海潮秦少遊梅英疏淡冰澌溶泄東風暗換年華金谷俊遊銅駝巷陌杜金谷銅駝非故鄉注金谷園銅駝陌皆在蜀中新晴細履平沙杜新晴錦繡文又地濶平沙岸長記誤隨車正絮翻葉舞韓雪詩隨車畨素縞逐馬散銀杯芳思交加栁下桃蹊李廣傳贊桃李不言下自成蹊亂分春色到人家杜春色到江亭西園夜飲鳴笳選詩清夜逰西園飛蓋相追隨又鳴笳翼髙蓋疊鼓送華輈有華燈礙月飛蓋妨花見上句注蘭苑未空楚詞既滋蘭之九畹行人漸老重來是事堪嗟煙暝酒旗斜陳充詩煙店酒旗何處開但倚樓極目杜行藏獨倚樓又極目㧾兄波時見棲鴉杜啼殺后棲鴉無奈歸心杜歸心折大刀暗隨流水到天涯杜各在天一涯滿庭芳晚兔雲開春隨人意杜隨意隴頭雲驟雨才過還晴古臺旁榭記月令仲夏之月可以處臺榭注有土謂之臺有木謂之榭飛燕蹴紅英杜燕蹴飛花落舞莚舞困榆錢自落丁晉公梨花詩狂風知價擲榆錢榆錢即榆策也鞦韆外緑水橋平古今萟術鞦韆北方戎戲以習輕趫者杜詩野水平橋路東風裏李東風扇淑氣朱門映栁低按小􅌙筝風俗通筝秦聲也形如瑟多情行樂處選鮑昭逺行樂詞春風太多情珠鈿翠蓋唐韻鈿金華飾選甘泉賦流翠蓋以電燭金轡紅纓漸酒空醽醁選吳都賦酌醽醁注酒名花困蓬瀛豆􅞦梢頭舊恨千年夢屈指堪驚憑欄久疏煙淡日微映百層城杜山城僅百層玉樓春宋子京東城漸覺風光好李白水繞東城謝元暉風光草際浮皺縠波紋迎客棹緑楊煙外曉雲輕紅杏枝頭春意閙浮生長恨歡娛少僧義光春日感寓詩浮生自笑日蹉跎杜可惜歡娛地都非少壯時肯愛千金輕一笑李詩一笑雙白璧再歌千万金方千詩倍價金價不一笑為君持酒勸斜陽且向花間留晚照遁齋間覽張子野郎中以樂章名擅一時宋子京尚書奇其才先往見之遣將命者曰尚書欲見雲破月來花弄影郎中子野屏後呼曰得非紅杏枝頭春意閙尚書耶遂出置酒盡歡蓋二人所舉皆其警策也古今詩話亦云子野嘗作天仙子詞云雲破月來花弄影士大夫多稱之張初謁見歐公迎謂曰好雲破月來花弄影恨相見之晚也錦纒道燕子呢喃托遺載王榭到烏衣國既歸見梁上雙燕呢喃下視景色乍長春晝溫庭筠詩吳江不動椘山碧花壓闌干春晝長覩園林萬花如繡海棠經雨胭脂透杜林花帶雨胭脂落栁展宫眉辛夤遜詩直待和風始展眉翠拂行人首向郊原踏青杜詩江邉踏青罷恣歌携手李陵詩携手上河梁逰子暮何之醉醺醺尚尋芳酒問牧童遙指孤村道杏花深處那裏人家有杜牧清明詩借問酒家何處有牧童遙指杏花村古今詩話此詞海棠經雨胭脂透一句最善形容景物至下假用問酒杏花村事曲盡郊外春逰之情工於詞者也玉漏遲杏香飄禁苑文選西都賦御逰則有禁苑須知自古皇都春早韓文公詩最是一年春好處絶勝煙栁滿皇都燕子來時繡陌漸薰芳草鄭谷杏花詩雙燕却來時選詩長安開繡陌蕙圃夭桃過雨弄碎影紅篩清沼深院悄緑楊影裏鶯聲低巧僧齊巳鶯詩避人雙入緑楊深早是賦得多情更對景臨風鎮辜歡笑數曲欄干故人謾勞登眺天際微雲過盡詩不須愁日暮天際是輕隂亂峯鎖一竿斜照歸路杳東風淚零多少渡江雲周美成晴嵐低楚甸揮犀宋迪瀟湘八景有山市晴嵐謝玄暉詩鳳翔陵楚句暖回鴈翼陳勢起平沙宋迪瀟湘八景有平沙鴈落驟驚春在眼借問何時委曲到山家杜甫庭春入眼濃璉不器春風詩可憐委曲來山舍塗香暈色盛粉飾爭作妍華千萬絲陌頭楊栁漸漸可藏鴉李白陌頭楊栁黃金色孟郊楊栁織别愁千條萬條絲廣樂記詩楊栁可藏鴉堪嗟清江東注畫舸西流陳后山詩清江畫舸照新晴指長安日下王勃序望長安於日下愁宴闌風翻旗尾潮濺烏紗今朝正對初弦月杜詩雲初弦月掩傍水驛深艤蒹葭沉恨處時時自剔燈花吳融剪刀賦鶯春囀曉畫眉而頻剔燈花浣溪紗水漲魚天拍栁橋雲鳩拖雨過江臯韋應物詩微雨歇芳園春鳩鳴何處江淹雜躰幸及風雲霽青春滿江臯一畨春信入東郊間碾鳳團消短夢歸田録茶莫貴于龍鳳團八餅重一斤靜看燕子壘新巢杜語燕定新巢又移日影上花梢杜荀鶴詩日髙花影重浣溪紗春逰歐陽永叔湖上朱橋響畫輪韓詩湖上新亭好李詩金鞍曜朱輪溶溶春水浸春雲碧琉璃滑淨無塵杜詩波濤万里碧琉璃當路遊絲縈醉客杜逰絲白日淨隔花啼鳥喚行人日斜歸去奈何春浣溪紗春景小院間窗春色深重簾未捲影沉沉倚樓無語理瑶琴逺岫出雲催薄暮唐逺岫朝雲出杜亂雲低薄暮細風吹雨弄輕隂梨花欲謝恐難禁踏莎行賞春黃魯直臨水夭桃杜短短桃花臨水岸倚牆繁李長楊風掉青驄尾長楊宫名劉貢父詩戶外青驄響玉啼坐中有酒可酬春更尋何處無愁地明日重來落花如綺芭蕉漸著山公啓山公山蕳也字李倫人嘗哥之曰山公去何逺啓書也芭蕉方捲之際如抽書之狀有芭蕉詩云心似倒抽書是也欲箋心事寄天公教人長夀花前醉山谷云豫親書此詞遺祝有道云諸樂府雖有賞歎其詞而未深解其義味者故并奉寄踏莎行春旅秦少遊霧失樓臺月迷津渡桃源望斷無尋處陶潛桃花源記晉太康中武陵人捕魚從溪行忽逢桃林夾岸無復雜果前行林盡水源有小口豁然開朗黃髮垂髫自云其先世避秦至此可堪孤館閉春寒杜鵑聲裏斜陽暮成都記蜀望帝死其魄化為鳥名杜鵑一名子規一名杜宇其聲哀悲不忍聽之也李義山詩望帝春心託杜鵑杜詩子規枝上月三更驛寄梅花梅花詩折梅逢驛使寄與隴頭人魚傳尺素樂府辭客從逺方來遺我雙鯉魚呼童烹鯉魚中有尺素書砌成此恨無重數郴江幸自繞郴山為誰流下瀟湘去冷齋夜話云少遊到郴州作此詞東坡絶愛其尾兩句自書于扇曰少遊已矣雖萬人何贖范元災詩眼云余誦淮海小詞云杜鵑聲裏斜陽暮山谷曰此詞髙絶但既云斜陽又曰暮即重出也欲改斜陽為簾櫳余曰既言孤館閉春寒似無簾櫳山谷曰亭傳雖未必有簾櫳有亦無害余曰此詞本摸寫牢落之狀若曰簾櫳恐損初意山谷曰極難得好字當徐思之然余因此曉句法不當重疊如夢令春景門外緑隂千頃韋應物詩間院緑隂生兩兩黃鸝相應杜兩個黃鸝鳴翠桞睡起不勝情行到碧梧金井李白詩金井落梧桐人靜人靜風弄一枝花影杜風䁔鳥聲碎如夢令鶯嘴啄花紅溜燕尾點波緑皺指冷玉笙寒李後主詞小樓吹徹玉笙寒吹徹小梅春透曲名有小梅花依舊依舊人與緑楊俱瘦憶王孫萋萋芳草憶王孫文選劉安招隱云王孫逰兮不歸芳草生弓萋萋桞外樓高空斷魂楊微之寒食詩池􅒯臺高昜斷魂杜宇聲聲不忍聞華陽凨俗録鳥有杜鵑者其大如鵲而羽鳴其聲哀而吻有血春至則鳴羅鄴詩聲聲啼血向花枝欲黃昏雨打梨花空閉門魏野詩黃昏微雨空惆悵白居易長恨哥梨花一枝春帶雨桞梢青岸草平沙吳王故苑桞裊煙斜雨後寒輕風前香軟春在梨花李遵進梨花表潔花開處擅美春林行人一棹天涯酒醒處殘陽亂鴉溫飛卿詩鴉背夕陽多秦少遊斜陽外寒鴉數點門外鞦韆古今藝術秋千北方戎戲也墻頭紅粉坡詞墻裏秋千墻外道墻外行人墻裏佳人笑深院誰家金明池春逰瓊苑金池青門紫陌青門長安東城門也王燦獵賦倚紫陌而並征似雪楊花滿路韓詩楊花榆策無才思惟解漫天作雪飛雲日淡天低晝永過三點兩點細雨吳融詩三點五點映山雨一枝兩枝臨水花好花枝半出墻頭似悵望芳草王孫何處選劉安招隱王孫逰兮不歸芳草生兮萋萋更水繞人家楊微之詩流水人家穿作徑橋當門巷燕燕鶯鶯飛舞詩燕燕于飛下上其音山谷詩鶯鶯求朋友憂患同一支怎得東君長為主把緑鬢朱顔選宋玉招報道别院笙歌會早試問海棠花昨夜開多少西江月春夜蘇東坡照野瀰瀰淺浪橫空曖曖微霄障泥未解玉驄驕唐王濟善解馬性嘗乘一馬著連乾障泥前有水終不肯渡濟曰此必是惜乾障泥使人解去便濟李詩臨流不肯渡恐濕錦障泥我𣣔醉眠芳草鄭谷草詩香輪莫碾青青破留與逰人共醉眠可惜一溪明月莫教踏碎瓊瑶瓊瑶喻月色解鞍欹枕緑楊橋杜宇數聲春曉東坡自序云春夜行蘄水中過酒家飲酒醉乘月至一溪橋上解鞍少休及覺巳曉亂山䓤蘢不謂人丗也書此詞橋上漁家傲春夜王介甫平岸小橋千嶂抱楺藍一水縈花草選秋水似揉藍茅屋數間窗窈窕塵不到時時自有春風掃唐詩自有清風為掃門午枕覺來聞語鳥欹眠似聽朝雞早歐陽公詩笑殺汝隂稱處士也來馬上聽朝雞忽憶故人今總老古詩惆悵玉關人巳老貪夢好茫茫忘了邯鄲道唐開元中吕翁得神仙術行邯鄲道中息邸舍隱囊而坐俄見少生蘆生自歎窮困翁以枕授生曰子枕吾枕當榮適如志生枕而寐夢登進士第纍遷至户部尚書後以事貶謫忽欠伸而覺翁坐其傍主人炊黍尚未熟也雪浪齋日記云荆公此詞略元塵士思黃玉林詞選云半山老人此詞極能道間居之趣玉樓春晏同叔緑楊芳草長亭路年少拋人容易去薛能惜春詩無計延春日何能留少年樓頭殘夢五更鍾花底離愁三月雨無情不似多情苦坡詞笑漸不聞聲漸悄多情却𬒳無情惱一寸還成千萬縷天涯地角有窮時白居易詩春來何處不周逰地角天涯遍始休只有相思無盡處詩眼云晏叔原見蒲傳正云先公平日小詞雖多未嘗作婦人語傳正云録楊芳草長亭路年少拋人容易去豈非婦人語乎晏曰公謂年少為何語傳正日豈不謂其所歡乎晏曰因公言遂曉樂天詩兩句𣣔留所歡待富貴富貴不來所歡去傳正笑而悟其言之矢然此語意甚為高雅千秋歲秦少遊桞邊沙外城郭輕寒退花影亂鶯聲碎杜荀鶴詩風暖鳥聲碎日高花影重飄零踈酒盞離别寬衣帶杜詩艱難帶城圍人不見碧雲暮合文選日暮碧雲合佳人殊未來空相對惜昔西池會鴛鴦同飛蓋王筠詩扁舟泛西池卯央同翠蓋携手處今誰在李陵詩携手上河梁滕王閣詩閣中帝子今何在日邊清夢斷鏡裏朱顔改春去也落紅萬點杜飄紅万點正愁人愁如海后山詩話云王平甫之子嘗云今語例襲陳言但能轉移耳丗稱此詞愁如海為新竒不知李後主虞美人詞巳云問君還有幾多愁恰似一江春水向東流但以江為海耳冷齊夜話云少遊小詞竒麗詠歌之想見其神清在絳闕道山之間余兄思禹使余賦崔徽頭子詞因次韻曰半身屏外睡覺唇紅退春思亂芳心碎空餘簮髻玉不見流蘇帶誰與問今人秀韻誰冝對相浦曽同會手弭青羅蓋疑是夢中尤在十分春易盡一點情難改多少事却隨恨遠連雲海蘭陵王張仲宗卷珠箔朝雨輕隂乍閣欄干外煙桞弄晴芳草侵階映紅藥杜詩映階碧草自春色射眺直省中詩紅藥當階翻東風如許惡吹落梢頭嫩蕚屏山掩屏山謂枕屏也沉水倦薰香譜以黑沉水為上品趙令時詩盡日水沉香一縷中酒心情怕杯勺尋思舊京洛韓詩光寵照亰洛古帝王所都之邑正年少踈狂杜詩欲填溝壑惟踈放自笑狂夫老更狂歌笑迷著障泥油璧催梳掠障泥事見前注溫飛卿詞油璧車輕金犢肥曽馳道同載上林携手燈夜初過早共約又爭信飄泊寂寞念行樂任粉淡衣襟音斷絃索元稹詩月高絃索鳴周美成詞燕子樓空暗塵鎖一床絃索瓊枝璧月春如昨悵别後華表那回雙鶴續神記遼東城門有華表柱有白鶴集其上言詩曰有鳥有鳥丁令威去家千年今來歸城郭如故人民非何不學仙家纍纍想思前事除夢魂裏暫忘却王介甫詩借問道人何所歸帝臺春李景元芳草碧色萋萋遍南陌江淹别賦春草碧色春水緑波送君南浦傷如之何萋萋事見前注飛絮亂紅也似知人春愁無力憶得盈盈拾翠侣杜佳人拾翠春相問共携賞鳯城寒食到今來海角逢春天涯行客愁旋釋還似織淚暗拭又偷滴李山甫詩暗垂珠淚滴蠶筐謾遍倚危欄侭黃昏也只是暮雲凝碧文選日暮碧雲合佳人殊未來拚則而今巳拚了忘則怎生便忘得又還問鱗鴻試重尋消息鱗鴻魚鴈也倦尋芳王元澤露晞向曉簾幕風輕小院間晝翠徑鶯來驚下亂紅鋪繡倚危樓登高榭杜行藏獨倚樓月令仲夏可以處臺榭注有木者謂之榭海棠著雨胭脂透杜林花著雨胭脂落算韶華又因循過了清明時候坡詩寒食清明都過了一瓶春水自煎茶倦逰燕風光滿目好景良辰誰共携手恨𬒳揄錢買斷兩眉長鬪丁晉公梨花詩春風知價擲榆錢憶得高陽人散後晉山簡每至高陽曽家池飲大醉而歸人歌曰山公時一醉酩酊無所知日暮倒載歸倒著白接㒿遂名池為高陽也落花流水古詩落花有意隨流水流水無心戀落花仍依舊這情懷對東風盡成消瘦眼兒媚楊柳絲絲弄輕柔􅼥野柳詩藍染絲絲翠色勻煙縷織成愁海棠未雨梨花先雪一半春休而今往事難重省歸夢繞秦樓秦樓事見前注相思只在丁香枝上豆􅞦梢頭懷舊青門引張子野乍暖還輕冷風雨晚來方定庭軒寂寞近清明殘花中酒又是去年病樓頭晝角風吹醒吕緼詩曉風傳晝角入夜重門靜易係辝重門擊拆以待暴客那堪更𬒳明月隔墻送過秋千影王禹稱詩月轉秋千影漸斜浪淘沙李後主簾外雨潺潺春意闌珊羅衾不暖五更寒夢裏不知身是客一餉貪歡一餉謂一食之頃獨自莫憑欄無限江山别時容易見時難流水落花春去也天上人間杜詩天上秋期近人間月影清李白長恨歌天上人間會相見西清詩話云南唐後主歸朝後每懷江國且念嬪妾散落鬱鬱不自聊遂作此詞含思懷婉未幾下垂浪淘沙歐陽永叔把酒祝東風且共從容垂楊紫陌洛城東杜野寺垂楊裏韓塵埃紫陌春總是當年携手處逰遍芳叢聚散苦匆匆此恨無窮今年花勝去年紅可惜明年花更好知與誰同青玉案一年春事都來幾杜溪邊春事幽早過了三之二坡詞春色三分一分塵土二分流水緑暗紅嫣渾可是緑楊庭院暖風簾幕有個人憔悴買花載酒長安市唐夛令欲買桂花重載酒終不似少年逰飲中八仙歌長安市上酒家眠又爭似家山見桃李不往東風吹客淚相思難表李兩鄊千里夢相思夢魂無據惟有歸來是蝶戀花俞克成夢斷池塘驚乍曉謝靈運傳惠連十歲能屬文族兄靈運嘉賞之嘗於西堂思詩竟日不就忽夢惠連即得池塘生春草之句大以有工常謂此語有神助百舌無端故作枝頭閙顧况詩百舌五更頭報道不禁寒料峭坡詩春寒料峭羊角傳未教舒展間花草盡日簾垂人不到張舜民調笑令云云老去情疏底事傷春惱杜傷春怯杜鵑相對一樽歸計早玉山不減巫山好嵇康醉倒如玉山之頽蝶戀花海燕雙來歸晝棟簾影無風文選風簾入雙燕花影頻移動半醉海棠春睡重唐明皇嘗召太真妃妃𬒳酒新起帝曰此乃海棠花睡未足耳緑鬟堆枕香雲擁翠𬒳雙盤金縷鳯憶得前春有箇人人共花裏鶯聲時一弄韓詩無心花裏烏更與盡情啼晉王徽之問桓伊善笛使人謂曰試謂我一弄日斜驚起相思夢韋蘇州聽鶯詩誰家懶婦驚殘夢春意聲聲慢簾移碎影香褪衣襟舊家庭院嫩苔侵杜詩苔蘇侵門古東風過盡暮雲鎖緑窗深怕對人間枕剩衾樓底輕隂春信斷怯登臨楚詞登山臨水送將歸斷腸魂夢兩沉沉花飛水逺便從今莫追尋又怎禁驀地上心謁金門愁脈脈杜牧詩脈脈無言度幾春目斷江南江北韓熙載詩我本江北人今作江南客再去江北逰齊目無相識煙樹重重芳信隔小樓山幾尺細草孤雲斜日杜夕陽黃細草一向弄晴天色簾外落花飛不得東風無氣力顧雲詩乞與東凨殘氣力憶秦娥康伯可春寂寞長安古道東凨惡東風惡胭脂滿地杏花零落杜林花著雨胭脂落羅隱杏花詩暖氣潛催次弟春梅花巳謝杏花新臂銷不奈黃金約選皓腕約金環天寒尚怯春衫薄柘枝詞蹙袖春衫薄春衫薄不禁揾淚為君彈却玲瓏四犯周美成穠李夭桃是舊日潘郎親試春艷自别河陽長負露房煙臉晉潘安仁為河陽令多栽桃李人號曰河陽一縣花李乂山紅露花房自密脾憔悴鬢點吳霜念想夢魂飛亂嘆晝欄玉砌都换才始有緣重見夜深偷展香羅薦劉禹錫詩錦衣羅薦承輕步暗窗前醉眠蔥蒨浮花浪蘂都相識韓詩浮花浪蕊鎮長有誰更曽擡眼休問蒨色舊香但認取芳心一點又片時一陳凨雨惡吹分散皮日休桃花賦狂凨猛雨一陳紅去燕春臺新添張子野麗日千門謝靈運詩白日麗江臯𬗋煙雙闕杜詩紫禁正耐煙花繞瓊林又報春回殿閣凨微當時去燕還來五侯池館屏開漢成帝即位尊王后為太后以王鳯為大司馬大將軍王潭王商王立王根王逢五人同日封侯謂之五侯外滅貴盛莫之與比探芳菲走馬重簾人語鱗鱗車幰逺近輕雷唐都人士女正月半乘車走馬郊中為探春宴會雕觴霞灔醉幕雲飛楚腰舞桞魏野桞詩楚腰若使渾相似餓殺宫娥學不成宮面粧梅壽陽公主事見前卷注金猊夜暖香譜香獸以塗金為狻猊之狀空其中以燃香使香自口出羅衣暗香煤洞府人歸笙歌燈火樓臺唐詩笙歌歸院落燈火下樓臺下蓬萊猶有花上月清影徘徊賀新郎春情新添李玉篆縷銷金鼎古詞瑞腦銷金醉沉沉庭隂轉午唐詩槐夏午隂涼畫堂人靜芳草王孫如何處見前注惟有楊花糝徑杜詩糝徑楊花鋪白氊漸玉枕騰騰春醒簾外殘紅春巳透鎮無聊殢酒厭厭病古詞長是每年三月病酒厭厭雲鬢亂未忺整江南舊事休重省遍天涯尋消問息斷鴻難倩月滿西樓唐詩鴈歸南浦人𥘉靜月滿西樓酒半醒憑欄久依舊歸期未定又只恐缶沉金井李白詩銀瓶汲水沉金井嘶騎不來古詞郎馬頻嘶竟不來銀燭暗枉教人立盡梧桐影誰伴我對鵉鏡玉林詞話云李君之詞雖不多見然風流醖籍盡於賀新郎一詞矣祝英臺春晚新添辛幼安寶叉分長恨歌叉晉一股合一扇叉擘黃金合分鈿桃葉渡金陵懷古晉王獻之愛妾名桃葉獻之歌以送之云挑葉復挑葉渡江不用楫但道無所苦若雖弟迎接不用揖謂橫波急也煙桞暗南浦怕上層樓十日九風雨斷腸點點飛紅都無人管倩誰喚流鶯聲住鬢邊覷試把花卜歸期才簮又重數羅帳燈昏哽咽夢中語杜詩今夕知何夕燈愁錦悵中又夢覺燈生暈是他春帶愁來春歸何處又不解帶將愁去念奴嬌春情新添李易安蕭條庭院又斜風細雨漁父辝斜風細雨不須歸重門須閉寵桞嬌花寒食近種種惱人天氣險韻詩成扶頭酒醒别是間滋味征鴻過盡萬千心事難寄樓上幾日春寒簾垂四面玉闌干慵倚𬒳冷香銷新夢覺不許愁人不起清露晨流新桐𥘉引多少逰春意日高煙斂更看今日晴未花庵詞客云前輩常稱易安緑肥紅瘦為